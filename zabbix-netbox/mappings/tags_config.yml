# Tags Configuration
# Field paths use flat DB column names from discovery_netbox_inventory_device and joined tables.

tags:
  definitions:
    # === MAPPING RESULTS ===

    - tag_name: "Device_Type_Category"
      source_type: "mapping_result"
      enabled: true
      description: "Device type category from mapping (e.g., Lenovo IPMI, Dell IPMI, Inspur M6)"

    # === DB FLAT ATTRIBUTES ===

    # Manufacturer
    - tag_name: "Manufacturer"
      source_type: "netbox_attribute"
      path: "manufacturer_name"
      enabled: true
      description: "Device manufacturer (e.g., LENOVO, DELL, HPE)"

    # Device Type/Model
    - tag_name: "Device_Type"
      source_type: "netbox_attribute"
      path: "device_model"
      enabled: true
      description: "Device model from device_type_name column"

    # Location (DC_ID: root → parent → location → site)
    - tag_name: "Location"
      source_type: "computed"
      compute_function: "get_location_name"
      enabled: true
      description: "DC_ID: root_location_name → location_parent_name → location_name → site_name"

    # Location Detail
    - tag_name: "Location_Detail"
      source_type: "netbox_attribute"
      path: "location_name"
      fallback: "site_name"
      enabled: true
      description: "Direct location_name from DB"

    # Root Location Name (DC_ID)
    - tag_name: "DC_ID"
      source_type: "netbox_attribute"
      path: "root_location_name"
      fallback: "location_parent_name"
      enabled: true
      description: "Root parent location resolved by recursive SQL CTE"

    # City (from site)
    - tag_name: "City"
      source_type: "netbox_attribute"
      path: "site_name"
      enabled: true
      description: "Site name"

    # Tenant
    - tag_name: "Tenant"
      source_type: "netbox_attribute"
      path: "tenant_name"
      enabled: true
      description: "Tenant name from DB"

    # Loki ID (Device ID)
    - tag_name: "Loki_ID"
      source_type: "netbox_attribute"
      path: "id"
      enabled: true
      transform: "to_string"
      description: "Device ID as string"

    # Cluster (resolved via site_name join with virtualization_vm table)
    - tag_name: "Cluster"
      source_type: "netbox_attribute"
      path: "cluster_name"
      enabled: true
      description: "Cluster name resolved by site_name from discovery_netbox_virtualization_vm"

    # Rack Name
    - tag_name: "Rack_Name"
      source_type: "netbox_attribute"
      path: "rack_name"
      enabled: true
      description: "Rack name from rack_name column in discovery_netbox_inventory_device"

    # === DIRECT DEVICE FIELDS ===

    # Ownership (direct column, not custom_field)
    - tag_name: "Contact"
      source_type: "netbox_attribute"
      path: "sahiplik"
      enabled: true
      description: "Ownership from sahiplik column"

    # Responsible Team (from custom_fields JSONB)
    - tag_name: "Sorumlu_Ekip"
      source_type: "custom_field"
      field_name: "Sorumlu_Ekip"
      enabled: true
      description: "Responsible team from custom_fields JSONB"

    # Installation Date (direct column)
    - tag_name: "Kurulum_Tarihi"
      source_type: "netbox_attribute"
      path: "kurulum_tarihi"
      enabled: true
      description: "Installation date from kurulum_tarihi column"

    # === TEMPLATE MAPPINGS ===

    - tag_name: "Template_Group"
      source_type: "template_mapping"
      enabled: true
      attribute: "host_groups"
      separator: ","
      description: "Host groups from template mappings"

    # === COMPUTED/PROCESSED VALUES ===

    # Hall (from location_description or location_name)
    - tag_name: "Hall"
      source_type: "computed"
      compute_function: "extract_hall"
      enabled: true
      description: "Hall from location_description or location_name"

    # === ARRAY EXPANSION ===

    # Loki Tags from tags1_name...tags5_name columns
    - tag_name: "Loki_Tag_"
      source_type: "array_expansion"
      path: "tags"
      prefix: "Loki_Tag_"
      enabled: true
      description: "Tags from tags1_name...tags5_name columns expanded with Loki_Tag_ prefix"

  settings:
    skip_empty: true
    skip_none: true
    trim: true
    treat_empty_as_none: true
