---
# Mapping NetBox platforms to Zabbix DEVICE_TYPE and per-DC limits
#
# - manufacturer: NetBox platform.manufacturer.name (case-insensitive match)
# - device_type:  Key in templates.yml that defines Zabbix templates
# - limit_per_dc: Max platforms per logical DC for this device_type (0 or missing = no limit).
#   Counting uses the first (DC|AZ|ICT|UZ)[0-9]+ match from Site/DC (e.g. DC13-G12 -> DC13), not the full Site string.

mappings:
  - manufacturer: "Nutanix"
    device_type: "Nutanix"
    limit_per_dc: 1

  - manufacturer: "Acropolis"
    device_type: "Acropolis"
    limit_per_dc: 1

  - manufacturer: "Zerto"
    device_type: "Zerto"
    limit_per_dc: 0

  - manufacturer: "Netbackup"
    device_type: "NetBackup"
    limit_per_dc: 0

  - manufacturer: "Veeam"
    device_type: "Veeam"
    limit_per_dc: 0

  - manufacturer: "VMware"
    device_type: "VMware"
    limit_per_dc: 1

  - manufacturer: "IBM HMC"
    device_type: "IBM Virtualization"
    limit_per_dc: 1

