# Host Groups Configuration
# Field paths use flat DB column names from discovery_netbox_inventory_device and joined tables.

host_groups:
  sources:
    # 1. Device Type from Mapping Result
    - name: "device_type_mapping"
      type: "mapping_result"
      enabled: true
      priority: 1
      description: "Device type determined from netbox_device_type_mapping.yml conditions"

    # 2. Device Role (flat DB column)
    - name: "device_role"
      type: "netbox_attribute"
      enabled: true
      priority: 2
      path: "device_role_name"
      description: "Device role from device_role_name column"

    # 3. Location Hierarchy (root → parent → location → site)
    - name: "location"
      type: "computed"
      enabled: true
      priority: 3
      compute_function: "get_location_name"
      description: "DC_ID: root_location_name → location_parent_name → location_name → site_name"

    # 4. Ownership (direct column, not custom_field)
    - name: "ownership"
      type: "netbox_attribute"
      enabled: true
      priority: 4
      path: "sahiplik"
      description: "Ownership from sahiplik column"

    # 5. Template Host Groups
    - name: "template_groups"
      type: "template_mapping"
      enabled: true
      priority: 5
      source_file: "templates.yml"
      attribute: "host_groups"
      description: "Static host groups from template mappings"

  settings:
    separator: ","
    skip_empty: true
    unique: true
    trim: true
