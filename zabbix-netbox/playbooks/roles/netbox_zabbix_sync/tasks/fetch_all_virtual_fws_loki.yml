---
- name: Create Python script to fetch virtual firewalls (fw_status=active)
  copy:
    content: |
      #!/usr/bin/env python3
      import json
      import sys
      import requests
      from urllib3.exceptions import InsecureRequestWarning

      requests.packages.urllib3.disable_warnings(InsecureRequestWarning)

      def sanitize_text(value):
          if not isinstance(value, str):
              return value
          return value.encode("utf-8", errors="surrogatepass").decode("utf-8", errors="replace")

      def sanitize_json(value):
          if isinstance(value, str):
              return sanitize_text(value)
          if isinstance(value, dict):
              return {sanitize_json(k): sanitize_json(v) for k, v in value.items()}
          if isinstance(value, list):
              return [sanitize_json(item) for item in value]
          return value

      netbox_url = sys.argv[1].rstrip("/")
      netbox_token = sys.argv[2]
      verify_ssl = sys.argv[3].lower() == "true"
      location_filter = (sys.argv[4] if len(sys.argv) > 4 else "").strip()

      session = requests.Session()
      session.headers.update(
          {
              "Authorization": f"Token {netbox_token}",
              "Accept": "application/json",
          }
      )

      def fetch_active_virtual_fws():
          results = []
          base_url = (
              f"{netbox_url}/api/plugins/custom-objects/virtual_fws/"
              f"?limit=100&fw_status=active"
          )
          next_url = base_url
          print(f"DEBUG: NetBox virtual_fws API URL: {base_url}", file=sys.stderr)
          while next_url:
              resp = session.get(next_url, verify=verify_ssl, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              page_results = data.get("results", [])
              print(
                  f"DEBUG: Fetched {len(page_results)} virtual firewalls from this page",
                  file=sys.stderr,
              )
              results.extend(page_results)
              next_url = data.get("next")
          print(
              f"DEBUG: Total virtual firewalls (active) from NetBox: {len(results)}",
              file=sys.stderr,
          )
          return results

      def location_matches(fw, needle):
          if not needle:
              return True
          loc = fw.get("lokasyon") or {}
          name = (loc.get("name") or loc.get("slug") or "").strip().lower()
          return needle in name

      all_fws = fetch_active_virtual_fws()
      needle = location_filter.lower()
      if needle:
          before = len(all_fws)
          all_fws = [fw for fw in all_fws if location_matches(fw, needle)]
          print(
              f"DEBUG: location_filter='{location_filter}': {before} -> {len(all_fws)} virtual firewalls",
              file=sys.stderr,
          )

      seen_ids = set()
      deduped = []
      for fw in all_fws:
          fid = fw.get("id")
          if fid is None or fid in seen_ids:
              continue
          seen_ids.add(fid)
          deduped.append(fw)

      def parse_vfw_ip(ip_port):
          s = str(ip_port or "").strip()
          if not s:
              return ""
          if ":" in s:
              return s.rsplit(":", 1)[0].strip()
          return s

      def composite_dedup_key(fw):
          ip = parse_vfw_ip(fw.get("ip_port"))
          host = str(fw.get("hostname") or "").strip().lower()
          if not ip or not host:
              return None
          return (ip, host)

      by_composite = {}
      no_composite = []
      skipped_duplicate_vfws = []
      for fw in deduped:
          key = composite_dedup_key(fw)
          if key is None:
              no_composite.append(fw)
              continue
          fid = fw.get("id")
          if key not in by_composite:
              by_composite[key] = fw
              continue
          existing = by_composite[key]
          existing_id = existing.get("id")
          keep_current = False
          if fid is not None and existing_id is not None:
              try:
                  keep_current = int(fid) < int(existing_id)
              except (TypeError, ValueError):
                  keep_current = False
          if keep_current:
              skipped_duplicate_vfws.append(
                  {
                      "id": existing_id,
                      "hostname": existing.get("hostname"),
                      "ip": parse_vfw_ip(existing.get("ip_port")),
                      "kept_id": fid,
                      "reason": "Duplicate Loki VFW (same IP and hostname)",
                  }
              )
              by_composite[key] = fw
          else:
              skipped_duplicate_vfws.append(
                  {
                      "id": fid,
                      "hostname": fw.get("hostname"),
                      "ip": parse_vfw_ip(fw.get("ip_port")),
                      "kept_id": existing_id,
                      "reason": "Duplicate Loki VFW (same IP and hostname)",
                  }
              )

      deduped_final = list(by_composite.values()) + no_composite
      if skipped_duplicate_vfws:
          print(
              f"DEBUG: Skipped {len(skipped_duplicate_vfws)} duplicate virtual firewalls "
              f"(same IP+hostname, kept lowest id)",
              file=sys.stderr,
          )
          for row in skipped_duplicate_vfws:
              print(
                  f"DEBUG: Skipped VFW id={row.get('id')} hostname={row.get('hostname')} "
                  f"ip={row.get('ip')} kept_id={row.get('kept_id')}",
                  file=sys.stderr,
              )

      result = {
          "virtual_fws": deduped_final,
          "virtual_fws_count": len(deduped_final),
          "skipped_duplicate_vfws": skipped_duplicate_vfws,
      }
      print(json.dumps(sanitize_json(result), ensure_ascii=False, default=str))
    dest: "/tmp/fetch_all_netbox_virtual_fws.py"
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Run virtual firewall fetch script
  command: >
    python3 /tmp/fetch_all_netbox_virtual_fws.py
    "{{ netbox_url }}"
    "{{ netbox_token }}"
    "{{ netbox_verify_ssl | string }}"
    "{{ location_filter | default('') | string }}"
  register: fetch_virtual_fws_result
  changed_when: false
  delegate_to: localhost

- name: Display virtual FW fetch script stderr
  debug:
    msg: "{{ fetch_virtual_fws_result.stderr_lines | default([]) | join('\n') }}"
  when: fetch_virtual_fws_result.stderr_lines is defined and fetch_virtual_fws_result.stderr_lines | length > 0

- name: Parse fetched virtual firewalls
  set_fact:
    netbox_virtual_fws_raw: "{{ (fetch_virtual_fws_result.stdout | from_json).virtual_fws }}"
    netbox_virtual_fws_count: "{{ (fetch_virtual_fws_result.stdout | from_json).virtual_fws_count }}"

- name: Display virtual firewalls fetch results
  debug:
    msg: |
      ============================================
      NETBOX VIRTUAL FIREWALLS FETCH RESULTS
      ============================================
      Active virtual firewalls count: {{ netbox_virtual_fws_count }}
      ============================================
