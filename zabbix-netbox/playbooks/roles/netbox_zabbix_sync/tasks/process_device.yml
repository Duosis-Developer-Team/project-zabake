---
- name: Reset device processing variables
  set_fact:
    device_result: {}
    current_device_result: {}
    device_info: {}
    zbx_existing_host: {}
    zbx_scenario: "create"
  run_once: false

- name: Extract izlenmeli raw value on device
  set_fact:
    device_izlenmeli_raw: "{{ netbox_device.izlenmeli | default(None) }}"

- name: Check izlenmeli flag on device
  set_fact:
    device_izlenmeyecek: >-
      {% set val = device_izlenmeli_raw %}
      {% if val is none or val == '' or val == 'None' %}
      False
      {% else %}
      {% set txt = (val | string) | lower %}
      {{ txt in ['hayir', 'hayır', 'no', '0', 'false'] }}
      {% endif %}

- name: Debug izlenmeli evaluation on device
  debug:
    msg: >
      Device {{ netbox_device.name }} - izlenmeli_raw={{ device_izlenmeli_raw | default('UNSET') }},
      device_izlenmeyecek={{ device_izlenmeyecek | default(false) }}
  when: report_izlenmeyecek | default(true) | bool

- name: Record device marked as not to be monitored
  set_fact:
    current_device_result:
      hostname: "{{ netbox_device.name | default('N/A') }}"
      device_role: "{{ netbox_device.device_role_name | default('N/A') }}"
      status: "atlandı"
      reason: "İzlenmeyecek olarak işaretli"
      ip: "{{ netbox_device.primary_ip_address | default('N/A') }}"
      location: "{{ netbox_device.location_name | default(netbox_device.site_name | default('N/A')) }}"
      site: "{{ netbox_device.site_name | default('N/A') }}"
      tenant: "{{ netbox_device.tenant_name | default('N/A') }}"
      ownership: "{{ netbox_device.sahiplik | default('N/A') }}"
  when:
    - device_izlenmeyecek | default(false) | bool
    - report_izlenmeyecek | default(true) | bool

- name: Create temporary Python script for device processing
  copy:
    content: |
      #!/usr/bin/env python3
      import json
      import sys
      import os
      import yaml

      # ============= YAML CONFIG LOADING =============

      def load_yaml_config(config_path):
          try:
              if os.path.exists(config_path):
                  with open(config_path, 'r') as f:
                      return yaml.safe_load(f)
          except Exception as e:
              print(f"Warning: Failed to load config {config_path}: {e}", file=sys.stderr)
          return None

      # ============= GENERIC ATTRIBUTE EXTRACTION =============

      def extract_by_path(obj, path):
          """Extract value from flat or nested object using dot notation path."""
          if not obj or not path:
              return None
          keys = path.split('.')
          current = obj
          for key in keys:
              if current is None:
                  return None
              if isinstance(current, dict):
                  current = current.get(key)
              else:
                  return None
          return current

      def extract_by_path_with_fallback(obj, path, fallback_paths=None):
          value = extract_by_path(obj, path)
          if value is not None and value != '':
              return value
          if fallback_paths:
              if isinstance(fallback_paths, str):
                  fallback_paths = [fallback_paths]
              for fp in fallback_paths:
                  value = extract_by_path(obj, fp)
                  if value is not None and value != '':
                      return value
          return None

      # ============= MAPPING CONDITIONS =============

      def check_condition(device, condition_key, condition_value):
          if condition_key == 'device_role':
              role = (device.get('device_role_name') or '').upper()
              if isinstance(condition_value, list):
                  return role in [v.upper() for v in condition_value]
              return role == condition_value.upper()

          elif condition_key == 'manufacturer':
              manufacturer = (device.get('manufacturer_name') or '').upper()
              if isinstance(condition_value, list):
                  return manufacturer in [v.upper() for v in condition_value]
              return manufacturer == condition_value.upper()

          elif condition_key == 'model_contains':
              model = (device.get('device_model') or '').upper()
              if isinstance(condition_value, list):
                  return any(item.upper() in model for item in condition_value)
              return condition_value.upper() in model

          elif condition_key == 'model_suffix':
              model = (device.get('device_model') or '').upper()
              if isinstance(condition_value, list):
                  return any(model.endswith(item.upper()) for item in condition_value)
              return model.endswith(condition_value.upper())

          elif condition_key == 'name_contains':
              device_name = (device.get('name') or '').upper()
              if isinstance(condition_value, list):
                  return any(item.upper() in device_name for item in condition_value)
              return condition_value.upper() in device_name

          return False

      def find_matching_mapping(device, device_type_mapping):
          mappings = device_type_mapping.get('mappings', [])
          sorted_mappings = sorted(mappings, key=lambda x: x.get('priority', 999))
          for mapping in sorted_mappings:
              conditions = mapping.get('conditions', {})
              if all(check_condition(device, k, v) for k, v in conditions.items()):
                  return mapping
          return None

      def determine_device_type(device, device_type_mapping):
          m = find_matching_mapping(device, device_type_mapping)
          return m.get('device_type') if m else None

      # ============= DB-NATIVE FIELD EXTRACTORS =============

      def get_primary_ip(device):
          """Read primary IP directly from flat DB field."""
          ip = device.get('primary_ip_address')
          if not ip:
              return None
          ip = str(ip).strip()
          return ip.split('/')[0] if '/' in ip else ip

      def get_location_name(device):
          """
          Return the DC_ID location label using DB fallback chain:
          root_location_name → location_parent_name → location_name → site_name
          """
          return (
              device.get('root_location_name') or
              device.get('location_parent_name') or
              device.get('location_name') or
              device.get('site_name') or
              ''
          )

      def normalize_netbox_choice_field(value):
          if value is None:
              return ''
          if isinstance(value, list) and len(value) > 0:
              return str(value[0]).strip()
          return str(value).strip()

      # ============= HOST GROUPS EXTRACTION =============

      def extract_host_groups_from_config(device, config, device_type, templates):
          groups = []

          if config is None:
              if device_type:
                  groups.append(device_type)
              location_name = get_location_name(device)
              if location_name:
                  groups.append(location_name)
              sahiplik = device.get('sahiplik') or (device.get('custom_fields') or {}).get('Sahiplik', '')
              if sahiplik:
                  groups.append(str(sahiplik).strip())
              return ','.join(groups) if groups else ''

          sources = config.get('host_groups', {}).get('sources', [])
          settings = config.get('host_groups', {}).get('settings', {})
          sorted_sources = sorted(sources, key=lambda x: x.get('priority', 999))

          for source in sorted_sources:
              if not source.get('enabled', True):
                  continue
              source_type = source.get('type')
              value = None

              if source_type == 'mapping_result':
                  value = device_type

              elif source_type == 'netbox_attribute':
                  path = source.get('path')
                  fallback = source.get('fallback')
                  value = extract_by_path_with_fallback(device, path, fallback)

              elif source_type == 'custom_field':
                  field_name = source.get('field_name')
                  value = (device.get('custom_fields') or {}).get(field_name)

              elif source_type == 'computed':
                  compute_func = source.get('compute_function')
                  if compute_func == 'get_location_name':
                      value = get_location_name(device)

              elif source_type == 'template_mapping':
                  attr = source.get('attribute', 'host_groups')
                  template_groups = []
                  for template in templates:
                      if attr in template:
                          template_groups.extend(template.get(attr, []))
                  if template_groups:
                      groups.extend(template_groups)
                      continue

              if value and value != '':
                  if settings.get('trim', True) and isinstance(value, str):
                      value = value.strip()
                  groups.append(value)

          if settings.get('unique', True):
              seen = set()
              unique_groups = []
              for g in groups:
                  if g not in seen:
                      seen.add(g)
                      unique_groups.append(g)
              groups = unique_groups

          if settings.get('skip_empty', True):
              groups = [g for g in groups if g and g != '']

          separator = settings.get('separator', ',')
          return separator.join(groups) if groups else ''

      def extract_host_groups(device, device_type):
          return extract_host_groups_from_config(device, None, device_type, [])

      # ============= TAGS EXTRACTION =============

      def extract_hall(device):
          description = device.get('location_description')
          if description:
              return description
          return device.get('location_name') or None

      def extract_tags_from_config(device, config, device_type=None, templates=None):
          tags = {}
          loki_tags = []

          if config is None:
              return extract_tags_original(device)

          definitions = config.get('tags', {}).get('definitions', [])
          settings = config.get('tags', {}).get('settings', {})

          for tag_def in definitions:
              if not tag_def.get('enabled', True):
                  continue

              tag_name = tag_def.get('tag_name')
              source_type = tag_def.get('source_type')
              value = None

              if source_type == 'netbox_attribute':
                  path = tag_def.get('path')
                  fallback = tag_def.get('fallback')
                  value = extract_by_path_with_fallback(device, path, fallback)
                  transform = tag_def.get('transform')
                  if transform == 'to_string' and value is not None:
                      value = str(value)

              elif source_type == 'custom_field':
                  field_name = tag_def.get('field_name')
                  value = (device.get('custom_fields') or {}).get(field_name)

              elif source_type == 'computed':
                  compute_func = tag_def.get('compute_function')
                  if compute_func == 'extract_hall':
                      value = extract_hall(device)
                  elif compute_func == 'get_location_name':
                      value = get_location_name(device)

              elif source_type == 'mapping_result':
                  value = device_type

              elif source_type == 'template_mapping':
                  if templates:
                      attr = tag_def.get('attribute', 'host_groups')
                      template_groups = []
                      for template in templates:
                          if attr in template:
                              template_groups.extend(template.get(attr, []))
                      if template_groups:
                          separator = tag_def.get('separator', ',')
                          value = separator.join(template_groups)

              elif source_type == 'array_expansion':
                  path = tag_def.get('path')
                  prefix = tag_def.get('prefix', '')
                  if path == 'tags':
                      # DB format: tags are in tags1_name...tags5_name columns
                      tag_values = [
                          device.get(f'tags{i}_name')
                          for i in range(1, 6)
                          if device.get(f'tags{i}_name')
                      ]
                  else:
                      raw = extract_by_path(device, path)
                      tag_values = []
                      if raw and isinstance(raw, list):
                          for item in raw:
                              if isinstance(item, dict):
                                  n = item.get('name')
                              elif isinstance(item, str):
                                  n = item
                              else:
                                  n = None
                              if n:
                                  tag_values.append(n)
                  for item_name in tag_values:
                      item_name = str(item_name)
                      loki_tags.append(item_name)
                      tags[f'{prefix}{item_name}'] = item_name
                  continue

              if value is not None and value != '':
                  if settings.get('trim', True) and isinstance(value, str):
                      value = value.strip()
                  if settings.get('treat_empty_as_none', True) and value == '':
                      continue
                  tags[tag_name] = value

          if settings.get('skip_none', True):
              tags = {k: v for k, v in tags.items() if v is not None}
          if settings.get('skip_empty', True):
              tags = {k: v for k, v in tags.items() if v != ''}

          return tags, loki_tags

      def extract_tags_original(device):
          tags = {}
          loki_tags = []

          if device.get('manufacturer_name'):
              tags['Manufacturer'] = device['manufacturer_name']
          if device.get('device_model'):
              tags['Device_Type'] = device['device_model']

          location_name = device.get('location_name') or ''
          site_name = device.get('site_name') or ''
          if location_name:
              tags['Location_Detail'] = location_name
          elif site_name:
              tags['Location_Detail'] = site_name
          if site_name:
              tags['City'] = site_name

          if device.get('tenant_name'):
              tags['Tenant'] = device['tenant_name']

          # Ownership: prefer direct sahiplik field, fallback to custom_fields
          sahiplik = device.get('sahiplik') or ''
          if not sahiplik:
              sahiplik = (device.get('custom_fields') or {}).get('Sahiplik', '') or ''
          if sahiplik:
              tags['Contact'] = str(sahiplik).strip()

          cf = device.get('custom_fields') or {}
          if cf.get('Sorumlu_Ekip'):
              tags['Sorumlu_Ekip'] = cf['Sorumlu_Ekip']

          if device.get('id'):
              tags['Loki_ID'] = str(device['id'])

          # Cluster from DB join field
          if device.get('cluster_name'):
              tags['Cluster'] = device['cluster_name']

          if device.get('rack_name'):
              tags['Rack'] = device['rack_name']

          # Hall from location_description or location_name
          location_desc = device.get('location_description') or ''
          if location_desc:
              tags['Hall'] = location_desc
          elif location_name:
              tags['Hall'] = location_name

          # Kurulum Tarihi: prefer direct field, fallback to custom_fields
          kurulum = device.get('kurulum_tarihi') or cf.get('Kurulum_Tarihi') or ''
          if kurulum:
              tags['Kurulum_Tarihi'] = str(kurulum)

          # Loki tags from tags1_name...tags5_name columns
          for tag_field in ['tags1_name', 'tags2_name', 'tags3_name', 'tags4_name', 'tags5_name']:
              tag_val = device.get(tag_field)
              if tag_val:
                  loki_tags.append(str(tag_val))

          tags = {k: v for k, v in tags.items() if v is not None and v != ''}
          return tags, loki_tags

      def extract_tags(device):
          return extract_tags_original(device)

      if __name__ == '__main__':
          device_file = sys.argv[1]
          device_type_mapping_file = sys.argv[2]
          host_groups_config_file = sys.argv[3] if len(sys.argv) > 3 else None
          tags_config_file = sys.argv[4] if len(sys.argv) > 4 else None
          templates_file = sys.argv[5] if len(sys.argv) > 5 else None

          with open(device_file, 'r') as f:
              device = json.load(f)

          with open(device_type_mapping_file, 'r') as f:
              device_type_mapping = json.load(f)

          matching_mapping = find_matching_mapping(device, device_type_mapping)

          host_groups_config = load_yaml_config(host_groups_config_file) if host_groups_config_file else None
          tags_config = load_yaml_config(tags_config_file) if tags_config_file else None
          templates = []

          if templates_file:
              templates_data = load_yaml_config(templates_file)
              if templates_data:
                  device_type_temp = matching_mapping.get('device_type') if matching_mapping else None
                  if device_type_temp and device_type_temp in templates_data:
                      templates = templates_data[device_type_temp]

          device_type = matching_mapping.get('device_type') if matching_mapping else None
          hostname_prefix = (matching_mapping.get('hostname_prefix') or '') if matching_mapping else ''
          hostname_suffix = (matching_mapping.get('hostname_suffix') or '') if matching_mapping else ''

          location_name = get_location_name(device)

          host_groups_str = extract_host_groups_from_config(device, host_groups_config, device_type, templates)
          tags_dict, loki_tags_list = extract_tags_from_config(device, tags_config, device_type, templates)

          if tags_config is None:
              for loki_tag in loki_tags_list:
                  if loki_tag:
                      tags_dict[f'Loki_Tag_{loki_tag}'] = loki_tag

          device_role = device.get('device_role_name') or ''
          tenant_name = (device.get('tenant_name') or '').strip()
          site_name = (device.get('site_name') or '').strip()

          # Ownership: prefer direct field, fallback to custom_fields
          sahiplik = device.get('sahiplik') or ''
          if not sahiplik:
              sahiplik = normalize_netbox_choice_field(
                  (device.get('custom_fields') or {}).get('Sahiplik')
              )

          result = {
              'device_type': device_type,
              'device_role': device_role,
              'primary_ip': get_primary_ip(device),
              'host_groups': host_groups_str,
              'tags': tags_dict,
              'loki_tags': loki_tags_list,
              'location': location_name,
              'dc_id': location_name if location_name else site_name,
              'tenant': tenant_name,
              'site': site_name,
              'ownership': sahiplik,
              'hostname_prefix': hostname_prefix,
              'hostname_suffix': hostname_suffix,
              'rack_name': device.get('rack_name') or '',
          }
          print(json.dumps(result))
    dest: "/tmp/netbox_device_processor.py"
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Save device JSON to temporary file
  copy:
    content: "{{ netbox_device | to_json }}"
    dest: "/tmp/netbox_device_{{ netbox_device.id | default('temp') }}.json"
  delegate_to: localhost

- name: Save device type mapping JSON to temporary file
  copy:
    content: "{{ device_type_mapping | to_json }}"
    dest: "/tmp/netbox_device_type_mapping_{{ netbox_device.id | default('temp') }}.json"
  delegate_to: localhost

- name: Check if host_groups_config exists
  stat:
    path: "{{ host_groups_config_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/host_groups_config.yml') }}"
  register: host_groups_config_stat
  delegate_to: localhost
  run_once: true

- name: Check if tags_config exists
  stat:
    path: "{{ tags_config_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/tags_config.yml') }}"
  register: tags_config_stat
  delegate_to: localhost
  run_once: true

- name: Check if templates file exists
  stat:
    path: "{{ templates_map_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/templates.yml') }}"
  register: templates_stat
  delegate_to: localhost
  run_once: true

- name: Process device with Python script
  command: >
    python3 /tmp/netbox_device_processor.py
    "/tmp/netbox_device_{{ netbox_device.id | default('temp') }}.json"
    "/tmp/netbox_device_type_mapping_{{ netbox_device.id | default('temp') }}.json"
    "{{ host_groups_config_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/host_groups_config.yml') if host_groups_config_stat.stat.exists else '' }}"
    "{{ tags_config_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/tags_config.yml') if tags_config_stat.stat.exists else '' }}"
    "{{ templates_map_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/templates.yml') if templates_stat.stat.exists else '' }}"
  register: device_processing_result
  changed_when: false
  delegate_to: localhost

- name: Parse device processing result
  set_fact:
    device_info: "{{ device_processing_result.stdout | from_json }}"

- name: Compute Zabbix hostname base (normalized device name)
  set_fact:
    zabbix_hostname_base: >-
      {{ netbox_device.name | default('') | replace('\t', ' ') | regex_replace('\\s+', ' ') | trim }}

- name: Compute final Zabbix hostname (mapping prefix/suffix)
  set_fact:
    zabbix_hostname_final: >-
      {{ ((device_info.hostname_prefix | default('', true) | string) ~ zabbix_hostname_base ~ (device_info.hostname_suffix | default('', true) | string)) | trim }}

- name: Check if host exists in Zabbix by Loki_ID
  set_fact:
    zbx_existing_host: "{{ zabbix_hosts_by_loki_id.get(device_info.tags.Loki_ID | string) }}"
  when:
    - zabbix_hosts_by_loki_id is defined
    - device_info.tags.Loki_ID is defined
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
    - zabbix_hosts_by_loki_id.get(device_info.tags.Loki_ID | string) is not none
    - zabbix_hosts_by_loki_id.get(device_info.tags.Loki_ID | string) != None

- name: Fallback to hostname matching if Loki_ID not found
  set_fact:
    zbx_existing_host: "{{ zabbix_hosts_by_hostname.get(zabbix_hostname_final) }}"
  when:
    - zbx_existing_host is not defined or zbx_existing_host == {} or zbx_existing_host.hostid is not defined
    - zabbix_hosts_by_hostname is defined
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
    - zabbix_hosts_by_hostname.get(zabbix_hostname_final) is not none
    - zabbix_hosts_by_hostname.get(zabbix_hostname_final) != None

- name: Determine scenario (create or update)
  set_fact:
    zbx_scenario: "{{ 'update' if (zbx_existing_host is defined and zbx_existing_host is not none and zbx_existing_host != None and zbx_existing_host.hostid is defined) else 'create' }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""

- name: Display scenario for device
  debug:
    msg: "Device {{ netbox_device.name }}: Scenario = {{ zbx_scenario }} ({{ 'Host exists in Zabbix' if (zbx_existing_host is defined and zbx_existing_host is not none and zbx_existing_host.hostid is defined) else 'New host - will be created' }})"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""

- name: Record skipped device (no device type)
  set_fact:
    device_result:
      hostname: "{{ netbox_device.name | default('N/A') }}"
      device_role: "{{ device_info.device_role | default('N/A') }}"
      status: "eklenemedi"
      reason: "Device type bulunamadı"
      ip: "{{ device_info.primary_ip | default('N/A') }}"
      location: "{{ device_info.location | default('N/A', true) }}"
      site: "{{ device_info.site | default('N/A', true) }}"
      tenant: "{{ device_info.tenant | default('N/A', true) }}"
      ownership: "{{ device_info.ownership | default('N/A', true) }}"
    current_device_result:
      hostname: "{{ netbox_device.name | default('N/A') }}"
      device_role: "{{ device_info.device_role | default('N/A') }}"
      status: "eklenemedi"
      reason: "Device type bulunamadı"
      ip: "{{ device_info.primary_ip | default('N/A') }}"
      location: "{{ device_info.location | default('N/A', true) }}"
      site: "{{ device_info.site | default('N/A', true) }}"
      tenant: "{{ device_info.tenant | default('N/A', true) }}"
      ownership: "{{ device_info.ownership | default('N/A', true) }}"
  when: device_info.device_type is none or device_info.device_type == ""
  run_once: false

- name: Record skipped device (no IP)
  set_fact:
    device_result:
      hostname: "{{ zabbix_hostname_final | default(netbox_device.name | default('N/A')) }}"
      device_role: "{{ device_info.device_role | default('N/A') }}"
      status: "eklenemedi"
      reason: "IP adresi bulunamadı"
      ip: "N/A"
      location: "{{ device_info.location | default('N/A', true) }}"
      site: "{{ device_info.site | default('N/A', true) }}"
      tenant: "{{ device_info.tenant | default('N/A', true) }}"
      ownership: "{{ device_info.ownership | default('N/A', true) }}"
    current_device_result:
      hostname: "{{ zabbix_hostname_final | default(netbox_device.name | default('N/A')) }}"
      device_role: "{{ device_info.device_role | default('N/A') }}"
      status: "eklenemedi"
      reason: "IP adresi bulunamadı"
      ip: "N/A"
      location: "{{ device_info.location | default('N/A', true) }}"
      site: "{{ device_info.site | default('N/A', true) }}"
      tenant: "{{ device_info.tenant | default('N/A', true) }}"
      ownership: "{{ device_info.ownership | default('N/A', true) }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - (device_info.primary_ip is none or device_info.primary_ip == "")
  run_once: false

- name: Skip device if no matching device type
  debug:
    msg: "Skipping device {{ netbox_device.name }} - no matching device type found"
  when: device_info.device_type is none or device_info.device_type == ""
  failed_when: false

- name: Skip device if no IP address
  debug:
    msg: "Skipping device {{ netbox_device.name }} - no primary IP address found"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - (device_info.primary_ip is none or device_info.primary_ip == "")
  failed_when: false

- name: Create Zabbix record
  set_fact:
    zbx_record:
      DEVICE_TYPE: "{{ device_info.device_type }}"
      DEVICE_ROLE: "{{ device_info.device_role | default('N/A') }}"
      HOST_IP: "{{ device_info.primary_ip }}"
      HOSTNAME: "{{ zabbix_hostname_final }}"
      DC_ID: "{{ device_info.location }}"
      HOST_GROUPS: "{{ device_info.host_groups }}"
      TEMPLATE_TYPE: ""
      MACROS: "{{ device_info.tags | to_json }}"
      REPORT_LOCATION: "{{ device_info.location | default('') }}"
      REPORT_SITE: "{{ device_info.site | default('') }}"
      REPORT_TENANT: "{{ device_info.tenant | default('') }}"
      REPORT_OWNERSHIP: "{{ device_info.ownership | default('') }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""

- name: Zabbix login to obtain auth token
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs }}"
    body:
      jsonrpc: "2.0"
      method: "user.login"
      params:
        username: "{{ zabbix_user }}"
        password: "{{ zabbix_password }}"
      id: 0
  register: zbx_login_resp
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
  run_once: true
  delegate_to: localhost

- name: Set zabbix_auth from login
  set_fact:
    zabbix_auth: "{{ zbx_login_resp.json.result }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
    - zbx_login_resp.json.result is defined
  run_once: true
  delegate_to: localhost

- name: Set variables for role
  set_fact:
    _zbx_record_for_role: "{{ zbx_record }}"
    _zabbix_auth_for_role: "{{ zabbix_auth }}"
    _zbx_existing_host_for_role: "{{ zbx_existing_host | default(omit) }}"
    _zbx_scenario_for_role: "{{ zbx_scenario | default('create') }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
    - zbx_record is defined
    - zabbix_auth is defined

- name: Process device with Zabbix host operations
  include_tasks: zabbix_host_operations.yml
  vars:
    zbx_record: "{{ _zbx_record_for_role }}"
    zabbix_url: "{{ zabbix_url }}"
    zabbix_user: "{{ zabbix_user }}"
    zabbix_password: "{{ zabbix_password }}"
    zabbix_validate_certs: "{{ zabbix_validate_certs }}"
    zabbix_auth: "{{ _zabbix_auth_for_role }}"
    zbx_existing_host: "{{ _zbx_existing_host_for_role }}"
    zbx_scenario: "{{ _zbx_scenario_for_role }}"
  when:
    - device_info.device_type is not none
    - device_info.device_type != ""
    - device_info.primary_ip is not none
    - device_info.primary_ip != ""
    - _zbx_record_for_role is defined
    - _zabbix_auth_for_role is defined

- name: Collect device result from zabbix host operations (if processed)
  set_fact:
    current_device_result: "{{ device_result }}"
  when:
    - device_result is defined
    - device_result | length > 0
    - device_result.hostname is defined

- name: Debug - Show current device result before save
  debug:
    msg: |
      Device: {{ netbox_device.name | default('Unknown') }}
      Result defined: {{ current_device_result is defined }}
      Result content: {{ current_device_result | default('NOT DEFINED') }}
  when: true

- name: Save device result to temporary file
  copy:
    content: "{{ current_device_result | to_json }}"
    dest: "/tmp/zabbix_host_operation_result_{{ netbox_device.id | default('unknown') }}.json"
  when:
    - current_device_result is defined
    - current_device_result | length > 0
  delegate_to: localhost
  run_once: false

# ─── HMDL Log ────────────────────────────────────────────────────────────────

- name: Build HMDL log entry base for device
  set_fact:
    _hmdl_log_entry:
      run_id: "{{ hmdl_run_id | default('') }}"
      awx_job_id: "{{ lookup('env', 'AWX_JOB_ID') | default('', true) }}"
      playbook_name: "{{ hmdl_playbook_name | default('db_to_zabbix_sync') }}"
      source_device_id: "{{ netbox_device.id | default(None) }}"
      source_device_name: "{{ netbox_device.name | default('') }}"
      zabbix_hostid: "{{ zbx_existing_host.hostid | default('') }}"
      zabbix_hostname: "{{ current_device_result.hostname | default(netbox_device.name | default('')) }}"
      zabbix_host_ip: "{{ current_device_result.ip | default('') }}"
      device_type: "{{ device_info.device_type | default('') }}"
      device_role: "{{ current_device_result.device_role | default('') }}"
      manufacturer_name: "{{ netbox_device.manufacturer_name | default('') }}"
      site_name: "{{ current_device_result.site | default(netbox_device.site_name | default('')) }}"
      location_name: "{{ netbox_device.location_name | default('') }}"
      location_parent_name: "{{ netbox_device.location_parent_name | default('') }}"
      root_location_name: "{{ netbox_device.root_location_name | default('') }}"
      tenant_name: "{{ current_device_result.tenant | default(netbox_device.tenant_name | default('')) }}"
      cluster_name: "{{ netbox_device.cluster_name | default('') }}"
      rack_name: "{{ netbox_device.rack_name | default('') }}"
      operation: "{{ zbx_scenario | default('none') }}"
      status: "{{ current_device_result.status | default('eklenemedi') }}"
      reason: "{{ current_device_result.reason | default('') }}"
      request_payload: "{{ zbx_record | default({}) }}"
      response_payload: {}
      error_payload: {}
  when:
    - hmdl_log_enabled | bool
    - current_device_result is defined
    - current_device_result | length > 0

- name: Set HMDL zabbix_hostid and response from create success
  set_fact:
    _hmdl_log_entry: >-
      {{ _hmdl_log_entry | combine({
        'zabbix_hostid': zbx_create_resp.json.result.hostids | first | default(''),
        'response_payload': zbx_create_resp.json.result
      }) }}
  when:
    - hmdl_log_enabled | bool
    - _hmdl_log_entry is defined
    - zbx_create_resp is defined
    - zbx_create_resp.json is defined
    - zbx_create_resp.json.result is defined
    - zbx_create_resp.json.result.hostids is defined

- name: Set HMDL error_payload from create failure
  set_fact:
    _hmdl_log_entry: "{{ _hmdl_log_entry | combine({'error_payload': zbx_create_resp.json.error}) }}"
  when:
    - hmdl_log_enabled | bool
    - _hmdl_log_entry is defined
    - zbx_create_resp is defined
    - zbx_create_resp.json is defined
    - zbx_create_resp.json.error is defined

- name: Set HMDL response_payload from update success
  set_fact:
    _hmdl_log_entry: "{{ _hmdl_log_entry | combine({'response_payload': zbx_update_resp.json.result}) }}"
  when:
    - hmdl_log_enabled | bool
    - _hmdl_log_entry is defined
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.result is defined

- name: Set HMDL error_payload from update failure
  set_fact:
    _hmdl_log_entry: "{{ _hmdl_log_entry | combine({'error_payload': zbx_update_resp.json.error}) }}"
  when:
    - hmdl_log_enabled | bool
    - _hmdl_log_entry is defined
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.error is defined

- name: Log device result to HMDL audit table
  include_tasks: hmdl_sync_log.yml
  vars:
    hmdl_log_device_id: "{{ netbox_device.id | default('proc') }}"
    hmdl_log_entry: "{{ _hmdl_log_entry }}"
  when:
    - hmdl_log_enabled | bool
    - _hmdl_log_entry is defined
