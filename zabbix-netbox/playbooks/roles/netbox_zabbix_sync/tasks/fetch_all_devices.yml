---
# Router: fetch devices from Loki (NetBox API) or Datalake (PostgreSQL discovery DB).

- name: Validate device_source parameter
  assert:
    that:
      - device_source | lower in ['loki', 'datalake']
    fail_msg: "device_source must be 'loki' or 'datalake' (got '{{ device_source }}')"

- name: Fetch devices from Datalake (PostgreSQL)
  include_tasks: fetch_all_devices_datalake.yml
  when: device_source | lower == 'datalake'

- name: Fetch devices from Loki (NetBox API)
  include_tasks: fetch_all_devices_loki.yml
  when: device_source | lower == 'loki'
