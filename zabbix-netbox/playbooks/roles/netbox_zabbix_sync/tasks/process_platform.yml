---
- name: Reset platform processing variables
  set_fact:
    platform_result: {}
    current_platform_result: {}
    platform_info: {}
  run_once: false

- name: Initialize platform DC usage map
  set_fact:
    platform_dc_usage: "{{ platform_dc_usage | default({}) }}"
  run_once: false

- name: Build basic platform info
  set_fact:
    platform_id: "{{ netbox_platform.id }}"
    platform_name: "{{ netbox_platform.name | default(netbox_platform.display | default('Unknown Platform')) }}"
    platform_manufacturer_name: "{{ netbox_platform.manufacturer.name | default('Unknown') if netbox_platform.manufacturer is defined and netbox_platform.manufacturer else 'Unknown' }}"
    platform_custom_fields: "{{ netbox_platform.custom_fields | default({}) }}"

- name: Extract izlenmeli raw value on platform
  set_fact:
    platform_izlenmeli_raw: >-
      {% set cf = platform_custom_fields | default({}) %}
      {% if cf.izlenmeli is defined %}
      {{ cf.izlenmeli }}
      {% elif cf.monitor_edilmeli_mi is defined %}
      {{ cf.monitor_edilmeli_mi }}
      {% else %}
      {{ None }}
      {% endif %}

- name: Check izlenmeli flag on platform
  set_fact:
    platform_izlenmeyecek: >-
      {% set val = platform_izlenmeli_raw %}
      {% if val is none %}
      False
      {% else %}
      {% if val is sequence and not (val is string) and (val | length) > 0 %}
      {% set choice = val[0] %}
      {% else %}
      {% set choice = val %}
      {% endif %}
      {% set txt = (choice | string) | lower %}
      {{ txt in ['hayir', 'hayır', 'no', '0', 'false'] }}
      {% endif %}

- name: Debug izlenmeli evaluation on platform
  debug:
    msg: >
      Platform {{ platform_name }} - izlenmeli_raw={{ platform_izlenmeli_raw | default('UNSET') }},
      platform_izlenmeyecek={{ platform_izlenmeyecek | default(false) }}
  when: report_izlenmeyecek | default(true) | bool

- name: Record platform marked as not to be monitored
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "atlandı"
      reason: "İzlenmeyecek olarak işaretli"
      ip: "{{ platform_custom_fields.ip_addresses | default('N/A') }}"
      location: "{{ platform_custom_fields.DC | default(platform_custom_fields.Site | default('N/A', true), true) }}"
      site: "{{ platform_custom_fields.Site | default('N/A', true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when:
    - platform_izlenmeyecek | default(false) | bool
    - report_izlenmeyecek | default(true) | bool

- name: Extract platform IP and other custom fields
  set_fact:
    platform_ip: "{{ platform_custom_fields.ip_addresses | default('') }}"
    platform_port: "{{ platform_custom_fields.Port | default('') }}"
    platform_url: "{{ platform_custom_fields.URL | default('') }}"
    platform_site: "{{ platform_custom_fields.Site | default('') }}"
    platform_dc: "{{ platform_custom_fields.DC | default('') }}"

- name: Determine platform site code for proxy and DC_ID
  set_fact:
    platform_site_code: "{{ platform_site | default(platform_dc) }}"

- name: Check platform site pattern validity
  set_fact:
    platform_site_valid: >-
      {{ (platform_site_code is string) and
         (platform_site_code | regex_search('(DC|AZ|ICT|UZ)[0-9]+', ignorecase=True) is not none) }}

- name: Record invalid site platform if reporting is enabled
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: "Standart dışı site kodu: {{ platform_site_code | default('N/A') }}"
      ip: "{{ platform_ip | default('N/A') }}"
      location: "{{ platform_site_code | default('N/A', true) }}"
      site: "{{ platform_site_code | default('N/A', true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when:
    - not platform_site_valid
    - report_izlenmeyecek | bool

- name: Ensure platform has IP address
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: "IP address is missing on platform"
      ip: "N/A"
      location: "{{ platform_site_code | default(platform_custom_fields.DC | default('N/A', true), true) }}"
      site: "{{ platform_site_code | default(platform_custom_fields.Site | default('N/A', true), true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when: platform_ip is undefined or platform_ip is none or platform_ip | string == ""

- name: Load platform mapping config
  set_fact:
    platform_mapping: "{{ lookup('file', platform_mapping_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/netbox_platform_mapping.yml')) | from_yaml }}"
  run_once: true
  delegate_to: localhost

- name: Find mapping for platform manufacturer
  set_fact:
    platform_mapping_entry: >-
      {%- set mfg = platform_manufacturer_name | string -%}
      {%- set entry = None -%}
      {%- for item in (platform_mapping.mappings | default([])) -%}
        {%- if item.manufacturer is defined and (item.manufacturer | string) | lower == mfg | lower -%}
          {%- set entry = item -%}
          {%- break -%}
        {%- endif -%}
      {%- endfor -%}
      {{ entry }}

- name: Record skipped platform when no mapping entry found
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: "No platform mapping found for manufacturer {{ platform_manufacturer_name }}"
      ip: "{{ platform_ip | default('N/A') }}"
      location: "{{ platform_dc | default(platform_site_code | default('N/A', true), true) }}"
      site: "{{ platform_site_code | default('N/A', true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when: platform_mapping_entry is not defined or platform_mapping_entry is none

- name: Resolve device_type and per-DC limit from mapping
  set_fact:
    platform_device_type: "{{ platform_mapping_entry.device_type }}"
    platform_limit_per_dc: "{{ platform_mapping_entry.limit_per_dc | default(0) | int }}"

- name: Apply per-DC limit for platform
  vars:
    _dc_code: "{{ platform_site_code }}"
    _usage_for_type: "{{ platform_dc_usage.get(platform_device_type, {}) }}"
    _current_count: "{{ _usage_for_type.get(_dc_code, 0) }}"
  set_fact:
    platform_dc_usage: >-
      {%- set usage = platform_dc_usage | default({}) | combine({}, recursive=True) -%}
      {%- set by_type = usage.get(platform_device_type, {}) -%}
      {%- set new_count = (_current_count | int) + 1 -%}
      {%- set _ = by_type.update({_dc_code: new_count}) -%}
      {%- set _ = usage.update({platform_device_type: by_type}) -%}
      {{ usage }}
  when:
    - platform_limit_per_dc | int == 0 or _current_count | int < platform_limit_per_dc | int

- name: Record skipped platform when per-DC limit exceeded
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: "DC limit exceeded for {{ platform_device_type }} in {{ platform_site_code }}"
      ip: "{{ platform_ip | default('N/A') }}"
      location: "{{ platform_dc | default(platform_site_code | default('N/A', true), true) }}"
      site: "{{ platform_site_code | default('N/A', true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when:
    - platform_limit_per_dc | int > 0
    - platform_dc_usage.get(platform_device_type, {}).get(platform_site_code, 0) | int > platform_limit_per_dc | int

- name: Select templates for platform from templates map
  set_fact:
    platform_templates: "{{ (templates_map[platform_device_type] | default([])) }}"

- name: Record skipped platform when no templates found for device_type
  set_fact:
    current_platform_result:
      hostname: "{{ platform_name }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: "No templates found for device_type {{ platform_device_type }}"
      ip: "{{ platform_ip | default('N/A') }}"
      location: "{{ platform_dc | default(platform_site_code | default('N/A', true), true) }}"
      site: "{{ platform_site_code | default('N/A', true) }}"
      tenant: "N/A"
      ownership: "N/A"
  when: platform_templates | length == 0

- name: Build base Zabbix tags for platform
  set_fact:
    platform_tags:
      IP: "{{ platform_ip }}"
      Port: "{{ platform_port | string }}"
      URL: "{{ platform_url | string }}"
      Site: "{{ platform_site_code | string }}"
      DC: "{{ platform_dc | string }}"
      Manufacturer: "{{ platform_manufacturer_name }}"
      Created: "{{ netbox_platform.created | default('') }}"
      Last_Updated: "{{ netbox_platform.last_updated | default('') }}"
      Loki_Platform_ID: "{{ platform_id | string }}"
      Loki_ID: "P_{{ platform_id | string }}"

- name: Determine platform host groups from templates
  set_fact:
    platform_host_groups: >-
      {{
        platform_templates
        | map(attribute='host_groups')
        | list
        | flatten
        | unique
        | join(',')
      }}

- name: Create Zabbix record for platform
  set_fact:
    zbx_record:
      DEVICE_TYPE: "{{ platform_device_type }}"
      DEVICE_ROLE: "PLATFORM"
      HOST_IP: "{{ platform_ip }}"
      HOSTNAME: "{{ platform_name }}"
      DC_ID: "{{ platform_site_code }}"
      HOST_GROUPS: "{{ platform_host_groups }}"
      TEMPLATE_TYPE: ""
      MACROS: "{{ platform_tags | to_json }}"
      REPORT_LOCATION: "{{ platform_dc | default(platform_site_code, true) | default('', true) }}"
      REPORT_SITE: "{{ platform_site_code | default('', true) }}"
      REPORT_TENANT: ""
      REPORT_OWNERSHIP: ""

- name: Ensure Zabbix auth token is available
  when: zabbix_auth is not defined
  block:
    - name: Zabbix login to obtain auth token for platforms
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ zabbix_validate_certs }}"
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 0
      register: zbx_login_resp_platform
      delegate_to: localhost
      run_once: true

    - name: Set zabbix_auth for platforms
      set_fact:
        zabbix_auth: "{{ zbx_login_resp_platform.json.result }}"
      when: zbx_login_resp_platform.json.result is defined
      delegate_to: localhost
      run_once: true

- name: Set variables for platform role
  set_fact:
    _zbx_record_for_platform: "{{ zbx_record }}"
    _zabbix_auth_for_platform: "{{ zabbix_auth }}"
  when:
    - zbx_record is defined
    - zabbix_auth is defined

- name: Process platform with Zabbix host operations
  include_tasks: zabbix_host_operations.yml
  vars:
    zbx_record: "{{ _zbx_record_for_platform }}"
    zabbix_url: "{{ zabbix_url }}"
    zabbix_user: "{{ zabbix_user }}"
    zabbix_password: "{{ zabbix_password }}"
    zabbix_validate_certs: "{{ zabbix_validate_certs }}"
    zabbix_auth: "{{ _zabbix_auth_for_platform }}"
    zbx_existing_host: "{{ omit }}"
    zbx_scenario: "create"
  when:
    - _zbx_record_for_platform is defined
    - _zabbix_auth_for_platform is defined

- name: Collect platform result from zabbix host operations (if processed)
  set_fact:
    current_platform_result: "{{ device_result }}"
  when:
    - device_result is defined
    - device_result | length > 0
    - device_result.hostname is defined

- name: Save platform result to temporary file
  copy:
    content: "{{ current_platform_result | to_json }}"
    dest: "/tmp/zabbix_platform_operation_result_{{ platform_id | default('unknown') }}.json"
  when:
    - current_platform_result is defined
    - current_platform_result | length > 0
  delegate_to: localhost
  run_once: false

