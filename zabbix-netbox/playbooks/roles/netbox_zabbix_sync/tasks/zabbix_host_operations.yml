---
- name: Reset per-record variables
  set_fact:
    _existing_interface: {}
    _interface_id: ""
    _zbx_interface_update: []
    _needs_update: false
    _updated_fields: ""
    _tags_needs_update: false
    _groups_needs_update: false
    _existing_tags_list: []
    _existing_hmdl_tags_map: {}
    _merged_tags_for_update: []
    _tag_change_log: []
    _effective_managed_tag_keys: []
    _platform_managed_tag_keys: []
    _host_update_params: {}
    _host_field_changes: []
  run_once: false

- name: Load tags config for managed tag keys
  set_fact:
    _tags_config_loaded: "{{ lookup('file', tags_config_path) | from_yaml }}"
  run_once: false

- name: Set HMDL managed tag keys from tags_config.yml
  set_fact:
    _hmdl_managed_tag_keys: >-
      {%- set keys = [] -%}
      {%- for defn in (_tags_config_loaded.tags.definitions | default([])) -%}
        {%- if defn.enabled | default(true) | bool -%}
          {%- set _ = keys.append(defn.tag_name) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ keys }}
  run_once: false

- name: Load platform tags config for managed tag keys
  set_fact:
    _platform_tags_config_loaded: "{{ lookup('file', platform_tags_config_path) | from_yaml }}"
  run_once: false

- name: Set platform managed tag keys from platform_tags_config.yml
  set_fact:
    _platform_managed_tag_keys: "{{ _platform_tags_config_loaded.platform_tags.managed_keys | default([]) }}"
  run_once: false

- name: Set effective managed tag keys for this record
  set_fact:
    _effective_managed_tag_keys: >-
      {{
        (_hmdl_managed_tag_keys | default([])) +
        (
          (_platform_managed_tag_keys | default([]))
          if (zbx_record.DEVICE_ROLE | default('') | string | upper == 'PLATFORM')
          else []
        )
      }}
  run_once: false

- name: Load mappings
  vars:
    _tpl_map_path: "{{ templates_map_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/templates.yml') }}"
    _type_map_path: "{{ (playbook_dir | default(ansible_playbook_directory)) + '/../mappings/template_types.yml' }}"
    _dc_map_path: "{{ datacenters_map_path | default((playbook_dir | default(ansible_playbook_directory)) + '/../mappings/datacenters.yml') }}"
  set_fact:
    zbx_tpl_map: "{{ lookup('file', _tpl_map_path) | from_yaml }}"
    zbx_type_map: "{{ lookup('file', _type_map_path) | from_yaml }}"
    zbx_dc_map: "{{ lookup('file', _dc_map_path) | from_yaml }}"

- name: Set default scenario if not provided
  set_fact:
    zbx_scenario: "{{ zbx_scenario | default('create') }}"
    zbx_existing_host: "{{ zbx_existing_host | default({}) }}"
    zbx_host_visible_name: "{{ zbx_record.HOST_VISIBLE_NAME | default(zbx_record.HOSTNAME, true) }}"
    _proxy_manual_change_detected: false
    _field_merge_actions: {}
    _manual_change_notes: []

- name: Parse tags from MACROS field
  vars:
    macros_raw: "{{ zbx_record.MACROS | default({}) }}"
    _macros_dict: "{{ macros_raw if macros_raw is mapping else (macros_raw | from_json if macros_raw is string else {}) }}"
  set_fact:
    zbx_tags: >-
      {%- if _macros_dict is mapping and _macros_dict | length > 0 -%}
      {%- set _tags = [] -%}
      {%- for key, value in _macros_dict.items() -%}
      {%- set _ = _tags.append({'tag': key, 'value': value | string}) -%}
      {%- endfor -%}
      {{ _tags }}
      {%- else -%}
      []
      {%- endif -%}

- name: Resolve templates for device type
  set_fact:
    zbx_templates: "{{ zbx_tpl_map.get(zbx_record.DEVICE_TYPE, []) }}"

- name: Extract template names and types
  set_fact:
    zbx_template_names: "{{ zbx_templates | map(attribute='name') | list }}"
    zbx_template_types: "{{ zbx_templates | map(attribute='type') | list | unique }}"

- name: Collect macros and host_groups from all templates
  vars:
    _all_macros: {}
    _all_host_groups: []
  set_fact:
    _all_macros: >-
      {%- set macros = {} -%}
      {%- for template in zbx_templates -%}
        {%- if template.macros is defined -%}
          {%- for macro_key, macro_value in template.macros.items() -%}
            {%- set _ = macros.update({macro_key: macro_value}) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ macros }}
    _template_host_groups: >-
      {%- set groups = [] -%}
      {%- for template in zbx_templates -%}
        {%- if template.host_groups is defined -%}
          {%- for group in template.host_groups -%}
            {%- set _ = groups.append(group) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ groups | unique }}

- name: Replace {HOST.IP} variable in macros
  vars:
    _processed_macros: {}
  set_fact:
    zbx_host_macros: >-
      {%- set macros = {} -%}
      {%- for macro_key, macro_value in _all_macros.items() -%}
        {%- set processed_value = macro_value | replace('{HOST.IP}', zbx_record.HOST_IP) -%}
        {%- set _ = macros.update({macro_key: processed_value}) -%}
      {%- endfor -%}
      {{ macros }}

- name: Format macros for Zabbix API
  set_fact:
    zbx_host_macros_formatted: >-
      {%- set formatted = [] -%}
      {%- for macro_key, macro_value in zbx_host_macros.items() -%}
        {%- set _ = formatted.append({'macro': macro_key, 'value': macro_value}) -%}
      {%- endfor -%}
      {{ formatted }}

- name: Fail if no templates found for device type
  fail:
    msg: "No templates mapped for DEVICE_TYPE='{{ zbx_record.DEVICE_TYPE }}'"
  when: zbx_template_names | length == 0

- name: Determine interface type from templates
  set_fact:
    zbx_iface_type: "{{ zbx_template_types[0] }}"

- name: Warn if multiple differing interface types found
  debug:
    msg: "Multiple template types found {{ zbx_template_types }}; using '{{ zbx_iface_type }}'"
  when: zbx_template_types | length > 1

- name: Resolve interface spec
  set_fact:
    zbx_iface: "{{ zbx_type_map.get(zbx_iface_type, {}).get('interface') }}"

- name: Get all proxy groups from Zabbix (if not already fetched)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "proxygroup.get"
      params:
        output: ["proxy_groupid", "name"]
      auth: "{{ zabbix_auth }}"
      id: 104
  register: zbx_proxy_groups_resp
  run_once: true
  delegate_to: localhost
  when: zbx_proxy_group_map is not defined

- name: Build proxy group name to ID map (if not already built)
  set_fact:
    zbx_proxy_group_map: "{{ zbx_proxy_groups_resp.json.result | items2dict(key_name='name', value_name='proxy_groupid') }}"
  run_once: true
  delegate_to: localhost
  when: zbx_proxy_group_map is not defined

- name: Resolve proxy group by location (DC_ID)
  vars:
    location_name: "{{ zbx_record.DC_ID | default('') }}"
    _dc_number: "{{ (location_name | default('') | upper | regex_search('(DC|AZ|ICT|UZ)[0-9]+')) | default('') }}"
  set_fact:
    zbx_location_name: "{{ location_name }}"
    zbx_dc_number: "{{ _dc_number }}"
    zbx_matched_proxy_group: ""
    zbx_proxy_group_id: ""
    zbx_monitored_by: "0"

- name: Find matching proxy group
  vars:
    pg_name: "{{ proxy_group_item }}"
    pg_upper: "{{ proxy_group_item | upper }}"
    # Extract location code from proxy group name (supports DC/AZ/ICT/UZ prefixes)
    # Example: 'DC11-Proxy Group' -> 'DC11', 'AZ11-PROXY' -> 'AZ11'
    pg_dc_num: "{{ (pg_upper | regex_replace('[-\\s]*PROXY.*$', '') | trim | regex_search('(DC|AZ|ICT|UZ)[0-9]+')) | default('') }}"
  set_fact:
    zbx_matched_proxy_group: "{{ proxy_group_item }}"
    zbx_proxy_group_id: "{{ zbx_proxy_group_map[proxy_group_item] }}"
    zbx_monitored_by: "2"
  loop: "{{ zbx_proxy_group_map.keys() | list if zbx_proxy_group_map is defined else [] }}"
  loop_control:
    loop_var: proxy_group_item
    label: "{{ proxy_group_item }} (DC: {{ pg_dc_num }}, Match: {{ (zbx_dc_number | string | upper == pg_dc_num | string | upper) | bool }})"
  when: 
    - zbx_dc_number is defined
    - zbx_dc_number != ''
    - zbx_dc_number | string | upper == pg_dc_num | string | upper

- name: Initialize merged proxy_group_by_dc from templates
  set_fact:
    _zbx_merged_pg_by_dc: {}

- name: Merge proxy_group_by_dc from each template row
  set_fact:
    _zbx_merged_pg_by_dc: "{{ _zbx_merged_pg_by_dc | combine(item.proxy_group_by_dc) }}"
  loop: "{{ zbx_templates | default([]) }}"
  when: item.proxy_group_by_dc is defined

- name: Override proxy group from template static mapping (proxy_group_by_dc)
  vars:
    _dc_key: "{{ zbx_dc_number | default('', true) | string | trim | upper }}"
    _static_pg_name: "{{ _zbx_merged_pg_by_dc[_dc_key] if (_zbx_merged_pg_by_dc is defined and _dc_key != '' and _dc_key in _zbx_merged_pg_by_dc) else '' }}"
  set_fact:
    zbx_matched_proxy_group: "{{ _static_pg_name }}"
    zbx_proxy_group_id: "{{ zbx_proxy_group_map[_static_pg_name] }}"
    zbx_monitored_by: "2"
  when:
    - _static_pg_name | default('') | length > 0
    - zbx_proxy_group_map is defined
    - _static_pg_name in zbx_proxy_group_map

- name: Debug proxy group matching
  vars:
    _test_pg_numeric: "Dc14-proxy Group"
    _test_pg_alpha: "Ict11-Proxy Group"
    _test_upper_numeric: "{{ _test_pg_numeric | upper }}"
    _test_upper_alpha: "{{ _test_pg_alpha | upper }}"
    _test_dc_num_numeric: "{{ _test_upper_numeric | regex_replace('[-\\s]*PROXY.*$', '') | regex_replace('^DC', '') | trim }}"
    _test_dc_num_alpha: "{{ _test_upper_alpha | regex_replace('[-\\s]*PROXY.*$', '') | regex_replace('^DC', '') | trim }}"
  debug:
    msg: |
      Location: {{ zbx_location_name }}
      DC Number: {{ zbx_dc_number }}
      Matched proxy group: {{ zbx_matched_proxy_group }}
      Proxy group ID: {{ zbx_proxy_group_id }}
      Test Numeric - PG: {{ _test_pg_numeric }}, Upper: {{ _test_upper_numeric }}, Extracted: {{ _test_dc_num_numeric }}
      Test Alpha - PG: {{ _test_pg_alpha }}, Upper: {{ _test_upper_alpha }}, Extracted: {{ _test_dc_num_alpha }}
      Available proxy groups: {{ zbx_proxy_group_map.keys() | list if zbx_proxy_group_map is defined else [] }}

- name: Debug template names
  debug:
    msg: "Looking for templates: {{ zbx_template_names }}"

- name: Resolve template IDs by name
  vars:
    _tpl_get_body: |
      {
        "jsonrpc": "2.0",
        "method": "template.get",
        "params": {"output": ["templateid","name"], "filter": {"name": %s}},
        "auth": "%s",
        "id": 1001
      }
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body: "{{ _tpl_get_body | format(zbx_template_names | to_json, zabbix_auth) | from_json }}"
  register: zbx_tpl_get_resp

- name: Debug template response
  debug:
    msg: "Template response: {{ zbx_tpl_get_resp.json.result | default([]) }}"

- name: Deduplicate template rows by templateid
  set_fact:
    zbx_tpl_unique_templates: "{{ zbx_tpl_get_resp.json.result | default([]) | unique(attribute='templateid') }}"

- name: Init template id list
  set_fact:
    zbx_template_id_list: []

- name: Append each templateid as dict
  set_fact:
    zbx_template_id_list: "{{ zbx_template_id_list + [ { 'templateid': template_item.templateid } ] }}"
  loop: "{{ zbx_tpl_unique_templates | default([]) }}"
  loop_control:
    loop_var: template_item
  when: zbx_tpl_unique_templates | default([]) | length > 0

- name: Unique template names expected from mapping
  set_fact:
    zbx_template_names_expected: "{{ zbx_template_names | unique | list }}"

- name: Template names returned by Zabbix API
  set_fact:
    zbx_templates_found_names: "{{ zbx_tpl_get_resp.json.result | default([]) | map(attribute='name') | list | unique | list }}"

- name: Template names missing in Zabbix
  set_fact:
    zbx_templates_missing_names: "{{ zbx_template_names_expected | difference(zbx_templates_found_names) }}"

- name: Warn if no templates found
  debug:
    msg: "WARNING: No templates found for device type '{{ zbx_record.DEVICE_TYPE }}'. Template names searched: {{ zbx_template_names }}"
  when: zbx_template_id_list | length == 0

- name: Collect required host groups for this record
  vars:
    _csv_group_names: "{{ (zbx_record.HOST_GROUPS | default('')).split(',') | map('trim') | reject('equalto', '') | list }}"
    _template_groups: "{{ _template_host_groups | default([]) }}"
    _all_target_groups: "{{ (_csv_group_names + _template_groups + [zbx_record.DEVICE_TYPE]) | unique }}"
  set_fact:
    zbx_required_groups_for_record: "{{ _all_target_groups }}"

- name: Initialize zbx_group_map if not defined
  set_fact:
    zbx_group_map: {}
  when: zbx_group_map is not defined

- name: Identify groups not yet in map
  vars:
    _groups_in_map: "{{ zbx_group_map.keys() | list }}"
  set_fact:
    zbx_groups_not_in_map: "{{ zbx_required_groups_for_record | difference(_groups_in_map) }}"

- name: Debug - Show group mapping status
  debug:
    msg: |
      Host: {{ zbx_record.HOSTNAME }}
      Required groups: {{ zbx_required_groups_for_record }}
      Groups already in map: {{ zbx_group_map.keys() | list }}
      Groups to process: {{ zbx_groups_not_in_map }}
  when: zbx_groups_not_in_map | length > 0

- name: Process missing groups (query and create if needed)
  when: zbx_groups_not_in_map | length > 0
  block:
    - name: Get existing host groups from Zabbix for missing groups
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ zabbix_validate_certs | default(false) }}"
        body:
          jsonrpc: "2.0"
          method: "hostgroup.get"
          params:
            output: ["groupid", "name"]
            filter:
              name: "{{ zbx_groups_not_in_map }}"
          auth: "{{ zabbix_auth }}"
          id: 101
      register: zbx_existing_groups_resp
      delegate_to: localhost

    - name: Identify groups that need to be created
      vars:
        _existing_names: "{{ zbx_existing_groups_resp.json.result | map(attribute='name') | list }}"
      set_fact:
        zbx_groups_to_create: "{{ zbx_groups_not_in_map | difference(_existing_names) }}"
      delegate_to: localhost

    - name: Create missing host groups in Zabbix
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ zabbix_validate_certs | default(false) }}"
        body:
          jsonrpc: "2.0"
          method: "hostgroup.create"
          params:
            name: "{{ missing_group_item }}"
          auth: "{{ zabbix_auth }}"
          id: 102
      loop: "{{ zbx_groups_to_create }}"
      loop_control:
        loop_var: missing_group_item
      register: zbx_created_groups_resp
      delegate_to: localhost
      when: zbx_groups_to_create | length > 0

    - name: Fetch all processed groups to get their IDs
      uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        validate_certs: "{{ zabbix_validate_certs | default(false) }}"
        body:
          jsonrpc: "2.0"
          method: "hostgroup.get"
          params:
            output: ["groupid", "name"]
            filter:
              name: "{{ zbx_groups_not_in_map }}"
          auth: "{{ zabbix_auth }}"
          id: 103
      register: zbx_fetched_groups_resp
      delegate_to: localhost

    - name: Update zbx_group_map with newly processed groups
      vars:
        _new_groups_map: "{{ zbx_fetched_groups_resp.json.result | items2dict(key_name='name', value_name='groupid') }}"
      set_fact:
        zbx_group_map: "{{ zbx_group_map | combine(_new_groups_map) }}"
      delegate_to: localhost

- name: Initialize group ID list
  set_fact:
    zbx_group_id_list: []
    zbx_groups_formatted: []

- name: Resolve Group IDs from map
  set_fact:
    zbx_group_id_list: "{{ zbx_group_id_list + [zbx_group_map[group_name]] }}"
    zbx_groups_formatted: "{{ zbx_groups_formatted + [{'groupid': zbx_group_map[group_name]}] }}"
  loop: "{{ zbx_required_groups_for_record }}"
  loop_control:
    loop_var: group_name
  when: group_name is defined and group_name in zbx_group_map

- name: Set tags for host creation (only used during create, NOT update)
  set_fact:
    zbx_continuous_tags: "{{ zbx_tags | default([]) }}"
  when: zbx_tags is defined

- name: Validate required parameters before create
  set_fact:
    _missing_params: []
    _validation_errors: []
  when: zbx_scenario == 'create'

- name: Check if hostname is missing
  set_fact:
    _missing_params: "{{ _missing_params + ['host'] }}"
    _validation_errors: "{{ _validation_errors + ['Hostname eksik'] }}"
  when:
    - zbx_scenario == 'create'
    - zbx_record.HOSTNAME is not defined or zbx_record.HOSTNAME == ""

- name: Check if IP is missing
  set_fact:
    _missing_params: "{{ _missing_params + ['ip'] }}"
    _validation_errors: "{{ _validation_errors + ['IP adresi eksik'] }}"
  when:
    - zbx_scenario == 'create'
    - zbx_record.HOST_IP is not defined or zbx_record.HOST_IP == ""

- name: Check if template is missing or not all names resolved in Zabbix
  set_fact:
    _missing_params: "{{ _missing_params + ['template'] }}"
    _validation_errors: "{{ _validation_errors + [_template_validation_msg] }}"
  vars:
    _template_validation_msg: >-
      {% if zbx_templates_missing_names | default([]) | length > 0 -%}
      Zabbix'te bulunamayan şablonlar: {{ zbx_templates_missing_names | join(', ') }}
      {%- else -%}
      Template bulunamadı (Zabbix'te eşleşen şablon yok)
      {%- endif %}
  when:
    - zbx_scenario == 'create'
    - (zbx_template_id_list | default([]) | length == 0) or (zbx_templates_missing_names | default([]) | length > 0)

- name: Check if proxy group is missing (when DC_ID is provided)
  vars:
    _error_msg: "Proxy group bulunamadı (DC_ID: {{ zbx_record.DC_ID | default('N/A') }})"
  set_fact:
    _missing_params: "{{ _missing_params + ['proxy group'] }}"
    _validation_errors: "{{ _validation_errors + [_error_msg] }}"
  when:
    - zbx_scenario == 'create'
    - zbx_record.DC_ID is defined
    - zbx_record.DC_ID != ""
    - zbx_proxy_group_id is not defined or zbx_proxy_group_id == ""

- name: Record validation failure
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME | default('N/A') }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "eklenemedi"
      reason: "{{ _validation_errors | join(', ') }}"
      ip: "{{ zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length > 0

- name: Build interface for create
  set_fact:
    _zbx_interface_create: "{{ [{'type': zbx_iface.type, 'main': 1, 'useip': 1, 'ip': zbx_record.HOST_IP, 'dns': zbx_iface.dns | default(''), 'port': (zbx_iface.port | default(161)) | string, 'details': zbx_iface.details | default(omit)}] if (zbx_iface is not none and zbx_iface is mapping and zbx_iface.type is defined) else [] }}"
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0

- name: Debug - Show full create request body
  debug:
    msg: |
      ========================================
      ZABBIX API CREATE REQUEST
      ========================================
      Host: {{ zbx_record.HOSTNAME }}
      IP: {{ zbx_record.HOST_IP }}
      Device Type: {{ zbx_record.DEVICE_TYPE | default('N/A') }}
      Templates: {{ zbx_template_id_list | to_nice_json }}
      Groups: {{ zbx_groups_formatted | to_nice_json }}
      Interface: {{ _zbx_interface_create | to_nice_json }}
      Macros: {{ zbx_host_macros_formatted | to_nice_json }}
      Monitored By: {{ zbx_monitored_by }}
      Proxy Group ID: {{ zbx_proxy_group_id }}
      Tags: {{ zbx_tags | default([]) | to_nice_json }}
      ========================================
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0

- name: Create new host (scenario create)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.create"
      params:
        host: "{{ zbx_record.HOSTNAME }}"
        name: "{{ zbx_host_visible_name }}"
        status: "{{ zbx_record.HOST_STATUS | default(0) | int }}"
        interfaces: "{{ _zbx_interface_create }}"
        templates: "{{ zbx_template_id_list }}"
        groups: "{{ zbx_groups_formatted | default([]) }}"
        tags: "{{ zbx_tags | default(omit) }}"
        macros: "{{ zbx_host_macros_formatted if (zbx_host_macros_formatted is defined and zbx_host_macros_formatted | length > 0) else omit }}"
        monitored_by: "{{ zbx_monitored_by }}"
        proxy_groupid: "{{ zbx_proxy_group_id if (zbx_proxy_group_id is defined and zbx_proxy_group_id != '') else omit }}"
      auth: "{{ zabbix_auth }}"
      id: 1
  register: zbx_create_resp
  failed_when: false
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0
    - not (dry_run | default(false) | bool)

- name: Record create success
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "eklendi"
      reason: ""
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0
    - zbx_create_resp.json.result is defined
    - zbx_create_resp.json.error is not defined

- name: Record create failure
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "eklenemedi"
      reason: "{{ zbx_create_resp.json.error.message | default('Bilinmeyen hata') }}{{ (' — ' ~ (zbx_create_resp.json.error.data | string)) if (zbx_create_resp.json.error.data is defined and (zbx_create_resp.json.error.data | string | length) > 0) else '' }}"
      error_data: "{{ zbx_create_resp.json.error.data | default('') }}"
      error_code: "{{ zbx_create_resp.json.error.code | default('') }}"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0
    - zbx_create_resp.json.error is defined

- name: Debug - Show detailed create error
  debug:
    msg: |
      ========================================
      ZABBIX API CREATE ERROR
      ========================================
      Host: {{ zbx_record.HOSTNAME }}
      IP: {{ zbx_record.HOST_IP }}
      Error Message: {{ zbx_create_resp.json.error.message | default('N/A') }}
      Error Code: {{ zbx_create_resp.json.error.code | default('N/A') }}
      Error Data: {{ zbx_create_resp.json.error.data | default('N/A') | to_nice_json }}
      ========================================
      FULL RESPONSE:
      {{ zbx_create_resp.json | to_nice_json }}
      ========================================
  when:
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0
    - zbx_create_resp.json.error is defined

- name: On duplicate host create error, capture Loki_ID from tags for resolution
  set_fact:
    zbx_dup_loki: "{{ zbx_tags | default([]) | selectattr('tag', 'equalto', 'Loki_ID') | map(attribute='value') | list | first | default('', true) | string }}"
  when:
    - zbx_scenario == 'create'
    - zbx_create_resp.json.error is defined
    - >-
      (zbx_create_resp.json.error.message | default('')) is search('already exists')
      or (zbx_create_resp.json.error.data | default('') | string) is search('already exists')

- name: Compute duplicate-resolution candidate host after host.create error
  set_fact:
    _dup_resolved_candidate: >-
      {%- set resolved = {} -%}
      {%- if zbx_dup_loki | default('') | length > 0 and zabbix_hosts_by_loki_id is defined -%}
      {%- set by_loki = zabbix_hosts_by_loki_id.get(zbx_dup_loki, {}) -%}
      {%- if by_loki.hostid is defined -%}
      {%- set resolved = by_loki -%}
      {%- endif -%}
      {%- endif -%}
      {%- if resolved.hostid is not defined and zabbix_hosts_by_hostname is defined -%}
      {%- set by_host = zabbix_hosts_by_hostname.get(zbx_record.HOSTNAME, {}) -%}
      {%- if by_host.hostid is defined -%}
      {%- set resolved = by_host -%}
      {%- endif -%}
      {%- endif -%}
      {%- if resolved.hostid is not defined and zabbix_hosts_by_visible_name is defined -%}
      {%- set by_visible = zabbix_hosts_by_visible_name.get(zbx_host_visible_name, {}) -%}
      {%- if by_visible.hostid is defined -%}
      {%- set resolved = by_visible -%}
      {%- endif -%}
      {%- endif -%}
      {%- if resolved.hostid is not defined and zabbix_hosts_by_visible_name is defined -%}
      {%- set by_visible2 = zabbix_hosts_by_visible_name.get(zbx_record.HOST_VISIBLE_NAME | default(zbx_record.HOSTNAME, true), {}) -%}
      {%- if by_visible2.hostid is defined -%}
      {%- set resolved = by_visible2 -%}
      {%- endif -%}
      {%- endif -%}
      {{ resolved }}
  when:
    - zbx_scenario == 'create'
    - zbx_create_resp.json.error is defined
    - >-
      (zbx_create_resp.json.error.message | default('')) is search('already exists')
      or (zbx_create_resp.json.error.data | default('') | string) is search('already exists')

- name: Switch to update when duplicate resolved after host.create error
  set_fact:
    zbx_scenario: "update"
    zbx_existing_host: "{{ _dup_resolved_candidate }}"
  when:
    - zbx_scenario == 'create'
    - zbx_create_resp.json.error is defined
    - _dup_resolved_candidate is defined
    - _dup_resolved_candidate.hostid is defined

- name: DRY-RUN - Create preview summary
  debug:
    msg: |
      ========================================
      DRY-RUN: ZABBIX HOST CREATE PREVIEW
      ========================================
      Host          : {{ zbx_record.HOSTNAME }}
      IP            : {{ zbx_record.HOST_IP }}
      Device Type   : {{ zbx_record.DEVICE_TYPE | default('N/A') }}
      Zabbix'te Var : HAYIR (yeni host oluşturulacaktı)
      Template'ler  : {{ zbx_template_names | join(', ') }}
      Host Group'lar: {{ zbx_required_groups_for_record | join(', ') }}
      DC_ID         : {{ zbx_location_name }} → {{ zbx_matched_proxy_group | default('eşleşme yok') }} (proxy_groupid: {{ zbx_proxy_group_id | default('N/A') }})
      Monitored By  : {{ zbx_monitored_by }}
      Tag Sayısı    : {{ zbx_tags | default([]) | length }}
      Macro Sayısı  : {{ zbx_host_macros_formatted | default([]) | length }}
      ----------------------------------------
      DRY-RUN: host.create çağrısı YAPILMADI.
      ========================================
  when:
    - dry_run | default(false) | bool
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0

- name: DRY-RUN - Record create preview result
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "dry_run"
      reason: "Dry-run: host.create çağrısı yapılmadı — eklenecekti"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - dry_run | default(false) | bool
    - zbx_scenario == 'create'
    - _missing_params | default([]) | length == 0

- name: Validate required parameters before update
  set_fact:
    _missing_params: >-
      {{
        (_missing_params | default([])) +
        (['Proxy Group (DC_ID: ' + zbx_dc_number + ')'] if (zbx_dc_number is defined and zbx_dc_number != '' and (zbx_proxy_group_id is not defined or zbx_proxy_group_id == '')) else [])
      }}
  when: 
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined

- name: Record validation failure (update scenario)
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "eklenemedi"
      reason: "{{ 'Proxy group bulunamadı (DC_ID: ' + zbx_dc_number + ')' if (zbx_dc_number is defined and zbx_dc_number != '' and (zbx_proxy_group_id is not defined or zbx_proxy_group_id == '')) else 'Gerekli parametreler eksik: ' + (_missing_params | default([]) | join(', ')) }}"
      ip: "{{ zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length > 0

- name: Get existing interface for update
  set_fact:
    _existing_interface: "{{ zbx_existing_host.interfaces[0] | default({}) if (zbx_existing_host.interfaces | default([]) | length > 0) else {} }}"
    _interface_id: "{{ zbx_existing_host.interfaces[0].interfaceid | default('') if (zbx_existing_host.interfaces | default([]) | length > 0) else '' }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined

- name: Build existing tags list and managed tag map from zbx_existing_host
  vars:
    _raw_tags: "{{ zbx_existing_host.tags | default([]) }}"
  set_fact:
    _existing_tags_list: "{{ _raw_tags }}"
    _existing_hmdl_tags_map: >-
      {%- set m = {} -%}
      {%- for t in _raw_tags -%}
        {%- if t.tag in (_effective_managed_tag_keys | default([])) or t.tag.startswith('Loki_Tag_') -%}
          {%- set _ = m.update({t.tag: t.value}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ m }}
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined

- name: Merge tags for update via zabbix_merge_tags (dedupe by tag name)
  zabbix_merge_tags:
    existing_tags: "{{ zbx_existing_host.tags | default([]) }}"
    new_managed_tags: "{{ zbx_tags | default([]) }}"
    managed_keys: "{{ _effective_managed_tag_keys | default([]) }}"
  register: zbx_tag_merge
  delegate_to: localhost
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0

- name: Apply merged tags and change log from zabbix_merge_tags
  set_fact:
    _merged_tags_for_update: "{{ zbx_tag_merge.merged_tags | default([]) }}"
    _tag_change_log: "{{ zbx_tag_merge.change_log | default([]) }}"
    _tags_needs_update: "{{ zbx_tag_merge.tags_needs_update | default(false) | bool }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0
    - zbx_tag_merge is defined

- name: Compute merged host groups (preserve manual groups)
  vars:
    _current_group_names: "{{ zbx_existing_host.groups | default([]) | map(attribute='name') | list }}"
    # In update scenario, exclude template-sourced groups (from templates.yml host_groups)
    # from the "required" set. They are mapping defaults, not NetBox data.
    # Groups already present in Zabbix are preserved via _manual_groups regardless.
    _netbox_required_group_names: "{{ zbx_required_groups_for_record | default([]) | difference(_template_host_groups | default([])) }}"
    _required_group_names: "{{ _netbox_required_group_names }}"
    _required_set: "{{ _netbox_required_group_names }}"
    _manual_groups: "{{ _current_group_names | difference(_required_set) | list }}"
    _merged_group_names: "{{ (_required_group_names + _manual_groups) | unique | list }}"
  set_fact:
    _merged_group_names: "{{ _merged_group_names }}"
    _groups_needs_update: "{{ (_current_group_names | sort) != (_merged_group_names | sort) }}"
    zbx_required_groups_for_record: "{{ _merged_group_names }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0

- name: Rebuild group ID list after merged host groups
  set_fact:
    zbx_group_id_list: []
    zbx_groups_formatted: []
  when:
    - zbx_scenario == 'update'
    - _groups_needs_update | default(false) | bool

- name: Resolve merged group IDs from map
  set_fact:
    zbx_group_id_list: "{{ zbx_group_id_list + [zbx_group_map[group_name]] }}"
    zbx_groups_formatted: "{{ zbx_groups_formatted + [{'groupid': zbx_group_map[group_name]}] }}"
  loop: "{{ zbx_required_groups_for_record | default([]) }}"
  loop_control:
    loop_var: group_name
  when:
    - zbx_scenario == 'update'
    - group_name is defined
    - group_name in zbx_group_map
    - _groups_needs_update | default(false) | bool

- name: Build managed macro keys from templates
  set_fact:
    _hmdl_managed_macro_keys: "{{ zbx_host_macros.keys() | list }}"
  when:
    - zbx_scenario == 'update'
    - zbx_host_macros is defined

- name: Merge macros for update (preserve manual macros)
  vars:
    _existing_macros: "{{ zbx_existing_host.macros | default([]) }}"
    _manual_macros: >-
      {%- set out = [] -%}
      {%- for m in _existing_macros -%}
        {%- if m.macro not in (_hmdl_managed_macro_keys | default([])) -%}
          {%- set _ = out.append({'macro': m.macro, 'value': m.value}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  set_fact:
    zbx_host_macros_formatted_update: "{{ _manual_macros + zbx_host_macros_formatted }}"
    _existing_macros_for_diff: "{{ zbx_existing_host.macros | default([]) }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0

- name: Check if macros need update
  set_fact:
    # Macros come from mapping defaults (templates.yml), not from NetBox.
    # In update scenario, existing Zabbix macro values are preserved as-is.
    _macros_needs_update: false
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0

- name: Read last HMDL sync row for proxy/location baseline
  include_tasks: hmdl_read_last_sync.yml
  vars:
    hmdl_read_device_id: "{{ zbx_record.LOKI_DEVICE_ID | default(zbx_tags | default([]) | selectattr('tag', 'equalto', 'Loki_ID') | map(attribute='value') | list | first | default('')) }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - hmdl_log_enabled | bool
    - _missing_params | default([]) | length == 0

- name: Resolve proxy group update policy (location change vs manual override)
  vars:
    _cur_loc: "{{ zbx_record.DC_ID | default('') }}"
    _last_loc: "{{ hmdl_last_location | default('') }}"
    _exp_pg: "{{ zbx_proxy_group_id | default('') | string }}"
    _zbx_pg: "{{ zbx_existing_host.proxy_groupid | default('') | string }}"
    _last_pg: "{{ hmdl_last_proxy_group_id | default(_exp_pg) | string }}"
    _loc_changed: "{{ (_last_loc | string | trim != '') and (_cur_loc | string | trim != _last_loc | string | trim) }}"
  set_fact:
    _proxy_location_change: "{{ _loc_changed | bool }}"
    _expected_proxy_group_id: "{{ _exp_pg }}"
    _proxy_apply_update: >-
      {{
        _loc_changed | bool or
        (
          (_exp_pg != _zbx_pg) and
          not (
            (not (_loc_changed | bool)) and
            (_last_pg | string != '') and
            (_exp_pg == _last_pg) and
            (_zbx_pg != _last_pg)
          )
        )
      }}
    _proxy_manual_change_detected: >-
      {{
        (not (_loc_changed | bool)) and
        (_last_pg | string != '') and
        (_exp_pg == _last_pg) and
        (_zbx_pg != _last_pg)
      }}
    _effective_proxy_group_id: "{{ _zbx_pg if (_proxy_manual_change_detected | bool) else _exp_pg }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0

- name: Record proxy manual change in merge actions
  set_fact:
    _manual_change_notes: >-
      {{ (_manual_change_notes | default([])) +
         ['Proxy group manually changed in Zabbix (expected=' ~ (zbx_proxy_group_id | default('')) ~
           ', actual=' ~ (zbx_existing_host.proxy_groupid | default('')) ~ ')'] }}
    _field_merge_actions: >-
      {{ (_field_merge_actions | default({})) | combine({
        'proxy_group': 'preserved_manual',
        'expected_proxy_group_id': zbx_proxy_group_id | default(''),
        'actual_proxy_group_id': zbx_existing_host.proxy_groupid | default('')
      }) }}
  when:
    - zbx_scenario == 'update'
    - _proxy_manual_change_detected | default(false) | bool

- name: Apply effective proxy group id for update payload
  set_fact:
    zbx_proxy_group_id: "{{ _effective_proxy_group_id }}"
  when:
    - zbx_scenario == 'update'
    - _effective_proxy_group_id is defined

- name: Preserve Zabbix visible name on update (never overwrite from NetBox or mapping)
  set_fact:
    zbx_host_visible_name: "{{ zbx_existing_host.name | default(zbx_host_visible_name) }}"
    _visible_name_preserved: true
    _field_merge_actions: >-
      {{ (_field_merge_actions | default({})) | combine({'visible_name': 'preserved_existing'}) }}
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - zbx_existing_host.name is defined
    - zbx_existing_host.name | string | trim != ''

- name: Build interface for update
  set_fact:
    _zbx_interface_update: "{{ [{'interfaceid': _interface_id, 'type': zbx_iface.type, 'main': 1, 'useip': 1, 'ip': zbx_record.HOST_IP, 'dns': zbx_iface.dns | default(''), 'port': (zbx_iface.port | default(161)) | string, 'details': zbx_iface.details | default(omit)}] if (zbx_iface is not none and zbx_iface is mapping and zbx_iface.type is defined) else omit }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _interface_id is defined
    - _interface_id != ''
    - _missing_params | default([]) | length == 0

- name: Check if update is needed (compare with existing values)
  set_fact:
    _needs_update: >-
      {{
        (
          (_existing_interface.ip | default('') != zbx_record.HOST_IP) or
          (zbx_existing_host.host | default('') != zbx_record.HOSTNAME) or
          (zbx_existing_host.monitored_by | default('') | string != zbx_monitored_by | string) or
          (_proxy_apply_update | default(false) | bool) or
          (_tags_needs_update | default(false) | bool) or
          (_groups_needs_update | default(false) | bool) or
          (_macros_needs_update | default(false) | bool)
        ) | bool
      }}
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _interface_id is defined
    - _interface_id != ''
    - _missing_params | default([]) | length == 0

- name: Build host field change log entries
  set_fact:
    _host_field_changes: >-
      {%- set entries = [] -%}
      {%- if zbx_existing_host.host | default('') != zbx_record.HOSTNAME -%}
        {%- set _ = entries.append({'field_name': 'hostname', 'old_value': zbx_existing_host.host | default(''), 'new_value': zbx_record.HOSTNAME, 'action': 'updated'}) -%}
      {%- endif -%}
      {%- if zbx_existing_host.name | default('') | string | trim != (zbx_record.HOST_VISIBLE_NAME | default(zbx_record.HOSTNAME) | string | trim) -%}
        {%- set _ = entries.append({'field_name': 'visible_name', 'old_value': zbx_existing_host.name | default(''), 'new_value': zbx_record.HOST_VISIBLE_NAME | default(zbx_record.HOSTNAME), 'action': 'skipped', 'merge_result': 'preserved_existing', 'reason': 'Visible name is never updated on existing hosts'}) -%}
      {%- endif -%}
      {%- if _existing_interface.ip | default('') != zbx_record.HOST_IP -%}
        {%- set _ = entries.append({'field_name': 'interface_ip', 'old_value': _existing_interface.ip | default(''), 'new_value': zbx_record.HOST_IP, 'action': 'updated'}) -%}
      {%- endif -%}
      {%- if zbx_existing_host.monitored_by | default('') | string != zbx_monitored_by | string -%}
        {%- set _ = entries.append({'field_name': 'monitored_by', 'old_value': zbx_existing_host.monitored_by | default('') | string, 'new_value': zbx_monitored_by | string, 'action': 'updated'}) -%}
      {%- endif -%}
      {%- if _proxy_manual_change_detected | default(false) | bool -%}
        {%- set _ = entries.append({'field_name': 'proxy_group', 'old_value': zbx_existing_host.proxy_groupid | default('') | string, 'new_value': _expected_proxy_group_id | default(zbx_proxy_group_id) | string, 'action': 'skipped', 'merge_result': 'preserved_manual', 'reason': 'Proxy manually changed in Zabbix'}) -%}
      {%- elif _proxy_apply_update | default(false) | bool -%}
        {%- set _ = entries.append({'field_name': 'proxy_group', 'old_value': zbx_existing_host.proxy_groupid | default('') | string, 'new_value': zbx_proxy_group_id | string, 'action': 'updated', 'merge_result': 'updated'}) -%}
      {%- endif -%}
      {%- if _groups_needs_update | default(false) | bool -%}
        {%- set old_names = (zbx_existing_host.groups | default([]) | map(attribute='name') | sort | join(',')) -%}
        {%- set new_names = (zbx_required_groups_for_record | default([]) | sort | join(',')) -%}
        {%- set _ = entries.append({'field_name': 'host_groups', 'old_value': old_names, 'new_value': new_names, 'action': 'updated'}) -%}
      {%- endif -%}
      {{ entries }}
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _needs_update is defined
    - _needs_update | bool
    - _missing_params | default([]) | length == 0

- name: Debug update check
  debug:
    msg: |
      Host: {{ zbx_record.HOSTNAME }}
      Needs update: {{ _needs_update | default('not_checked') }}
      Current IP: {{ _existing_interface.ip | default('N/A') }} -> New IP: {{ zbx_record.HOST_IP }}
      Current monitored_by: {{ zbx_existing_host.monitored_by | default('N/A') }} -> New: {{ zbx_monitored_by }}
      Current proxy_groupid: {{ zbx_existing_host.proxy_groupid | default('N/A') }} -> New: {{ zbx_proxy_group_id }}
      Tags need update: {{ _tags_needs_update | default(false) }}
      Groups need update: {{ _groups_needs_update | default(false) }}
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined

- name: Debug - Show full update request body
  debug:
    msg: |
      ========================================
      ZABBIX API UPDATE REQUEST
      ========================================
      Host: {{ zbx_record.HOSTNAME }}
      Host ID: {{ zbx_existing_host.hostid }}
      IP: {{ zbx_record.HOST_IP }}
      Device Type: {{ zbx_record.DEVICE_TYPE | default('N/A') }}
      Interface: {{ _zbx_interface_update | to_nice_json }}
      Monitored By: {{ zbx_monitored_by }}
      Proxy Group ID: {{ zbx_proxy_group_id }}
      Needs Update: {{ _needs_update | default(true) | bool }}
      ========================================
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _interface_id is defined
    - _interface_id != ''
    - _zbx_interface_update is defined
    - _missing_params | default([]) | length == 0
    - _needs_update | default(true) | bool

- name: Build host.update params (tags omitted when unchanged per Zabbix API)
  set_fact:
    _host_update_params:
      hostid: "{{ zbx_existing_host.hostid }}"
      host: "{{ zbx_record.HOSTNAME }}"
      interfaces: "{{ _zbx_interface_update }}"
      groups: "{{ zbx_groups_formatted | default([]) }}"
      monitored_by: "{{ zbx_monitored_by | int }}"
      proxy_groupid: "{{ zbx_proxy_group_id | default('0') | int }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _missing_params | default([]) | length == 0
    - _needs_update | default(true) | bool
    - not (dry_run | default(false) | bool)

- name: Add tags to host.update params when managed tags changed
  set_fact:
    _host_update_params: "{{ _host_update_params | combine({'tags': _merged_tags_for_update | default([])}) }}"
  when:
    - zbx_scenario == 'update'
    - _host_update_params is defined
    - _host_update_params | length > 0
    - _tags_needs_update | default(false) | bool
    - not (dry_run | default(false) | bool)

- name: Update existing host (scenario update)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.update"
      params: "{{ _host_update_params }}"
      auth: "{{ zabbix_auth }}"
      id: 2
  register: zbx_update_resp
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host is defined
    - zbx_existing_host.hostid is defined
    - _interface_id is defined
    - _interface_id != ''
    - _zbx_interface_update is defined
    - _host_update_params is defined
    - _host_update_params | length > 0
    - _missing_params | default([]) | length == 0
    - _needs_update | default(true) | bool
    - not (dry_run | default(false) | bool)

- name: Record no update needed (already up-to-date)
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "güncel"
      reason: "Değişiklik yok, güncelleme yapılmadı"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _needs_update is defined
    - not (_needs_update | bool)

- name: Build updated fields list
  set_fact:
    _updated_fields: >-
      {%- set fields = [] -%}
      {%- if zbx_existing_host.host | default('') != zbx_record.HOSTNAME -%}
        {%- set _ = fields.append('Hostname: ' ~ zbx_existing_host.host | default('N/A') ~ ' → ' ~ zbx_record.HOSTNAME) -%}
      {%- endif -%}
      {%- if _existing_interface.ip | default('') != zbx_record.HOST_IP -%}
        {%- set _ = fields.append('IP: ' ~ _existing_interface.ip | default('N/A') ~ ' → ' ~ zbx_record.HOST_IP) -%}
      {%- endif -%}
      {%- if zbx_existing_host.monitored_by | default('') | string != zbx_monitored_by | string -%}
        {%- set _ = fields.append('Monitored By: ' ~ zbx_existing_host.monitored_by | default('N/A') ~ ' → ' ~ zbx_monitored_by) -%}
      {%- endif -%}
      {%- if zbx_existing_host.proxy_groupid | default('') | string != zbx_proxy_group_id | string -%}
        {%- set _ = fields.append('Proxy Group: ' ~ zbx_existing_host.proxy_groupid | default('N/A') ~ ' → ' ~ zbx_proxy_group_id) -%}
      {%- endif -%}
      {%- if _tags_needs_update | default(false) | bool -%}
        {%- set ns_t = namespace(changed_tags=[]) -%}
        {%- for entry in (_tag_change_log | default([])) -%}
          {%- if entry.action in ['added', 'updated'] -%}
            {%- set old_str = entry.old_value | default('yok') | string -%}
            {%- set ns_t.changed_tags = ns_t.changed_tags + [entry.key_name ~ ': ' ~ old_str ~ ' → ' ~ entry.new_value] -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if ns_t.changed_tags | length > 0 -%}
          {%- set _ = fields.append('Tags: ' ~ (ns_t.changed_tags | join('; '))) -%}
        {%- endif -%}
      {%- endif -%}
      {%- if _groups_needs_update | default(false) | bool -%}
        {%- set old_grp = (zbx_existing_host.groups | default([]) | map(attribute='name') | sort | join(', ')) -%}
        {%- set new_grp = (zbx_required_groups_for_record | default([]) | sort | join(', ')) -%}
        {%- set _ = fields.append('Groups: ' ~ old_grp ~ ' → ' ~ new_grp) -%}
      {%- endif -%}
      {{ fields | join(', ') }}
  when:
    - zbx_scenario == 'update'
    - _needs_update is defined
    - _needs_update | bool
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.result is defined
    - zbx_update_resp.json.error is not defined

- name: Record update success
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "güncellendi"
      reason: "{{ _updated_fields | default('Bilinmeyen değişiklikler') }}"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'update'
    - _needs_update is defined
    - _needs_update | bool
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.result is defined
    - zbx_update_resp.json.error is not defined

- name: Record update failure
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "eklenemedi"
      reason: >-
        Güncelleme hatası: {{
          (zbx_update_resp.json.error.data | default('') | string | trim)
          if (zbx_update_resp.json.error.data is defined and (zbx_update_resp.json.error.data | string | trim | length) > 0)
          else (zbx_update_resp.json.error.message | default('Bilinmeyen hata'))
        }}
      error_data: "{{ zbx_update_resp.json.error.data | default('') }}"
      error_code: "{{ zbx_update_resp.json.error.code | default('') }}"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - zbx_scenario == 'update'
    - _needs_update is defined
    - _needs_update | bool
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.error is defined

- name: Debug - Show detailed update error
  debug:
    msg: |
      ========================================
      ZABBIX API UPDATE ERROR
      ========================================
      Host: {{ zbx_record.HOSTNAME }}
      Host ID: {{ zbx_existing_host.hostid }}
      IP: {{ zbx_record.HOST_IP }}
      Error Message: {{ zbx_update_resp.json.error.message | default('N/A') }}
      Error Code: {{ zbx_update_resp.json.error.code | default('N/A') }}
      Error Data: {{ zbx_update_resp.json.error.data | default('N/A') | to_nice_json }}
      ========================================
      FULL RESPONSE:
      {{ zbx_update_resp.json | to_nice_json }}
      ========================================
  when:
    - zbx_scenario == 'update'
    - _needs_update is defined
    - _needs_update | bool
    - zbx_update_resp is defined
    - zbx_update_resp.json is defined
    - zbx_update_resp.json.error is defined

- name: DRY-RUN - Update preview summary
  debug:
    msg: |
      ========================================
      DRY-RUN: ZABBIX HOST UPDATE PREVIEW
      ========================================
      Host            : {{ zbx_record.HOSTNAME }}
      Host ID (mevcut): {{ zbx_existing_host.hostid }}
      IP (mevcut→yeni): {{ _existing_interface.ip | default('N/A') }} → {{ zbx_record.HOST_IP }}
      Device Type     : {{ zbx_record.DEVICE_TYPE | default('N/A') }}
      Hostname değişti: {{ zbx_existing_host.host | default('') != zbx_record.HOSTNAME }}
      IP değişti      : {{ _existing_interface.ip | default('') != zbx_record.HOST_IP }}
      Monitored By    : {{ zbx_existing_host.monitored_by | default('N/A') }} → {{ zbx_monitored_by }}
      Proxy Group     : {{ zbx_existing_host.proxy_groupid | default('N/A') }} → {{ zbx_proxy_group_id }}
      Macro değişti   : {{ _macros_needs_update | default(false) }}
      Tag değişti     : {{ _tags_needs_update | default(false) }}
      Group değişti   : {{ _groups_needs_update | default(false) }}
      DC_ID           : {{ zbx_location_name }} → {{ zbx_matched_proxy_group | default('eşleşme yok') }}
      ----------------------------------------
      Tag değişimleri :
      {% for entry in (_tag_change_log | default([])) if entry.action in ['added', 'updated'] %}
        {{ entry.action | upper }}: {{ entry.key_name }}: {{ entry.old_value | default('(yok)') }} → {{ entry.new_value }}
      {% else %}
        (tag değişikliği yok)
      {% endfor %}
      ----------------------------------------
      DRY-RUN: host.update çağrısı YAPILMADI.
      ========================================
  when:
    - dry_run | default(false) | bool
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _needs_update | default(false) | bool
    - _missing_params | default([]) | length == 0

- name: DRY-RUN - Record update preview result
  set_fact:
    device_result:
      hostname: "{{ zbx_record.HOSTNAME }}"
      device_role: "{{ zbx_record.DEVICE_ROLE | default('N/A') }}"
      status: "dry_run"
      reason: "Dry-run: host.update çağrısı yapılmadı — güncellenecekti"
      ip: "{{ zbx_record.HOST_IP }}"
      location: "{{ zbx_record.REPORT_LOCATION | default('N/A', true) }}"
      site: "{{ zbx_record.REPORT_SITE | default('N/A', true) }}"
      tenant: "{{ zbx_record.REPORT_TENANT | default('N/A', true) }}"
      ownership: "{{ zbx_record.REPORT_OWNERSHIP | default('N/A', true) }}"
  when:
    - dry_run | default(false) | bool
    - zbx_scenario == 'update'
    - zbx_existing_host.hostid is defined
    - _needs_update | default(false) | bool
    - _missing_params | default([]) | length == 0
