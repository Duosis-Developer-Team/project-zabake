---
- name: Fetch Hana Linux VMs from datalake discovery table
  community.postgresql.postgresql_query:
    db: "{{ discovery_db_name }}"
    login_host: "{{ discovery_db_host }}"
    login_port: "{{ discovery_db_port | int }}"
    login_user: "{{ discovery_db_user }}"
    login_password: "{{ discovery_db_password }}"
    query: |
      SELECT
          v.id,
          v.name,
          v.status_value,
          v.site_id,
          v.site_name,
          v.cluster_name,
          v.cluster_description,
          v.device_name,
          v.tenant,
          v.custom_fields_endpoint,
          v.custom_fields_guest_os,
          v.custom_fields_musteri,
          v.custom_fields_vm_name,
          v.tags1_name,
          v.tags2_name,
          v.tags3_name,
          v.tags4_name,
          v.tags5_name,
          v.created::text,
          v.last_updated::text
      FROM public.discovery_netbox_virtualization_vm v
      WHERE v.status_value = 'active'
        AND v.cluster_name ILIKE '%IBM%'
        AND v.custom_fields_guest_os ILIKE '%Linux%'
        AND (v.name ILIKE '%hana%' OR v.name ILIKE '%HANA%')
        AND v.custom_fields_endpoint IS NOT NULL
        AND TRIM(v.custom_fields_endpoint) <> ''
      {% if location_filter | default('') | trim != '' %}
        AND (
          v.site_name ILIKE '%{{ location_filter }}%'
          OR v.cluster_name ILIKE '%{{ location_filter }}%'
        )
      {% endif %}
  register: _hana_linux_vm_result
  changed_when: false
  delegate_to: localhost
  run_once: true
  when: sync_hana_linux_vms | default(true) | bool

- name: Save raw Hana Linux VM query results
  copy:
    content: "{{ _hana_linux_vm_result.query_result | to_json }}"
    dest: /tmp/hana_linux_vms_raw.json
  delegate_to: localhost
  run_once: true
  when: sync_hana_linux_vms | default(true) | bool

- name: Copy Hana Linux VM transform helper
  copy:
    src: hana_linux_vm_transform.py
    dest: /tmp/hana_linux_vm_transform.py
    mode: "0755"
  delegate_to: localhost
  run_once: true
  when: sync_hana_linux_vms | default(true) | bool

- name: Transform Hana Linux VMs into device-shaped records
  command: python3 /tmp/hana_linux_vm_transform.py /tmp/hana_linux_vms_raw.json
  register: _hana_linux_vm_transform
  changed_when: false
  delegate_to: localhost
  run_once: true
  when: sync_hana_linux_vms | default(true) | bool

- name: Merge Hana Linux VMs into monitor device list
  set_fact:
    netbox_devices_monitor_raw: >-
      {{
        (netbox_devices_monitor_raw | default([]))
        + ((_hana_linux_vm_transform.stdout | from_json).devices | default([]))
      }}
    netbox_devices_monitor_count: >-
      {{
        (netbox_devices_monitor_count | default(0) | int)
        + ((_hana_linux_vm_transform.stdout | from_json).count | default(0) | int)
      }}
    netbox_devices_raw: >-
      {{
        (netbox_devices_raw | default([]))
        + ((_hana_linux_vm_transform.stdout | from_json).devices | default([]))
      }}
    netbox_devices_count: >-
      {{
        (netbox_devices_count | default(0) | int)
        + ((_hana_linux_vm_transform.stdout | from_json).count | default(0) | int)
      }}
  when: sync_hana_linux_vms | default(true) | bool

- name: Display Hana Linux VM merge summary
  debug:
    msg: |
      ============================================
      HANA LINUX VM MERGE SUMMARY
      ============================================
      VM rows from DB: {{ _hana_linux_vm_result.query_result | default([]) | length }}
      Device-shaped VMs merged: {{ (_hana_linux_vm_transform.stdout | from_json).count | default(0) }}
      Total monitor devices after merge: {{ netbox_devices_monitor_count | default(0) }}
      ============================================
  when: sync_hana_linux_vms | default(true) | bool
