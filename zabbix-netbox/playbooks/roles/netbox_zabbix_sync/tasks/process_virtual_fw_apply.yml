---
# Phase B: POST pre-built Zabbix payloads from virtual firewall compare plans.

- name: Resolve VFW sync plan file path
  set_fact:
    _vfw_plan_path: "/tmp/vfw_plan_{{ netbox_virtual_fw.id | string }}.json"
  when: netbox_virtual_fw.id is defined

- name: Check VFW sync plan file exists
  stat:
    path: "{{ _vfw_plan_path }}"
  register: _vfw_plan_stat
  delegate_to: localhost
  when: netbox_virtual_fw.id is defined

- name: Load VFW sync plan from compare phase
  set_fact:
    _vfw_sync_plan_loaded: "{{ lookup('file', _vfw_plan_path) | from_json }}"
  when:
    - netbox_virtual_fw.id is defined
    - _vfw_plan_stat.stat.exists | default(false) | bool

- name: Record missing VFW plan (Phase A file not found, non-fatal)
  set_fact:
    _vfw_sync_plan_loaded:
      action: skip
      zbx_record: {}
      current_vfw_result:
        hostname: "{{ netbox_virtual_fw.hostname | default(netbox_virtual_fw.name | default('Unknown')) }}"
        device_role: VIRTUAL_FW
        status: eklenemedi
        reason: >-
          Phase A plan missing at {{ _vfw_plan_path }}.
          Ensure VFW fetch runs before Phase A (main.yml task order).
        ip: N/A
        location: N/A
        site: N/A
        tenant: N/A
        ownership: N/A
  when:
    - netbox_virtual_fw.id is defined
    - not (_vfw_plan_stat.stat.exists | default(false) | bool)

- name: Save missing-plan VFW result to temporary file
  copy:
    content: "{{ _vfw_sync_plan_loaded.current_vfw_result | to_json }}"
    dest: "/tmp/zabbix_vfw_operation_result_{{ netbox_virtual_fw.id | default('unknown') }}.json"
  when:
    - _vfw_sync_plan_loaded is defined
    - _vfw_sync_plan_loaded.current_vfw_result is defined
    - not (_vfw_plan_stat.stat.exists | default(false) | bool)
  delegate_to: localhost

- name: Use precomputed result for skip action (no Zabbix API call)
  set_fact:
    current_vfw_result: "{{ _vfw_sync_plan_loaded.current_vfw_result | default({}) }}"
  when:
    - _vfw_sync_plan_loaded is defined
    - _vfw_sync_plan_loaded.action | default('skip') == 'skip'

- name: POST host.create from VFW plan payload (Phase B)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.create"
      params: "{{ _vfw_sync_plan_loaded.create_payload }}"
      auth: "{{ zabbix_auth }}"
      id: 1
  register: zbx_vfw_create_resp
  failed_when: false
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'create'
    - _vfw_sync_plan_loaded.create_payload is defined
    - _vfw_sync_plan_loaded.create_payload | length > 0
    - not (dry_run | default(false) | bool)
    - zabbix_auth is defined

- name: Record VFW create success from plan apply
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "eklendi"
      reason: ""
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "create"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'create'
    - zbx_vfw_create_resp.json.result is defined

- name: Record VFW create failure from plan apply
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "eklenemedi"
      reason: "{{ zbx_vfw_create_resp.json.error.message | default('host.create failed') }}"
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "create"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'create'
    - zbx_vfw_create_resp is defined
    - zbx_vfw_create_resp.json.error is defined

- name: DRY-RUN — Record planned VFW create
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "dry_run"
      reason: "Dry-run: host.create çağrısı yapılmadı — eklenecekti"
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "create"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'create'
    - dry_run | default(false) | bool

- name: Use precomputed up-to-date result for VFW update with no delta
  set_fact:
    current_vfw_result: "{{ _vfw_sync_plan_loaded.current_vfw_result | default({}) }}"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'update'
    - not (_vfw_sync_plan_loaded.needs_update | default(false) | bool)

- name: POST host.update from VFW plan payload (Phase B)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.update"
      params: "{{ _vfw_sync_plan_loaded.update_payload }}"
      auth: "{{ zabbix_auth }}"
      id: 2
  register: zbx_vfw_update_resp
  failed_when: false
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'update'
    - _vfw_sync_plan_loaded.needs_update | default(false) | bool
    - _vfw_sync_plan_loaded.update_payload is defined
    - not (dry_run | default(false) | bool)
    - zabbix_auth is defined

- name: Record VFW update success from plan apply
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "güncellendi"
      reason: ""
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'update'
    - zbx_vfw_update_resp.json.result is defined

- name: Record VFW update failure from plan apply
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "eklenemedi"
      reason: "{{ zbx_vfw_update_resp.json.error.message | default('host.update failed') }}"
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'update'
    - zbx_vfw_update_resp is defined
    - zbx_vfw_update_resp.json.error is defined

- name: DRY-RUN — Record planned VFW update
  set_fact:
    current_vfw_result:
      hostname: "{{ _vfw_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "VIRTUAL_FW"
      status: "dry_run"
      reason: "Dry-run: host.update çağrısı yapılmadı — güncellenecekti"
      ip: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _vfw_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _vfw_sync_plan_loaded.action | default('skip') == 'update'
    - _vfw_sync_plan_loaded.needs_update | default(false) | bool
    - dry_run | default(false) | bool

- name: Save virtual firewall result to temporary file (apply phase)
  copy:
    content: "{{ current_vfw_result | to_json }}"
    dest: "/tmp/zabbix_vfw_operation_result_{{ netbox_virtual_fw.id | default('unknown') }}.json"
  when:
    - current_vfw_result is defined
    - current_vfw_result | length > 0
    - current_vfw_result.hostname is defined
  delegate_to: localhost

- name: Log virtual firewall result to HMDL audit table (apply phase)
  include_tasks: hmdl_sync_log.yml
  vars:
    hmdl_log_device_id: "{{ netbox_virtual_fw.id | default('unknown') }}"
    hmdl_log_entry:
      run_id: "{{ hmdl_run_id | default('') }}"
      awx_job_id: "{{ lookup('env', 'AWX_JOB_ID') | default('', true) }}"
      playbook_name: "{{ hmdl_playbook_name | default('db_to_zabbix_sync') }}"
      source_device_id: "{{ netbox_virtual_fw.id | default(None) }}"
      source_device_name: "{{ netbox_virtual_fw.hostname | default('') }}"
      source_table: "netbox_custom_virtual_fw"
      host_entity_type: virtual_fw
      inventory_source: "{{ virtual_fw_source | default('loki') }}"
      zabbix_hostid: "{{ _vfw_sync_plan_loaded.zbx_existing_host.hostid | default('') }}"
      zabbix_hostname: "{{ current_vfw_result.hostname | default('') }}"
      zabbix_host_ip: "{{ current_vfw_result.ip | default('') }}"
      device_type: "{{ _vfw_sync_plan_loaded.zbx_record.DEVICE_TYPE | default('') }}"
      device_role: "VIRTUAL_FW"
      manufacturer_name: ""
      site_name: "{{ current_vfw_result.site | default('') }}"
      location_name: "{{ current_vfw_result.location | default('') }}"
      location_parent_name: ""
      root_location_name: ""
      tenant_name: ""
      cluster_name: ""
      operation: "{{ _vfw_sync_plan_loaded.zbx_scenario | default('none') }}"
      status: "{{ current_vfw_result.status | default('eklenemedi') }}"
      reason: "{{ current_vfw_result.reason | default('') }}"
      last_visible_name: "{{ _vfw_sync_plan_loaded.zbx_record.HOST_VISIBLE_NAME | default('') }}"
      last_location: "{{ _vfw_sync_plan_loaded.zbx_record.DC_ID | default('') }}"
      expected_proxy_group_id: ""
      last_proxy_group_id: ""
      zabbix_proxy_group_id: ""
      proxy_location_change: false
      proxy_manual_change_detected: false
      field_merge_actions: {}
      last_managed_groups: []
      dry_run: "{{ dry_run | default(false) | bool }}"
      extra_data: {}
      request_payload: "{{ _vfw_sync_plan_loaded.create_payload | default(_vfw_sync_plan_loaded.update_payload | default({})) }}"
      response_payload: "{{ zbx_vfw_create_resp.json | default(zbx_vfw_update_resp.json | default({})) }}"
      error_payload: {}
  when:
    - hmdl_log_enabled | bool
    - current_vfw_result is defined
    - current_vfw_result | length > 0
