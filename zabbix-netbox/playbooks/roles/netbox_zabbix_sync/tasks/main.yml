---
- name: Load template mappings
  set_fact:
    templates_map: "{{ lookup('file', templates_map_path) | from_yaml }}"
    datacenters_map: "{{ lookup('file', datacenters_map_path) | from_yaml }}"
    device_type_mapping: "{{ lookup('file', device_type_mapping_path) | from_yaml }}"

- name: Fetch all devices from Netbox API (with pagination and mapping-based filtering)
  include_tasks: fetch_all_devices.yml
  when: (sync_devices | bool) or (only_fetch | bool)

- name: Set empty NetBox device lists when device fetch is skipped
  set_fact:
    netbox_devices_monitor_raw: []
    netbox_devices_monitor_count: 0
    netbox_devices_skip_raw: []
    netbox_devices_skip_count: 0
    netbox_devices_raw: []
    netbox_devices_count: 0
  when: not ((sync_devices | bool) or (only_fetch | bool))

- name: Fetch all hosts from Zabbix API (for mapping and update detection)
  include_tasks: fetch_all_zabbix_hosts.yml
  when:
    - not only_fetch | bool
    - (sync_devices | bool) or (sync_platforms | bool)

- name: Set filtered devices (mapping-based filters already applied in Python script)
  set_fact:
    netbox_devices_filtered: "{{ netbox_devices_raw }}"

- name: Apply device limit
  set_fact:
    netbox_devices_final: >-
      {%- set limit = device_limit | int -%}
      {%- if limit > 0 -%}
      {{ netbox_devices_filtered[:limit] }}
      {%- else -%}
      {{ netbox_devices_filtered }}
      {%- endif -%}

- name: Initialize processing results list
  set_fact:
    processing_results: []

- name: Fail when no sync mode is enabled
  fail:
    msg: >-
      No work selected: enable sync_devices and/or sync_platforms, or set only_fetch: true
      for NetBox-only inspection.
  when:
    - not only_fetch | bool
    - not (sync_devices | bool)
    - not (sync_platforms | bool)

- name: Summary of fetched devices from Netbox (monitor vs skip)
  debug:
    msg: |
      ============================================
      NETBOX DEVICES FETCH SUMMARY
      ============================================
      Monitor devices (Evet/null) count: {{ netbox_devices_monitor_count | default(netbox_devices_count | default(0)) }}
      Skip devices (Hayır) count: {{ netbox_devices_skip_count | default(0) }}
      ============================================

- name: Summary of fetched platforms from Netbox (monitor vs skip)
  debug:
    msg: |
      ============================================
      NETBOX PLATFORMS FETCH SUMMARY
      ============================================
      Monitor platforms (Evet/null) count: {{ netbox_platforms_monitor_count | default(0) }}
      Skip platforms (Hayır) count: {{ netbox_platforms_skip_count | default(0) }}
      ============================================
  when: sync_platforms | bool

- name: End play early in only_fetch mode after fetching from Netbox
  meta: end_play
  when: only_fetch | bool

- name: Display device count
  debug:
    msg: >-
      {% if not (sync_devices | bool) %}
      Device sync disabled (sync_devices=false); skipping device processing.
      {% else %}
      Found {{ netbox_devices_final | length }} devices to process (limit: {{ 'unlimited' if device_limit | int == 0 else device_limit | int }}{% if location_filter and location_filter != '' %}, location filter: {{ location_filter }}{% endif %})
      {% endif %}

- name: Display list of matching devices
  debug:
    msg: |
      ============================================
      MATCHING DEVICES FROM NETBOX
      ============================================
      {% for device in netbox_devices_final %}
      Device #{{ loop.index }}:
        - Name: {{ device.name | default('N/A') }}
        - ID: {{ device.id | default('N/A') }}
        - Site: {{ device.site.name | default('N/A') if device.site else 'N/A' }}
        - Role: {% if device.role %}{{ device.role.name | default('N/A') }}{% elif device.device_role %}{{ device.device_role.name | default('N/A') }}{% else %}N/A{% endif %}
        - Manufacturer: {{ device.device_type.manufacturer.name | default('N/A') if device.device_type.manufacturer else 'N/A' }}
        - Model: {{ device.device_type.model | default('N/A') if device.device_type else 'N/A' }}
        - Primary IP: {{ device.primary_ip4.address | default('N/A') if device.primary_ip4 else 'N/A' }}
      {% endfor %}
      ============================================
  when:
    - sync_devices | bool
    - netbox_devices_final | length > 0

- name: Process each device
  include_tasks: process_device.yml
  loop: "{{ netbox_devices_final }}"
  loop_control:
    loop_var: outer_device_item
    label: "{{ outer_device_item.name | default('Unknown') }}"
  vars:
    netbox_device: "{{ outer_device_item }}"
  when: sync_devices | bool

- name: Collect all device results from temporary files
  find:
    paths: /tmp
    patterns: "zabbix_host_operation_result_*.json"
  register: result_files
  delegate_to: localhost
  run_once: true
  when: sync_devices | bool

- name: Load all device results
  set_fact:
    processing_results: >-
      {%- set results = [] -%}
      {%- for file in result_files.files | default([]) -%}
      {%- set file_content = lookup('file', file.path) | from_json -%}
      {%- if file_content -%}
      {%- set _ = results.append(file_content) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ results }}
  delegate_to: localhost
  run_once: true
  when:
    - sync_devices | bool
    - result_files.files is defined
    - result_files.files | length > 0

- name: Set empty results if no device result files found
  set_fact:
    processing_results: []
  when:
    - sync_devices | bool
    - result_files.files is not defined or result_files.files | length == 0
  delegate_to: localhost
  run_once: true

- name: Clean up temporary result files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ result_files.files | default([]) }}"
  delegate_to: localhost
  run_once: true
  when:
    - sync_devices | bool
    - result_files.files is defined

- name: Fetch all platforms from Netbox API (with Zabbix and izlenmeli filtering)
  include_tasks: fetch_all_platforms.yml
  when: sync_platforms | bool

- name: Display platform count
  debug:
    msg: >-
      Found {{ netbox_platforms_raw | default([]) | length }} platforms to process for Zabbix
      (sync_platforms={{ sync_platforms | bool }})
  when: sync_platforms | bool

- name: Process each platform
  include_tasks: process_platform.yml
  loop: "{{ netbox_platforms_raw | default([]) }}"
  loop_control:
    loop_var: outer_platform_item
    label: "{{ outer_platform_item.name | default(outer_platform_item.display | default('Unknown Platform')) }}"
  vars:
    netbox_platform: "{{ outer_platform_item }}"
  when: sync_platforms | bool

- name: Collect all platform results from temporary files
  find:
    paths: /tmp
    patterns: "zabbix_platform_operation_result_*.json"
  register: platform_result_files
  delegate_to: localhost
  run_once: true
  when: sync_platforms | bool

- name: Append platform results to processing_results
  set_fact:
    processing_results: >-
      {%- set results = processing_results | default([]) | list -%}
      {%- for file in platform_result_files.files | default([]) -%}
      {%- set file_content = lookup('file', file.path) | from_json -%}
      {%- if file_content -%}
      {%- set _ = results.append(file_content) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ results }}
  delegate_to: localhost
  run_once: true
  when:
    - sync_platforms | bool
    - platform_result_files.files is defined
    - platform_result_files.files | length > 0

- name: Clean up temporary platform result files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ platform_result_files.files | default([]) }}"
  delegate_to: localhost
  run_once: true
  when:
    - sync_platforms | bool
    - platform_result_files.files is defined

- name: Add skipped devices (izlenmeli=Hayır) to processing results
  set_fact:
    processing_results: "{{ (processing_results | default([])) + (skipped_devices_report_list | default([])) }}"
  vars:
    skipped_devices_report_list: >-
      {%- set out = [] -%}
      {%- for d in netbox_devices_skip_raw | default([]) -%}
      {%- set _ = out.append({
        'hostname': d.name | default('N/A'),
        'device_role': (d.role.name | default('N/A')) if (d.role is defined and d.role) else 'N/A',
        'status': 'atlandı',
        'reason': 'İzlenmeyecek (NetBox izlenmeli=Hayır filtresi)',
        'ip': 'N/A',
        'location': (d.location.name | default(d.site.name | default('N/A'), true)) if (d.location is defined and d.location) else ((d.site.name | default('N/A', true)) if (d.site is defined and d.site) else 'N/A'),
        'site': (d.site.name | default('N/A')) if (d.site is defined and d.site) else 'N/A',
        'tenant': (d.tenant.name | default('N/A')) if (d.tenant is defined and d.tenant) else 'N/A',
        'ownership': (d.custom_fields.Sahiplik[0] | string | trim) if (d.custom_fields is defined and d.custom_fields.Sahiplik is defined and d.custom_fields.Sahiplik is sequence and d.custom_fields.Sahiplik is not string and (d.custom_fields.Sahiplik | length) > 0) else (((d.custom_fields.Sahiplik | default('', true)) | string | trim) if (d.custom_fields is defined and d.custom_fields.Sahiplik is defined and (d.custom_fields.Sahiplik | string | trim | length) > 0) else 'N/A')
      }) -%}
      {%- endfor -%}
      {{ out }}
  when:
    - sync_devices | bool
    - report_izlenmeyecek | bool
    - netbox_devices_skip_raw is defined
    - (netbox_devices_skip_raw | default([]) | length) > 0

- name: Add skipped platforms (izlenmeli=Hayır) to processing results
  set_fact:
    processing_results: "{{ (processing_results | default([])) + (skipped_platforms_report_list | default([])) }}"
  vars:
    skipped_platforms_report_list: >-
      {%- set out = [] -%}
      {%- for p in netbox_platforms_skip_raw | default([]) -%}
      {%- set _ = out.append({
        'hostname': p.name | default(p.display | default('N/A')),
        'device_role': 'PLATFORM',
        'status': 'atlandı',
        'reason': 'İzlenmeyecek (NetBox izlenmeli=Hayır filtresi)',
        'ip': (p.custom_fields.ip_addresses | default('N/A')) if (p.custom_fields is defined) else 'N/A',
        'location': (p.custom_fields.DC | default(p.custom_fields.Site | default('N/A', true), true)) if (p.custom_fields is defined) else 'N/A',
        'site': (p.custom_fields.Site | default('N/A', true)) if (p.custom_fields is defined) else 'N/A',
        'tenant': 'N/A',
        'ownership': 'N/A'
      }) -%}
      {%- endfor -%}
      {{ out }}
  when:
    - sync_platforms | bool
    - report_izlenmeyecek | bool
    - netbox_platforms_skip_raw is defined
    - (netbox_platforms_skip_raw | default([]) | length) > 0

- name: Send notification email for failed devices
  include_tasks: send_notification_email.yml
  when: processing_results is defined and processing_results | length > 0
