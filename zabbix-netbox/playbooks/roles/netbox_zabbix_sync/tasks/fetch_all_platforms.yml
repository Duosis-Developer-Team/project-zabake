---
# Router: fetch platforms from Loki (NetBox API) or Datalake (PostgreSQL discovery DB).

- name: Validate platform_source parameter
  assert:
    that:
      - platform_source | lower in ['loki', 'datalake']
    fail_msg: "platform_source must be 'loki' or 'datalake' (got '{{ platform_source }}')"

- name: Fetch platforms from Datalake (PostgreSQL)
  include_tasks: fetch_all_platforms_datalake.yml
  when: platform_source | lower == 'datalake'

- name: Fetch platforms from Loki (NetBox API)
  include_tasks: fetch_all_platforms_loki.yml
  when: platform_source | lower == 'loki'
