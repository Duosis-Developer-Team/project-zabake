---
- name: Create Python script to fetch all platforms with filtering
  copy:
    content: |
      #!/usr/bin/env python3
      import json
      import sys
      import requests
      from urllib3.exceptions import InsecureRequestWarning
      
      requests.packages.urllib3.disable_warnings(InsecureRequestWarning)
      
      netbox_url = sys.argv[1].rstrip("/")
      netbox_token = sys.argv[2]
      verify_ssl = sys.argv[3].lower() == "true"
      izlenmeli_mode = sys.argv[4] if len(sys.argv) > 4 else "monitor"
      location_filter = (sys.argv[5] if len(sys.argv) > 5 else "").strip()
      
      session = requests.Session()
      session.headers.update(
          {
              "Authorization": f"Token {netbox_token}",
              "Accept": "application/json",
          }
      )
      
      def fetch_all_platforms():
          results = []
          # Apply izlenmeli filter at API level
          base_url = f"{netbox_url}/api/dcim/platforms/?limit=100"
          if izlenmeli_mode == "monitor":
              base_url += "&cf_izlenmeli=Evet&cf_izlenmeli=null"
          elif izlenmeli_mode == "skip":
              base_url += "&cf_izlenmeli=Hayır"

          next_url = base_url
          print(f"DEBUG: Using NetBox platforms API URL ({izlenmeli_mode}): {base_url}", file=sys.stderr)
          while next_url:
              resp = session.get(next_url, verify=verify_ssl, timeout=30)
              resp.raise_for_status()
              data = resp.json()
              page_results = data.get("results", [])
              print(f"DEBUG: Fetched {len(page_results)} platforms from this page", file=sys.stderr)
              results.extend(page_results)
              next_url = data.get("next")
          print(f"DEBUG: Total platforms fetched from NetBox: {len(results)}", file=sys.stderr)
          return results
      
      def get_site_code(platform):
          """
          Extract site code for proxy mapping and DC limiting.
          Prefer custom_fields['Site']; fall back to custom_fields['DC'] or empty string.
          """
          custom_fields = platform.get("custom_fields") or {}
          site = custom_fields.get("Site") or custom_fields.get("DC") or ""
          return site or ""
      
      def get_izlenmeli_status(platform):
          """
          Returns one of: 'evet', 'hayir', 'null'
          - null or evet  => platform can be monitored (included in monitor list)
          - hayir         => do not monitor (excluded from monitor list)
          Boolean False and string 'false' are treated as hayir.
          """
          custom_fields = platform.get("custom_fields") or {}
          val = custom_fields.get("izlenmeli")
          if val is None:
              return "null"
          if val is False:
              return "hayir"
          text = str(val).strip().lower()
          if text == "false":
              return "hayir"
          if text in ["evet", "true", "yes", "1"]:
              return "evet"
          if text in ["hayir", "hayır", "no", "0"]:
              return "hayir"
          return "null"
      
      def is_standard_site(site):
          """
          Valid patterns: DCxx, AZxx, ICTxx, UZxx (prefix + digits, optionally with suffix like -CLS)
          This function only checks that a known prefix exists followed by digits.
          """
          import re
      
          if not site:
              return False
          pattern = r"(DC|AZ|ICT|UZ)\d+"
          return re.search(pattern, site, re.IGNORECASE) is not None
      
      all_platforms = fetch_all_platforms()
      
      output_platforms = []
      izlenmeyecek_platforms = []
      invalid_site_platforms = []
      
      for platform in all_platforms:
          if izlenmeli_mode == "monitor" and get_izlenmeli_status(platform) == "hayir":
              continue
      
          site = get_site_code(platform)
          if site and not is_standard_site(site):
              invalid_site_platforms.append(platform)
              # We still keep the platform for potential processing; reporting is separate
      
          output_platforms.append(platform)
      
      if location_filter:
          needle = location_filter.lower()
      
          def matches_location_filter(platform):
              custom_fields = platform.get("custom_fields") or {}
              site_val = custom_fields.get("Site")
              site_str = "" if site_val is None else str(site_val).strip().lower()
              return needle in site_str
      
          before_loc = len(output_platforms)
          output_platforms = [p for p in output_platforms if matches_location_filter(p)]
          print(
              f"DEBUG: location_filter='{location_filter}': {before_loc} -> {len(output_platforms)} platforms",
              file=sys.stderr,
          )
      
      result = {
          "platforms": output_platforms,
          "platforms_count": len(output_platforms),
          "izlenmeyecek_platforms": izlenmeyecek_platforms,
          "izlenmeyecek_count": len(izlenmeyecek_platforms),
          "invalid_site_platforms": invalid_site_platforms,
          "invalid_site_count": len(invalid_site_platforms),
          "mode": izlenmeli_mode,
      }
      
      print(json.dumps(result))
    dest: "/tmp/fetch_all_netbox_platforms.py"
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Fetch monitor platforms using Python script with filtering
  command: >
    python3 /tmp/fetch_all_netbox_platforms.py
    "{{ netbox_url }}"
    "{{ netbox_token }}"
    "{{ netbox_verify_ssl | string }}"
    "monitor"
    "{{ location_filter | default('') | string }}"
  register: fetch_platforms_monitor_result
  changed_when: false
  delegate_to: localhost

- name: Fetch skip platforms using Python script with filtering
  command: >
    python3 /tmp/fetch_all_netbox_platforms.py
    "{{ netbox_url }}"
    "{{ netbox_token }}"
    "{{ netbox_verify_ssl | string }}"
    "skip"
    "{{ location_filter | default('') | string }}"
  register: fetch_platforms_skip_result
  changed_when: false
  delegate_to: localhost

- name: Display Python script debug output for monitor platforms
  debug:
    msg: "{{ fetch_platforms_monitor_result.stderr_lines | default([]) | join('\n') }}"
  when: fetch_platforms_monitor_result.stderr_lines is defined and fetch_platforms_monitor_result.stderr_lines | length > 0

- name: Display Python script debug output for skip platforms
  debug:
    msg: "{{ fetch_platforms_skip_result.stderr_lines | default([]) | join('\n') }}"
  when: fetch_platforms_skip_result.stderr_lines is defined and fetch_platforms_skip_result.stderr_lines | length > 0

- name: Parse fetched platforms
  set_fact:
    netbox_platforms_monitor_raw: "{{ (fetch_platforms_monitor_result.stdout | from_json).platforms }}"
    netbox_platforms_monitor_count: "{{ (fetch_platforms_monitor_result.stdout | from_json).platforms_count }}"
    netbox_platforms_skip_raw: "{{ (fetch_platforms_skip_result.stdout | from_json).platforms }}"
    netbox_platforms_skip_count: "{{ (fetch_platforms_skip_result.stdout | from_json).platforms_count }}"
    # Backwards compatibility for existing flow
    netbox_platforms_raw: "{{ (fetch_platforms_monitor_result.stdout | from_json).platforms }}"
    netbox_platforms_count: "{{ (fetch_platforms_monitor_result.stdout | from_json).platforms_count }}"
    netbox_platforms_izlenmeyecek_raw: "{{ (fetch_platforms_skip_result.stdout | from_json).platforms }}"

- name: Display platforms fetch results
  debug:
    msg: |
      ============================================
      NETBOX PLATFORMS FETCH RESULTS
      ============================================
      Monitor platforms (Evet/null) count: {{ netbox_platforms_monitor_count }}
      Skip platforms (Hayır) count: {{ netbox_platforms_skip_count }}
      ============================================

