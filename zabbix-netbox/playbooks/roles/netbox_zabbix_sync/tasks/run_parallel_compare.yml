---
# Phase A: parallel compare + payload build for devices, platforms, and virtual firewalls.
# Runs parallel_compare_engine.py once (run_once: true); writes plan files to /tmp.
# Ansible apply loops (Phase B) POST ready payloads sequentially.

- name: Copy parallel compare engine to runner
  copy:
    src: parallel_compare_engine.py
    dest: /tmp/parallel_compare_engine.py
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Copy Zabbix payload builder to runner
  copy:
    src: zabbix_payload_builder.py
    dest: /tmp/zabbix_payload_builder.py
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Ensure module_utils directory on runner for payload builder
  file:
    path: /tmp/module_utils
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Copy zabbix merge helpers for payload builder runtime
  copy:
    src: "{{ role_path }}/module_utils/zabbix_merge_helpers.py"
    dest: /tmp/module_utils/zabbix_merge_helpers.py
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: Write devices JSON for compare engine
  copy:
    content: "{{ netbox_devices_final | default([]) | to_json }}"
    dest: /tmp/pce_devices.json
  delegate_to: localhost
  run_once: true
  when: sync_devices | bool

- name: Write empty devices JSON when device sync disabled
  copy:
    content: "[]"
    dest: /tmp/pce_devices.json
  delegate_to: localhost
  run_once: true
  when: not (sync_devices | bool)

- name: Write platforms JSON for compare engine
  copy:
    content: "{{ netbox_platforms_raw | default([]) | to_json }}"
    dest: /tmp/pce_platforms.json
  delegate_to: localhost
  run_once: true
  when: sync_platforms | bool

- name: Write empty platforms JSON when platform sync disabled
  copy:
    content: "[]"
    dest: /tmp/pce_platforms.json
  delegate_to: localhost
  run_once: true
  when: not (sync_platforms | bool)

- name: Write virtual firewalls JSON for compare engine
  copy:
    content: "{{ netbox_virtual_fws_raw | default([]) | to_json }}"
    dest: /tmp/pce_vfws.json
  delegate_to: localhost
  run_once: true
  when: sync_virtual_fws | bool

- name: Write empty VFWs JSON when VFW sync disabled
  copy:
    content: "[]"
    dest: /tmp/pce_vfws.json
  delegate_to: localhost
  run_once: true
  when: not (sync_virtual_fws | bool)

- name: Write Zabbix hosts by Loki_ID map for compare engine
  copy:
    content: "{{ zabbix_hosts_by_loki_id | default({}) | to_json }}"
    dest: /tmp/pce_zbx_by_loki.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix hosts by hostname map for compare engine
  copy:
    content: "{{ zabbix_hosts_by_hostname | default({}) | to_json }}"
    dest: /tmp/pce_zbx_by_hostname.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix hosts by visible name map for compare engine
  copy:
    content: "{{ zabbix_hosts_by_visible_name | default({}) | to_json }}"
    dest: /tmp/pce_zbx_by_visible.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix hosts by primary IP map for compare engine
  copy:
    content: "{{ zabbix_hosts_by_ip | default({}) | to_json }}"
    dest: /tmp/pce_zbx_by_ip.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix template ID cache for payload builder
  copy:
    content: "{{ zbx_template_id_cache | default({}) | to_json }}"
    dest: /tmp/pce_template_id_cache.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix host group ID cache for payload builder
  copy:
    content: "{{ zbx_group_map_global | default({}) | to_json }}"
    dest: /tmp/pce_group_id_cache.json
  delegate_to: localhost
  run_once: true

- name: Write Zabbix proxy group map for payload builder
  copy:
    content: "{{ zbx_proxy_group_map_global | default({}) | to_json }}"
    dest: /tmp/pce_proxy_group_cache.json
  delegate_to: localhost
  run_once: true

- name: Write HMDL baseline map for payload builder
  copy:
    content: "{{ hmdl_baseline_by_device_id | default({}) | to_json }}"
    dest: /tmp/pce_hmdl_baseline.json
  delegate_to: localhost
  run_once: true
  when: hmdl_log_enabled | bool

- name: Write empty HMDL baseline map when logging disabled
  copy:
    content: "{}"
    dest: /tmp/pce_hmdl_baseline.json
  delegate_to: localhost
  run_once: true
  when: not (hmdl_log_enabled | bool)

- name: Run parallel compare engine (Phase A)
  command: >
    python3 /tmp/parallel_compare_engine.py
    --devices-json /tmp/pce_devices.json
    --platforms-json /tmp/pce_platforms.json
    --vfws-json /tmp/pce_vfws.json
    --mappings-dir {{ (playbook_dir | default(ansible_playbook_directory)) + '/../mappings' }}
    --zbx-hosts-loki-map /tmp/pce_zbx_by_loki.json
    --zbx-hosts-hostname-map /tmp/pce_zbx_by_hostname.json
    --zbx-hosts-visible-map /tmp/pce_zbx_by_visible.json
    --zbx-hosts-ip-map /tmp/pce_zbx_by_ip.json
    --zbx-templates-cache /tmp/pce_template_id_cache.json
    --zbx-groups-cache /tmp/pce_group_id_cache.json
    --zbx-proxy-groups-cache /tmp/pce_proxy_group_cache.json
    --hmdl-baseline-map /tmp/pce_hmdl_baseline.json
    --output-dir /tmp
    --workers {{ parallel_compare_workers | default(20) | int }}
    {{ '--create-devices-disabled' if (create_devices_disabled | default(false) | bool) else '' }}
    {{ '--create-platforms-disabled' if (create_platforms_disabled | default(false) | bool) else '' }}
    {{ '--create-vfws-disabled' if (create_virtual_fws_disabled | default(false) | bool) else '' }}
  register: pce_result
  delegate_to: localhost
  run_once: true
  changed_when: false
  failed_when: false

- name: Show compare engine progress output
  debug:
    msg: "{{ item }}"
  loop: "{{ (pce_result.stdout_lines | default([])) }}"
  delegate_to: localhost
  run_once: true
  when:
    - pce_result.stdout_lines is defined
    - pce_result.stdout_lines | length > 0

- name: Fail when compare engine exited with error
  fail:
    msg: >
      parallel_compare_engine.py exited with code {{ pce_result.rc }}.
      stderr: {{ pce_result.stderr | default('') }}
  when:
    - pce_result.rc is defined
    - pce_result.rc != 0
    - not (parallel_compare_ignore_errors | default(false) | bool)
  delegate_to: localhost
  run_once: true

- name: Load compare engine summary from file
  set_fact:
    pce_summary: "{{ lookup('file', '/tmp/compare_summary.json') | from_json }}"
  delegate_to: localhost
  run_once: true
  when:
    - pce_result.rc is defined
    - pce_result.rc == 0

- name: Load missing host groups aggregate from compare engine
  set_fact:
    pce_missing_groups: "{{ lookup('file', '/tmp/missing_groups_aggregate.json') | from_json }}"
  delegate_to: localhost
  run_once: true

- name: Set all missing host groups list for pre-Phase-B creation
  set_fact:
    all_missing_groups_to_create: "{{ pce_missing_groups.groups | default([]) }}"
  delegate_to: localhost
  run_once: true

- name: Display compare engine summary
  debug:
    msg: |
      ============================================
      PHASE A COMPARE + PAYLOAD BUILD SUMMARY
      ============================================
      Devices:   total={{ pce_summary.devices.total | default(0) }}  create={{ pce_summary.devices.create | default(0) }}  update={{ pce_summary.devices.update | default(0) }}  skip={{ pce_summary.devices.skip | default(0) }}  error={{ pce_summary.devices.error | default(0) }}
      Platforms: total={{ pce_summary.platforms.total | default(0) }}  create={{ pce_summary.platforms.create | default(0) }}  update={{ pce_summary.platforms.update | default(0) }}  skip={{ pce_summary.platforms.skip | default(0) }}  error={{ pce_summary.platforms.error | default(0) }}
      VFWs:      total={{ pce_summary.vfws.total | default(0) }}  create={{ pce_summary.vfws.create | default(0) }}  update={{ pce_summary.vfws.update | default(0) }}  skip={{ pce_summary.vfws.skip | default(0) }}  error={{ pce_summary.vfws.error | default(0) }}
      Missing host groups to create: {{ all_missing_groups_to_create | default([]) | length }}
      ============================================
  delegate_to: localhost
  run_once: true
  when:
    - pce_summary is defined
    - pce_summary.devices is defined
