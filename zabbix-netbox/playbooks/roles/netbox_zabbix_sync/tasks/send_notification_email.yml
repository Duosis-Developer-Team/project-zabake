---
- name: Calculate device statistics
  set_fact:
    failed_devices_count: "{{ processing_results | default([]) | selectattr('status', 'equalto', 'eklenemedi') | list | length | int }}"
    added_devices_count: "{{ processing_results | default([]) | selectattr('status', 'equalto', 'eklendi') | list | length | int }}"
    updated_devices_count: "{{ processing_results | default([]) | selectattr('status', 'equalto', 'güncellendi') | list | length | int }}"
    current_devices_count: "{{ processing_results | default([]) | selectattr('status', 'equalto', 'güncel') | list | length | int }}"
    total_devices_count: "{{ processing_results | default([]) | length | int }}"
    skipped_izlenmeyecek_count: "{{ processing_results | default([]) | selectattr('status', 'equalto', 'atlandı') | list | length | int }}"

- name: Generate email HTML content (Summary + Failures Only)
  set_fact:
    email_html_content: >-
      <html>
      <head>
        <style>
          body { font-family: Arial, sans-serif; }
          table { border-collapse: collapse; width: 100%; margin: 20px 0; }
          th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
          th { background-color: #f44336; color: white; }
          tr:nth-child(even) { background-color: #f2f2f2; }
          .status-eklenemedi { color: #f44336; font-weight: bold; }
          .summary { margin: 20px 0; padding: 15px; background-color: #f9f9f9; border-left: 4px solid #4CAF50; }
          .summary-warning { border-left-color: #f44336; }
          .section-header { margin-top: 30px; padding: 10px; background-color: #ffebee; border-left: 4px solid #f44336; }
          .info-box { padding: 10px; background-color: #e3f2fd; border-left: 4px solid #2196F3; margin: 20px 0; }
        </style>
      </head>
      <body>
        <h2>Loki - Zabbix Entegrasyonu Raporu</h2>
        <div class="summary {%- if failed_devices_count | int > 0 %} summary-warning{%- endif %}">
          <h3>📊 Özet</h3>
          <p><strong>Toplam İşlem:</strong> {{ total_devices_count }}</p>
          <p><strong>✅ Başarılı (Eklendi):</strong> {{ added_devices_count }}</p>
          <p><strong>🔄 Güncellendi:</strong> {{ updated_devices_count }}</p>
          <p><strong>ℹ️ Güncel (Değişiklik Yok):</strong> {{ current_devices_count }}</p>
          <p><strong>❌ Başarısız (Eklenemedi):</strong> {{ failed_devices_count }}</p>
          <p><strong>⏭️ Atlandı (İzlenmeyecek):</strong> {{ skipped_izlenmeyecek_count }}</p>
        </div>
        
        {%- set failed_list = processing_results | default([]) | selectattr('status', 'equalto', 'eklenemedi') | list -%}
        {%- if failed_list | length > 0 -%}
        <div class="section-header"><h3>❌ HATA: Eklenemeyen Cihazlar ({{ failed_devices_count }})</h3></div>
        <table>
          <thead>
            <tr>
              <th>Sunucu Adı</th>
              <th>Device Role</th>
              <th>Lokasyon</th>
              <th>Site</th>
              <th>Tenant</th>
              <th>Sahiplik</th>
              <th>IP Adresi</th>
              <th>İşlem Durumu</th>
              <th>Hata Sebebi</th>
            </tr>
          </thead>
          <tbody>
            {%- for result in failed_list -%}
            <tr>
              <td>{{ result.hostname | default('N/A') }}</td>
              <td>{{ result.device_role | default('N/A') }}</td>
              <td>{{ result.location | default('N/A') }}</td>
              <td>{{ result.site | default('N/A') }}</td>
              <td>{{ result.tenant | default('N/A') }}</td>
              <td>{{ result.ownership | default('N/A') }}</td>
              <td>{{ result.ip | default('N/A') }}</td>
              <td class="status-eklenemedi">EKLENEMEDI</td>
              <td>{{ result.reason | default('-') }}</td>
            </tr>
            {%- endfor -%}
          </tbody>
        </table>
        {%- else -%}
        <div class="info-box">
          <h3>✅ Tüm Cihazlar Başarıyla İşlendi</h3>
          <p>Hiçbir hata oluşmadı. Tüm cihazlar başarıyla eklendi veya güncellendi.</p>
        </div>
        {%- endif -%}

        {%- if report_izlenmeyecek | default(true) | bool -%}
        {%- set skipped_list = processing_results | default([]) | selectattr('status', 'equalto', 'atlandı') | list -%}
        {%- if skipped_list | length > 0 -%}
        <div class="section-header"><h3>⏭️ İzlenmeyecek Olarak İşaretlenenler ({{ skipped_izlenmeyecek_count }})</h3></div>
        <table>
          <thead>
            <tr>
              <th>Sunucu / Platform Adı</th>
              <th>Device Role</th>
              <th>Lokasyon</th>
              <th>Site</th>
              <th>Tenant</th>
              <th>Sahiplik</th>
              <th>IP Adresi</th>
              <th>İşlem Durumu</th>
              <th>Açıklama</th>
            </tr>
          </thead>
          <tbody>
            {%- for result in skipped_list -%}
            <tr>
              <td>{{ result.hostname | default('N/A') }}</td>
              <td>{{ result.device_role | default('N/A') }}</td>
              <td>{{ result.location | default('N/A') }}</td>
              <td>{{ result.site | default('N/A') }}</td>
              <td>{{ result.tenant | default('N/A') }}</td>
              <td>{{ result.ownership | default('N/A') }}</td>
              <td>{{ result.ip | default('N/A') }}</td>
              <td>ATLANDI</td>
              <td>{{ result.reason | default('İzlenmeyecek olarak işaretli') }}</td>
            </tr>
            {%- endfor -%}
          </tbody>
        </table>
        {%- endif -%}
        {%- endif -%}
        
        <div class="info-box">
          <p><strong>📎 Detaylı Rapor:</strong> Tüm cihazların detaylı bilgileri ekteki <code>zabbix_entegrasyon_detay.csv</code> dosyasında yer almaktadır.</p>
        </div>
        
        <p style="margin-top: 30px; color: #999; font-size: 11px; opacity: 0.7;">
          Bu rapor otomatik olarak HMDL Automation tarafından oluşturulmuştur.
        </p>
      </body>
      </html>

- name: Generate email plain text content (Summary + Failures Only)
  set_fact:
    email_text_content: >-
      LOKI - ZABBIX ENTEGRASYONU RAPORU
      ==================================
      
      ÖZET:
      -----
      Toplam İşlem: {{ total_devices_count }}
      ✅ Başarılı (Eklendi): {{ added_devices_count }}
      🔄 Güncellendi: {{ updated_devices_count }}
      ℹ️ Güncel (Değişiklik Yok): {{ current_devices_count }}
      ❌ Başarısız (Eklenemedi): {{ failed_devices_count }}
      ⏭️ Atlandı (İzlenmeyecek): {{ skipped_izlenmeyecek_count }}
      
      {%- set failed_list = processing_results | default([]) | selectattr('status', 'equalto', 'eklenemedi') | list -%}
      {%- if failed_list | length > 0 %}
      
      ❌ HATA: EKLENEMEYEN CİHAZLAR ({{ failed_devices_count }}):
      ------------------------------------------
      {%- for result in failed_list %}
      
      Sunucu: {{ result.hostname | default('N/A') }}
      Rol: {{ result.device_role | default('N/A') }}
      Lokasyon: {{ result.location | default('N/A') }}
      Site: {{ result.site | default('N/A') }}
      Tenant: {{ result.tenant | default('N/A') }}
      Sahiplik: {{ result.ownership | default('N/A') }}
      IP: {{ result.ip | default('N/A') }}
      Durum: EKLENEMEDI
      Hata Sebebi: {{ result.reason | default('-') }}
      {%- endfor -%}
      {%- else %}
      
      ✅ TÜM CİHAZLAR BAŞARIYLA İŞLENDİ
      ------------------------------------------
      Hiçbir hata oluşmadı. Tüm cihazlar başarıyla eklendi veya güncellendi.
      {%- endif %}

      {%- if report_izlenmeyecek | default(true) | bool %}

      ⏭️ İZLENMEYECEK OLARAK İŞARETLENENLER ({{ skipped_izlenmeyecek_count }}):
      ------------------------------------------
      {%- set skipped_list = processing_results | default([]) | selectattr('status', 'equalto', 'atlandı') | list -%}
      {%- for result in skipped_list %}

      Ad: {{ result.hostname | default('N/A') }}
      Rol: {{ result.device_role | default('N/A') }}
      Lokasyon: {{ result.location | default('N/A') }}
      Site: {{ result.site | default('N/A') }}
      Tenant: {{ result.tenant | default('N/A') }}
      Sahiplik: {{ result.ownership | default('N/A') }}
      IP: {{ result.ip | default('N/A') }}
      Açıklama: {{ result.reason | default('İzlenmeyecek olarak işaretli') }}
      {%- endfor -%}
      {%- endif %}
      
      
      📎 DETAYLI RAPOR:
      ------------------------------------------
      Tüm cihazların detaylı bilgileri ekteki "zabbix_entegrasyon_detay.csv" dosyasında yer almaktadır.
      
      ---
      Bu rapor otomatik olarak HMDL Automation tarafından oluşturulmuştur.

- name: Generate email subject
  set_fact:
    email_subject: >-
      {%- if failed_devices_count | int > 0 -%}
      Loki - Zabbix Entegrasyonu Raporu - {{ failed_devices_count }} Sunucu Eklenemedi
      {%- else -%}
      Loki - Zabbix Entegrasyonu Raporu - Tüm İşlemler Başarılı ({{ added_devices_count }} Eklendi, {{ updated_devices_count }} Güncellendi)
      {%- endif -%}

- name: Prepare email recipients as comma-separated string
  set_fact:
    mail_recipients_str: "{{ mail_recipients | join(',') }}"

- name: Convert processing results to JSON for Python
  set_fact:
    processing_results_json: "{{ processing_results | to_json }}"

- name: Ensure temporary directory for email data exists
  file:
    path: "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  run_once: true

- name: Write processing results JSON to temporary file
  copy:
    content: "{{ processing_results_json }}"
    dest: "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/processing_results.json"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Write email HTML content to temporary file
  copy:
    content: "{{ email_html_content }}"
    dest: "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/email_body.html"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Write email plain text content to temporary file
  copy:
    content: "{{ email_text_content }}"
    dest: "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/email_body.txt"
    mode: '0600'
  delegate_to: localhost
  run_once: true

- name: Send notification email with CSV attachment using Python SMTP
  command: >
    python3 {{ role_path }}/files/send_notification_email_smtp.py
    --smtp-host {{ mail_smtp_host }}
    --smtp-port {{ mail_smtp_port }}
    --smtp-user {{ mail_smtp_username | default('') }}
    --smtp-pass {{ mail_smtp_password | default('') }}
    --from-addr {{ mail_from }}
    --recipients "{{ mail_recipients_str }}"
    --subject "{{ email_subject }}"
    --results-file "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/processing_results.json"
    --html-file "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/email_body.html"
    --text-file "{{ netbox_zabbix_sync_tmp_dir | default('/tmp/netbox_zabbix_sync') }}/email_body.txt"
  when: 
    - processing_results is defined
    - processing_results | length > 0
    - mail_recipients is defined
    - mail_recipients | length > 0
  delegate_to: localhost
  run_once: true
  ignore_errors: true
  register: mail_send_result

- name: Display email notification status
  debug:
    msg: |
      ============================================
      EMAIL NOTIFICATION STATUS
      ============================================
      {% if processing_results is defined and processing_results | length > 0 %}
      İŞLEM ÖZETİ:
      - Toplam: {{ total_devices_count }}
      - Eklendi: {{ added_devices_count }}
      - Güncellendi: {{ updated_devices_count }}
      - Güncel: {{ current_devices_count }}
      - Başarısız: {{ failed_devices_count }}
      {% if failed_devices_count | int > 0 %}
      UYARI: Başarısız işlem var - {{ failed_devices_count }} sunucu eklenemedi
      {% else %}
      BAŞARILI: Tüm işlemler başarılı
      {% endif %}
      {% if mail_recipients is defined and mail_recipients | length > 0 %}
      {% if mail_send_result is defined and mail_send_result.rc is defined %}
      {% if mail_send_result.rc == 0 %}
      BAŞARILI: E-posta başarıyla gönderildi: {{ mail_recipients | join(', ') }}
      Yöntem: Python SMTP ile CSV eki
      {% else %}
      HATA: E-posta gönderilemedi
      Hata: {{ mail_send_result.stdout | default('Bilinmeyen hata') }}
      {% endif %}
      {% elif mail_send_result is skipped %}
      BİLGİ: E-posta gönderimi atlandı
      {% else %}
      BİLGİ: E-posta durumu belirsiz
      {% endif %}
      {% else %}
      BİLGİ: E-posta gönderilmedi - mail_recipients tanımlı değil
      {% endif %}
      {% else %}
      BİLGİ: İşlem sonucu bulunamadı
      {% endif %}
      ============================================
  run_once: true

