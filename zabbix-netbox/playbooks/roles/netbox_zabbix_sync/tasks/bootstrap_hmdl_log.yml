---
# One-time HMDL schema/table bootstrap per playbook run (not per device).

- name: Create HMDL value preparer script
  copy:
    content: |
      #!/usr/bin/env python3
      """
      Prepares HMDL log entry values for DB insert.
      No database connection — value normalization and JSON serialization only.
      """
      import json
      import sys

      def nullify(v):
          if v is None or v == "" or v == "N/A":
              return None
          return v

      def to_int_or_none(v):
          if v is None or v == "" or v == "N/A":
              return None
          try:
              return int(v)
          except (ValueError, TypeError):
              return None

      def to_jsonb_str(v):
          if v is None or v == "" or v == {} or v == []:
              return None
          if isinstance(v, (dict, list)):
              return json.dumps(v, default=str)
          if isinstance(v, str):
              try:
                  parsed = json.loads(v)
                  if parsed == {} or parsed == []:
                      return None
                  return json.dumps(parsed, default=str)
              except (ValueError, TypeError):
                  return None
          return None

      entry_file = sys.argv[1]
      with open(entry_file, 'r') as f:
          entry = json.load(f)

      prepared = {
          "run_id":               nullify(entry.get("run_id")),
          "awx_job_id":           nullify(entry.get("awx_job_id")),
          "playbook_name":        nullify(entry.get("playbook_name")),
          "source_device_id":     to_int_or_none(entry.get("source_device_id")),
          "source_device_name":   nullify(entry.get("source_device_name")),
          "source_table":         nullify(entry.get("source_table")),
          "host_entity_type":     nullify(entry.get("host_entity_type")),
          "inventory_source":     nullify(entry.get("inventory_source")),
          "zabbix_hostid":        nullify(entry.get("zabbix_hostid")),
          "zabbix_hostname":      nullify(entry.get("zabbix_hostname")),
          "zabbix_host_ip":       nullify(entry.get("zabbix_host_ip")),
          "last_visible_name":    nullify(entry.get("last_visible_name")),
          "device_type":          nullify(entry.get("device_type")),
          "device_role":          nullify(entry.get("device_role")),
          "manufacturer_name":    nullify(entry.get("manufacturer_name")),
          "site_name":            nullify(entry.get("site_name")),
          "location_name":        nullify(entry.get("location_name")),
          "location_parent_name": nullify(entry.get("location_parent_name")),
          "root_location_name":   nullify(entry.get("root_location_name")),
          "last_location":        nullify(entry.get("last_location")),
          "tenant_name":          nullify(entry.get("tenant_name")),
          "cluster_name":         nullify(entry.get("cluster_name")),
          "operation":            nullify(entry.get("operation")),
          "status":               entry.get("status") or "eklenemedi",
          "reason":               nullify(entry.get("reason")),
          "dry_run":              bool(entry.get("dry_run", False)),
          "expected_proxy_group_id": nullify(entry.get("expected_proxy_group_id")),
          "last_proxy_group_id":  nullify(entry.get("last_proxy_group_id")),
          "zabbix_proxy_group_id": nullify(entry.get("zabbix_proxy_group_id")),
          "proxy_location_change": bool(entry.get("proxy_location_change", False)),
          "proxy_manual_change_detected": bool(entry.get("proxy_manual_change_detected", False)),
          "field_merge_actions":  to_jsonb_str(entry.get("field_merge_actions")),
          "last_managed_groups":  to_jsonb_str(entry.get("last_managed_groups")),
          "request_payload":      to_jsonb_str(entry.get("request_payload")),
          "response_payload":     to_jsonb_str(entry.get("response_payload")),
          "error_payload":        to_jsonb_str(entry.get("error_payload")),
          "extra_data":           to_jsonb_str(entry.get("extra_data")),
      }
      print(json.dumps(prepared))
    dest: /tmp/hmdl_prepare_values.py
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when: hmdl_log_enabled | bool

- name: Ensure HMDL log schema exists
  community.postgresql.postgresql_query:
    db: "{{ hmdl_db_name }}"
    login_host: "{{ hmdl_db_host }}"
    login_port: "{{ hmdl_db_port | int }}"
    login_user: "{{ hmdl_db_user }}"
    login_password: "{{ hmdl_db_password }}"
    query: "CREATE SCHEMA IF NOT EXISTS {{ hmdl_log_schema }}"
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: hmdl_log_enabled | bool

- name: Ensure HMDL log table exists
  community.postgresql.postgresql_query:
    db: "{{ hmdl_db_name }}"
    login_host: "{{ hmdl_db_host }}"
    login_port: "{{ hmdl_db_port | int }}"
    login_user: "{{ hmdl_db_user }}"
    login_password: "{{ hmdl_db_password }}"
    query: |
      CREATE TABLE IF NOT EXISTS {{ hmdl_log_schema }}.{{ hmdl_log_table }} (
          id                           BIGSERIAL PRIMARY KEY,
          run_id                       VARCHAR(100) NULL,
          awx_job_id                   VARCHAR(100) NULL,
          playbook_name                TEXT NULL,
          source_device_id             BIGINT NULL,
          source_device_name           TEXT NULL,
          source_table                 TEXT DEFAULT 'discovery_netbox_inventory_device',
          host_entity_type             VARCHAR(30) NULL,
          inventory_source             VARCHAR(20) NULL,
          zabbix_hostid                TEXT NULL,
          zabbix_hostname              TEXT NULL,
          zabbix_host_ip               TEXT NULL,
          last_visible_name            TEXT NULL,
          device_type                  TEXT NULL,
          device_role                  TEXT NULL,
          manufacturer_name            TEXT NULL,
          site_name                    TEXT NULL,
          location_name                TEXT NULL,
          location_parent_name         TEXT NULL,
          root_location_name           TEXT NULL,
          last_location                TEXT NULL,
          tenant_name                  TEXT NULL,
          cluster_name                 TEXT NULL,
          operation                    VARCHAR(50) NULL,
          status                       VARCHAR(50) NOT NULL,
          reason                       TEXT NULL,
          dry_run                      BOOLEAN DEFAULT FALSE NOT NULL,
          expected_proxy_group_id      TEXT NULL,
          last_proxy_group_id          TEXT NULL,
          zabbix_proxy_group_id        TEXT NULL,
          proxy_location_change        BOOLEAN DEFAULT FALSE NOT NULL,
          proxy_manual_change_detected BOOLEAN DEFAULT FALSE NOT NULL,
          field_merge_actions          JSONB NULL,
          last_managed_groups          JSONB NULL,
          request_payload              JSONB NULL,
          response_payload             JSONB NULL,
          error_payload                JSONB NULL,
          extra_data                   JSONB NULL,
          processed_at                 TIMESTAMPTZ DEFAULT NOW(),
          created_at                   TIMESTAMPTZ DEFAULT NOW()
      )
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: hmdl_log_enabled | bool

- name: Ensure HMDL log table has merge/proxy audit columns
  community.postgresql.postgresql_query:
    db: "{{ hmdl_db_name }}"
    login_host: "{{ hmdl_db_host }}"
    login_port: "{{ hmdl_db_port | int }}"
    login_user: "{{ hmdl_db_user }}"
    login_password: "{{ hmdl_db_password }}"
    query: "{{ item }}"
  loop:
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS host_entity_type VARCHAR(30) NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS inventory_source VARCHAR(20) NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS last_visible_name TEXT NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS last_location TEXT NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS expected_proxy_group_id TEXT NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS last_proxy_group_id TEXT NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS zabbix_proxy_group_id TEXT NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS proxy_location_change BOOLEAN DEFAULT FALSE"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS proxy_manual_change_detected BOOLEAN DEFAULT FALSE"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS field_merge_actions JSONB NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS last_managed_groups JSONB NULL"
    - "ALTER TABLE {{ hmdl_log_schema }}.{{ hmdl_log_table }} ADD COLUMN IF NOT EXISTS dry_run BOOLEAN DEFAULT FALSE"
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: hmdl_log_enabled | bool

- name: Ensure HMDL log table indexes exist
  community.postgresql.postgresql_query:
    db: "{{ hmdl_db_name }}"
    login_host: "{{ hmdl_db_host }}"
    login_port: "{{ hmdl_db_port | int }}"
    login_user: "{{ hmdl_db_user }}"
    login_password: "{{ hmdl_db_password }}"
    query: "{{ item }}"
  loop:
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_processed_at ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (processed_at)"
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_status ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (status)"
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_source_device_id ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (source_device_id)"
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_run_id ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (run_id)"
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_zabbix_hostname ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (zabbix_hostname)"
    - "CREATE INDEX IF NOT EXISTS idx_{{ hmdl_log_table }}_hostid_time ON {{ hmdl_log_schema }}.{{ hmdl_log_table }} (source_device_id, processed_at DESC)"
  delegate_to: localhost
  run_once: true
  changed_when: false
  when: hmdl_log_enabled | bool

- name: Mark HMDL bootstrap as completed for this run
  set_fact:
    _hmdl_bootstrap_done: true
  run_once: true
  delegate_to: localhost
  when: hmdl_log_enabled | bool
