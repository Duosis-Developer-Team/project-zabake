---
# Phase B: POST pre-built Zabbix payloads from platform compare plans.

- name: Resolve platform sync plan file path
  set_fact:
    _platform_plan_path: "/tmp/platform_plan_{{ netbox_platform.id | string }}.json"
  when: netbox_platform.id is defined

- name: Check platform sync plan file exists
  stat:
    path: "{{ _platform_plan_path }}"
  register: _platform_plan_stat
  delegate_to: localhost
  when: netbox_platform.id is defined

- name: Load platform sync plan from compare phase
  set_fact:
    _platform_sync_plan_loaded: "{{ lookup('file', _platform_plan_path) | from_json }}"
  when:
    - netbox_platform.id is defined
    - _platform_plan_stat.stat.exists | default(false) | bool

- name: Record missing platform plan (Phase A file not found, non-fatal)
  set_fact:
    _platform_sync_plan_loaded:
      action: skip
      zbx_record: {}
      current_platform_result:
        hostname: "{{ netbox_platform.name | default(netbox_platform.display | default('Unknown Platform')) }}"
        device_role: PLATFORM
        status: eklenemedi
        reason: >-
          Phase A plan missing at {{ _platform_plan_path }}.
          Ensure platform fetch runs before Phase A (main.yml task order).
        ip: "{{ netbox_platform.custom_fields.ip_addresses | default('N/A') if (netbox_platform.custom_fields is defined) else 'N/A' }}"
        location: N/A
        site: N/A
        tenant: N/A
        ownership: N/A
  when:
    - netbox_platform.id is defined
    - not (_platform_plan_stat.stat.exists | default(false) | bool)

- name: Save missing-plan platform result to temporary file
  copy:
    content: "{{ _platform_sync_plan_loaded.current_platform_result | to_json }}"
    dest: "/tmp/zabbix_platform_operation_result_{{ netbox_platform.id | default('unknown') }}.json"
  when:
    - _platform_sync_plan_loaded is defined
    - _platform_sync_plan_loaded.current_platform_result is defined
    - not (_platform_plan_stat.stat.exists | default(false) | bool)
  delegate_to: localhost

- name: Use precomputed result for skip action (no Zabbix API call)
  set_fact:
    current_platform_result: "{{ _platform_sync_plan_loaded.current_platform_result | default({}) }}"
  when:
    - _platform_sync_plan_loaded is defined
    - _platform_sync_plan_loaded.action | default('skip') == 'skip'

- name: POST host.create from platform plan payload (Phase B)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.create"
      params: "{{ _platform_sync_plan_loaded.create_payload }}"
      auth: "{{ zabbix_auth }}"
      id: 1
  register: zbx_platform_create_resp
  failed_when: false
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'create'
    - _platform_sync_plan_loaded.create_payload is defined
    - _platform_sync_plan_loaded.create_payload | length > 0
    - not (dry_run | default(false) | bool)
    - zabbix_auth is defined

- name: Record platform create success from plan apply
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "eklendi"
      reason: ""
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      manufacturer: "{{ _platform_sync_plan_loaded.zbx_record.MACROS | default('{}') }}"
      planned_operation: "create"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'create'
    - zbx_platform_create_resp.json.result is defined

- name: Record platform create failure from plan apply
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: >-
        {{
          (zbx_platform_create_resp.json.error.data | default('') | string | trim)
          if (zbx_platform_create_resp.json.error.data is defined and (zbx_platform_create_resp.json.error.data | string | trim | length) > 0)
          else (zbx_platform_create_resp.json.error.message | default('host.create failed'))
        }}
      error_data: "{{ zbx_platform_create_resp.json.error.data | default('') | string | trim }}"
      update_reasons: "{{ _platform_sync_plan_loaded.update_reasons | default([]) }}"
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "create"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'create'
    - zbx_platform_create_resp is defined
    - zbx_platform_create_resp.json.error is defined

- name: DRY-RUN — Record planned platform create
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "dry_run"
      reason: "Dry-run: host.create çağrısı yapılmadı — eklenecekti"
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "create"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'create'
    - dry_run | default(false) | bool

- name: Use precomputed up-to-date result for platform update with no delta
  set_fact:
    current_platform_result: "{{ _platform_sync_plan_loaded.current_platform_result | default({}) }}"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - not (_platform_sync_plan_loaded.needs_update | default(false) | bool)

- name: POST host.update from platform plan payload (Phase B)
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.update"
      params: "{{ _platform_sync_plan_loaded.update_payload }}"
      auth: "{{ zabbix_auth }}"
      id: 2
  register: zbx_platform_update_resp
  failed_when: false
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - _platform_sync_plan_loaded.needs_update | default(false) | bool
    - _platform_sync_plan_loaded.update_payload is defined
    - not (dry_run | default(false) | bool)
    - zabbix_auth is defined

- name: Record platform update success from plan apply
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "güncellendi"
      reason: ""
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - zbx_platform_update_resp.json.result is defined

- name: Record platform update failure from plan apply
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "eklenemedi"
      reason: >-
        {{
          (zbx_platform_update_resp.json.error.data | default('') | string | trim)
          if (zbx_platform_update_resp.json.error.data is defined and (zbx_platform_update_resp.json.error.data | string | trim | length) > 0)
          else (zbx_platform_update_resp.json.error.message | default('host.update failed'))
        }}
      error_data: "{{ zbx_platform_update_resp.json.error.data | default('') | string | trim }}"
      update_reasons: "{{ _platform_sync_plan_loaded.update_reasons | default([]) }}"
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - zbx_platform_update_resp is defined
    - zbx_platform_update_resp.json.error is defined

- name: Debug — Show detailed Zabbix update error (Phase B platform apply)
  debug:
    msg: |
      ========================================
      ZABBIX API UPDATE ERROR (Phase B platform)
      ========================================
      Host: {{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('N/A') }}
      Error message: {{ zbx_platform_update_resp.json.error.message | default('N/A') }}
      Error data: {{ zbx_platform_update_resp.json.error.data | default('N/A') | to_nice_json }}
      ========================================
  when:
    - debug_mode | default(false) | bool
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - zbx_platform_update_resp is defined
    - zbx_platform_update_resp.json.error is defined

- name: DRY-RUN — Record planned platform update
  set_fact:
    current_platform_result:
      hostname: "{{ _platform_sync_plan_loaded.zbx_record.HOSTNAME | default('') }}"
      device_role: "PLATFORM"
      status: "dry_run"
      reason: "Dry-run: host.update çağrısı yapılmadı — güncellenecekti"
      ip: "{{ _platform_sync_plan_loaded.zbx_record.HOST_IP | default('N/A') }}"
      location: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_LOCATION | default('N/A') }}"
      site: "{{ _platform_sync_plan_loaded.zbx_record.REPORT_SITE | default('N/A') }}"
      tenant: "N/A"
      ownership: "N/A"
      planned_operation: "update"
  when:
    - _platform_sync_plan_loaded.action | default('skip') == 'update'
    - _platform_sync_plan_loaded.needs_update | default(false) | bool
    - dry_run | default(false) | bool

- name: Save platform result to temporary file (apply phase)
  copy:
    content: "{{ current_platform_result | to_json }}"
    dest: "/tmp/zabbix_platform_operation_result_{{ netbox_platform.id | default('unknown') }}.json"
  when:
    - current_platform_result is defined
    - current_platform_result | length > 0
    - current_platform_result.hostname is defined
  delegate_to: localhost

- name: Log platform result to HMDL audit table (apply phase)
  include_tasks: hmdl_sync_log.yml
  vars:
    hmdl_log_device_id: "{{ netbox_platform.id | default('unknown') }}"
    hmdl_log_entry:
      run_id: "{{ hmdl_run_id | default('') }}"
      awx_job_id: "{{ lookup('env', 'AWX_JOB_ID') | default('', true) }}"
      playbook_name: "{{ hmdl_playbook_name | default('db_to_zabbix_sync') }}"
      source_device_id: "{{ netbox_platform.id | default(None) }}"
      source_device_name: "{{ netbox_platform.name | default(netbox_platform.display | default('')) }}"
      source_table: "netbox_api_dcim_platform"
      host_entity_type: platform
      inventory_source: "{{ platform_source | default('loki') }}"
      zabbix_hostid: "{{ _platform_sync_plan_loaded.zbx_existing_host.hostid | default('') }}"
      zabbix_hostname: "{{ current_platform_result.hostname | default('') }}"
      zabbix_host_ip: "{{ current_platform_result.ip | default('') }}"
      device_type: "{{ _platform_sync_plan_loaded.zbx_record.DEVICE_TYPE | default('') }}"
      device_role: "PLATFORM"
      manufacturer_name: "{{ current_platform_result.manufacturer | default('') }}"
      site_name: "{{ current_platform_result.site | default('') }}"
      location_name: "{{ current_platform_result.location | default('') }}"
      location_parent_name: ""
      root_location_name: ""
      tenant_name: ""
      cluster_name: ""
      operation: "{{ _platform_sync_plan_loaded.zbx_scenario | default('none') }}"
      status: "{{ current_platform_result.status | default('eklenemedi') }}"
      reason: "{{ current_platform_result.reason | default('') }}"
      last_visible_name: "{{ _platform_sync_plan_loaded.zbx_record.HOST_VISIBLE_NAME | default('') }}"
      last_location: "{{ _platform_sync_plan_loaded.zbx_record.DC_ID | default('') }}"
      expected_proxy_group_id: ""
      last_proxy_group_id: ""
      zabbix_proxy_group_id: ""
      proxy_location_change: false
      proxy_manual_change_detected: false
      field_merge_actions: {}
      last_managed_groups: []
      dry_run: "{{ dry_run | default(false) | bool }}"
      extra_data: {}
      request_payload: >-
        {{
          (_platform_sync_plan_loaded.update_payload | default({}, true))
          if ((_platform_sync_plan_loaded.update_payload | default({}, true) | length) > 0)
          else (_platform_sync_plan_loaded.create_payload | default({}, true))
        }}
      response_payload: "{{ zbx_platform_create_resp.json | default(zbx_platform_update_resp.json | default({})) }}"
      error_payload: "{{ zbx_platform_create_resp.json.error | default(zbx_platform_update_resp.json.error | default({})) }}"
  when:
    - hmdl_log_enabled | bool
    - current_platform_result is defined
    - current_platform_result | length > 0
