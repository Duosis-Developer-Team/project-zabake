---
# HMDL Sync Log - hmdl.zabbix_sync_log tablosuna kayıt atar.
#
# Çağıran task'ın sağlaması gereken değişkenler:
#   hmdl_log_entry  : log alanlarını içeren dict
#   hmdl_log_device_id : temp dosya adı için benzersiz ID (örn. device.id)
#
# DB bağlantı değişkenleri defaults/main.yml'den gelir:
#   hmdl_db_host, hmdl_db_port, hmdl_db_name, hmdl_db_user, hmdl_db_password
#   hmdl_log_schema, hmdl_log_table

- name: Create HMDL sync log insert script
  copy:
    content: |
      #!/usr/bin/env python3
      """
      HMDL zabbix_sync_log insert script.
      Hata olursa stderr'e yazar ve exit(0) döner — ana playbook kesilmez.
      """
      import json
      import sys

      try:
          import psycopg2
          import psycopg2.extras
      except ImportError:
          print("HMDL_LOG_ERROR: psycopg2 modülü bulunamadı", file=sys.stderr)
          sys.exit(0)


      def nullify(v):
          """Boş string ve 'N/A' değerlerini None'a çevirir."""
          if v is None or v == "" or v == "N/A":
              return None
          return v


      def to_int_or_none(v):
          if v is None or v == "" or v == "N/A":
              return None
          try:
              return int(v)
          except (ValueError, TypeError):
              return None


      def to_jsonb(v):
          """Dict/list değerlerini psycopg2.extras.Json'a sarar; boş yapıları None döner."""
          if v is None or v == "" or v == {} or v == []:
              return None
          if isinstance(v, (dict, list)):
              return psycopg2.extras.Json(v)
          # string ise JSON parse edip tekrar sarmaya çalış
          if isinstance(v, str):
              try:
                  parsed = json.loads(v)
                  if parsed == {} or parsed == []:
                      return None
                  return psycopg2.extras.Json(parsed)
              except (ValueError, TypeError):
                  return None
          return None


      def main():
          if len(sys.argv) < 9:
              print("HMDL_LOG_ERROR: Yetersiz argüman", file=sys.stderr)
              sys.exit(0)

          db_host     = sys.argv[1]
          db_port     = int(sys.argv[2])
          db_name     = sys.argv[3]
          db_user     = sys.argv[4]
          db_password = sys.argv[5]
          schema      = sys.argv[6]
          table       = sys.argv[7]
          entry_file  = sys.argv[8]

          try:
              with open(entry_file, "r") as f:
                  entry = json.load(f)
          except Exception as e:
              print(f"HMDL_LOG_ERROR: Entry dosyası okunamadı: {e}", file=sys.stderr)
              sys.exit(0)

          try:
              conn = psycopg2.connect(
                  host=db_host, port=db_port, dbname=db_name,
                  user=db_user, password=db_password,
                  connect_timeout=10
              )
              cur = conn.cursor()

              # Şema oluştur
              cur.execute(f"CREATE SCHEMA IF NOT EXISTS {schema}")

              # Tablo oluştur
              cur.execute(f"""
              CREATE TABLE IF NOT EXISTS {schema}.{table} (
                  id                   BIGSERIAL PRIMARY KEY,
                  run_id               VARCHAR(100) NULL,
                  awx_job_id           VARCHAR(100) NULL,
                  playbook_name        TEXT NULL,
                  source_device_id     BIGINT NULL,
                  source_device_name   TEXT NULL,
                  source_table         TEXT DEFAULT 'discovery_netbox_inventory_device',
                  zabbix_hostid        TEXT NULL,
                  zabbix_hostname      TEXT NULL,
                  zabbix_host_ip       TEXT NULL,
                  device_type          TEXT NULL,
                  device_role          TEXT NULL,
                  manufacturer_name    TEXT NULL,
                  site_name            TEXT NULL,
                  location_name        TEXT NULL,
                  location_parent_name TEXT NULL,
                  root_location_name   TEXT NULL,
                  tenant_name          TEXT NULL,
                  cluster_name         TEXT NULL,
                  operation            VARCHAR(50) NULL,
                  status               VARCHAR(50) NOT NULL,
                  reason               TEXT NULL,
                  request_payload      JSONB NULL,
                  response_payload     JSONB NULL,
                  error_payload        JSONB NULL,
                  extra_data           JSONB NULL,
                  processed_at         TIMESTAMPTZ DEFAULT NOW(),
                  created_at           TIMESTAMPTZ DEFAULT NOW()
              )
              """)

              # Index'ler
              for idx_col in ["processed_at", "status", "source_device_id", "run_id", "zabbix_hostname"]:
                  cur.execute(f"""
                  CREATE INDEX IF NOT EXISTS idx_{table}_{idx_col}
                  ON {schema}.{table} ({idx_col})
                  """)

              # Insert
              cur.execute(f"""
              INSERT INTO {schema}.{table} (
                  run_id, awx_job_id, playbook_name,
                  source_device_id, source_device_name,
                  zabbix_hostid, zabbix_hostname, zabbix_host_ip,
                  device_type, device_role, manufacturer_name,
                  site_name, location_name, location_parent_name,
                  root_location_name, tenant_name, cluster_name,
                  operation, status, reason,
                  request_payload, response_payload, error_payload, extra_data
              ) VALUES (
                  %(run_id)s, %(awx_job_id)s, %(playbook_name)s,
                  %(source_device_id)s, %(source_device_name)s,
                  %(zabbix_hostid)s, %(zabbix_hostname)s, %(zabbix_host_ip)s,
                  %(device_type)s, %(device_role)s, %(manufacturer_name)s,
                  %(site_name)s, %(location_name)s, %(location_parent_name)s,
                  %(root_location_name)s, %(tenant_name)s, %(cluster_name)s,
                  %(operation)s, %(status)s, %(reason)s,
                  %(request_payload)s, %(response_payload)s,
                  %(error_payload)s, %(extra_data)s
              )
              """, {
                  "run_id":               nullify(entry.get("run_id")),
                  "awx_job_id":           nullify(entry.get("awx_job_id")),
                  "playbook_name":        nullify(entry.get("playbook_name")),
                  "source_device_id":     to_int_or_none(entry.get("source_device_id")),
                  "source_device_name":   nullify(entry.get("source_device_name")),
                  "zabbix_hostid":        nullify(entry.get("zabbix_hostid")),
                  "zabbix_hostname":      nullify(entry.get("zabbix_hostname")),
                  "zabbix_host_ip":       nullify(entry.get("zabbix_host_ip")),
                  "device_type":          nullify(entry.get("device_type")),
                  "device_role":          nullify(entry.get("device_role")),
                  "manufacturer_name":    nullify(entry.get("manufacturer_name")),
                  "site_name":            nullify(entry.get("site_name")),
                  "location_name":        nullify(entry.get("location_name")),
                  "location_parent_name": nullify(entry.get("location_parent_name")),
                  "root_location_name":   nullify(entry.get("root_location_name")),
                  "tenant_name":          nullify(entry.get("tenant_name")),
                  "cluster_name":         nullify(entry.get("cluster_name")),
                  "operation":            nullify(entry.get("operation")),
                  "status":               entry.get("status") or "eklenemedi",
                  "reason":               nullify(entry.get("reason")),
                  "request_payload":      to_jsonb(entry.get("request_payload")),
                  "response_payload":     to_jsonb(entry.get("response_payload")),
                  "error_payload":        to_jsonb(entry.get("error_payload")),
                  "extra_data":           to_jsonb(entry.get("extra_data")),
              })

              conn.commit()
              cur.close()
              conn.close()
              print(f"HMDL_LOG_OK: {entry.get('zabbix_hostname', '?')} / status={entry.get('status', '?')}")

          except Exception as e:
              print(f"HMDL_LOG_ERROR: {e}", file=sys.stderr)
              sys.exit(0)


      if __name__ == "__main__":
          main()
    dest: /tmp/hmdl_sync_log_insert.py
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when: hmdl_log_enabled | bool

- name: Write HMDL log entry to temp file
  copy:
    content: "{{ hmdl_log_entry | to_json }}"
    dest: "/tmp/hmdl_log_entry_{{ hmdl_log_device_id | default('tmp') }}.json"
  delegate_to: localhost
  when: hmdl_log_enabled | bool

- name: Insert HMDL log entry into database
  block:
    - name: Run HMDL log insert script
      command: >
        python3 /tmp/hmdl_sync_log_insert.py
        "{{ hmdl_db_host }}"
        "{{ hmdl_db_port }}"
        "{{ hmdl_db_name }}"
        "{{ hmdl_db_user }}"
        "{{ hmdl_db_password }}"
        "{{ hmdl_log_schema }}"
        "{{ hmdl_log_table }}"
        "/tmp/hmdl_log_entry_{{ hmdl_log_device_id | default('tmp') }}.json"
      register: _hmdl_insert_result
      changed_when: false
      delegate_to: localhost

    - name: Debug HMDL log insert output
      debug:
        msg: "{{ _hmdl_insert_result.stdout | default('') }}"
      when:
        - _hmdl_insert_result.stdout is defined
        - _hmdl_insert_result.stdout | length > 0

    - name: Debug HMDL log insert stderr
      debug:
        msg: "HMDL log stderr: {{ _hmdl_insert_result.stderr }}"
      when:
        - _hmdl_insert_result.stderr is defined
        - _hmdl_insert_result.stderr | length > 0

  rescue:
    - name: Debug HMDL log insert failure (rescued)
      debug:
        msg: >
          HMDL log insert başarısız oldu —
          device: {{ hmdl_log_entry.source_device_name | default('unknown') }},
          status: {{ hmdl_log_entry.status | default('unknown') }},
          hata: {{ ansible_failed_result.msg | default('bilinmeyen hata') }}

  when: hmdl_log_enabled | bool
