---
# HMDL Sync Log - hmdl.zabbix_sync_log tablosuna kayıt atar.
#
# Çağıran task'ın sağlaması gereken değişkenler:
#   hmdl_log_entry  : log alanlarını içeren dict
#   hmdl_log_device_id : temp dosya adı için benzersiz ID (örn. device.id)
#
# DB bağlantı değişkenleri defaults/main.yml'den gelir:
#   hmdl_db_host, hmdl_db_port, hmdl_db_name, hmdl_db_user, hmdl_db_password
#   hmdl_log_schema, hmdl_log_table

- name: Create HMDL sync log insert script
  copy:
    content: |
      #!/usr/bin/env python3
      """
      HMDL zabbix_sync_log insert script (psql version, no psycopg2).
      Hata olursa stderr'e yazar ve exit(0) döner — ana playbook kesilmez.
      """
      import json
      import sys
      import os
      import subprocess
      import tempfile


      def nullify(v):
          """Boş string ve 'N/A' değerlerini None'a çevirir."""
          if v is None or v == "" or v == "N/A":
              return None
          return v


      def to_int_or_none(v):
          if v is None or v == "" or v == "N/A":
              return None
          try:
              return int(v)
          except (ValueError, TypeError):
              return None


      def to_jsonb_str(v):
          """Dict/list değerlerini JSON string'e çevirir; boş yapıları None döner."""
          if v is None or v == "" or v == {} or v == []:
              return None
          if isinstance(v, (dict, list)):
              return json.dumps(v, default=str)
          if isinstance(v, str):
              try:
                  parsed = json.loads(v)
                  if parsed == {} or parsed == []:
                      return None
                  return json.dumps(parsed, default=str)
              except (ValueError, TypeError):
                  return None
          return None


      def sql_literal(v):
          """Python değerini SQL literal string'e çevirir."""
          if v is None:
              return 'NULL'
          if isinstance(v, int):
              return str(v)
          escaped = str(v).replace("'", "''")
          return f"'{escaped}'"


      def sql_jsonb(v):
          """Değeri SQL JSONB literal'e çevirir."""
          s = to_jsonb_str(v)
          if s is None:
              return 'NULL'
          escaped = s.replace("'", "''")
          return f"'{escaped}'::jsonb"


      def main():
          if len(sys.argv) < 9:
              print("HMDL_LOG_ERROR: Yetersiz argüman", file=sys.stderr)
              sys.exit(0)

          db_host     = sys.argv[1]
          db_port     = sys.argv[2]
          db_name     = sys.argv[3]
          db_user     = sys.argv[4]
          db_password = sys.argv[5]
          schema      = sys.argv[6]
          table       = sys.argv[7]
          entry_file  = sys.argv[8]

          try:
              with open(entry_file, "r") as f:
                  entry = json.load(f)
          except Exception as e:
              print(f"HMDL_LOG_ERROR: Entry dosyası okunamadı: {e}", file=sys.stderr)
              sys.exit(0)

          vals = {
              "run_id":               sql_literal(nullify(entry.get("run_id"))),
              "awx_job_id":           sql_literal(nullify(entry.get("awx_job_id"))),
              "playbook_name":        sql_literal(nullify(entry.get("playbook_name"))),
              "source_device_id":     sql_literal(to_int_or_none(entry.get("source_device_id"))),
              "source_device_name":   sql_literal(nullify(entry.get("source_device_name"))),
              "zabbix_hostid":        sql_literal(nullify(entry.get("zabbix_hostid"))),
              "zabbix_hostname":      sql_literal(nullify(entry.get("zabbix_hostname"))),
              "zabbix_host_ip":       sql_literal(nullify(entry.get("zabbix_host_ip"))),
              "device_type":          sql_literal(nullify(entry.get("device_type"))),
              "device_role":          sql_literal(nullify(entry.get("device_role"))),
              "manufacturer_name":    sql_literal(nullify(entry.get("manufacturer_name"))),
              "site_name":            sql_literal(nullify(entry.get("site_name"))),
              "location_name":        sql_literal(nullify(entry.get("location_name"))),
              "location_parent_name": sql_literal(nullify(entry.get("location_parent_name"))),
              "root_location_name":   sql_literal(nullify(entry.get("root_location_name"))),
              "tenant_name":          sql_literal(nullify(entry.get("tenant_name"))),
              "cluster_name":         sql_literal(nullify(entry.get("cluster_name"))),
              "operation":            sql_literal(nullify(entry.get("operation"))),
              "status":               sql_literal(entry.get("status") or "eklenemedi"),
              "reason":               sql_literal(nullify(entry.get("reason"))),
              "request_payload":      sql_jsonb(entry.get("request_payload")),
              "response_payload":     sql_jsonb(entry.get("response_payload")),
              "error_payload":        sql_jsonb(entry.get("error_payload")),
              "extra_data":           sql_jsonb(entry.get("extra_data")),
          }

          sql = f"""
      CREATE SCHEMA IF NOT EXISTS {schema};

      CREATE TABLE IF NOT EXISTS {schema}.{table} (
          id                   BIGSERIAL PRIMARY KEY,
          run_id               VARCHAR(100) NULL,
          awx_job_id           VARCHAR(100) NULL,
          playbook_name        TEXT NULL,
          source_device_id     BIGINT NULL,
          source_device_name   TEXT NULL,
          source_table         TEXT DEFAULT 'discovery_netbox_inventory_device',
          zabbix_hostid        TEXT NULL,
          zabbix_hostname      TEXT NULL,
          zabbix_host_ip       TEXT NULL,
          device_type          TEXT NULL,
          device_role          TEXT NULL,
          manufacturer_name    TEXT NULL,
          site_name            TEXT NULL,
          location_name        TEXT NULL,
          location_parent_name TEXT NULL,
          root_location_name   TEXT NULL,
          tenant_name          TEXT NULL,
          cluster_name         TEXT NULL,
          operation            VARCHAR(50) NULL,
          status               VARCHAR(50) NOT NULL,
          reason               TEXT NULL,
          request_payload      JSONB NULL,
          response_payload     JSONB NULL,
          error_payload        JSONB NULL,
          extra_data           JSONB NULL,
          processed_at         TIMESTAMPTZ DEFAULT NOW(),
          created_at           TIMESTAMPTZ DEFAULT NOW()
      );

      CREATE INDEX IF NOT EXISTS idx_{table}_processed_at     ON {schema}.{table} (processed_at);
      CREATE INDEX IF NOT EXISTS idx_{table}_status           ON {schema}.{table} (status);
      CREATE INDEX IF NOT EXISTS idx_{table}_source_device_id ON {schema}.{table} (source_device_id);
      CREATE INDEX IF NOT EXISTS idx_{table}_run_id           ON {schema}.{table} (run_id);
      CREATE INDEX IF NOT EXISTS idx_{table}_zabbix_hostname  ON {schema}.{table} (zabbix_hostname);

      INSERT INTO {schema}.{table} (
          run_id, awx_job_id, playbook_name,
          source_device_id, source_device_name,
          zabbix_hostid, zabbix_hostname, zabbix_host_ip,
          device_type, device_role, manufacturer_name,
          site_name, location_name, location_parent_name,
          root_location_name, tenant_name, cluster_name,
          operation, status, reason,
          request_payload, response_payload, error_payload, extra_data
      ) VALUES (
          {vals['run_id']}, {vals['awx_job_id']}, {vals['playbook_name']},
          {vals['source_device_id']}, {vals['source_device_name']},
          {vals['zabbix_hostid']}, {vals['zabbix_hostname']}, {vals['zabbix_host_ip']},
          {vals['device_type']}, {vals['device_role']}, {vals['manufacturer_name']},
          {vals['site_name']}, {vals['location_name']}, {vals['location_parent_name']},
          {vals['root_location_name']}, {vals['tenant_name']}, {vals['cluster_name']},
          {vals['operation']}, {vals['status']}, {vals['reason']},
          {vals['request_payload']}, {vals['response_payload']},
          {vals['error_payload']}, {vals['extra_data']}
      );
      """

          sql_file = None
          try:
              with tempfile.NamedTemporaryFile(
                  mode='w', suffix='.sql', delete=False, prefix='/tmp/hmdl_insert_'
              ) as tf:
                  tf.write(sql)
                  sql_file = tf.name

              env = os.environ.copy()
              env['PGPASSWORD'] = db_password

              proc = subprocess.run(
                  [
                      'psql',
                      '-h', db_host,
                      '-p', str(db_port),
                      '-U', db_user,
                      '-d', db_name,
                      '-v', 'ON_ERROR_STOP=1',
                      '-f', sql_file,
                  ],
                  capture_output=True,
                  text=True,
                  env=env,
                  timeout=30,
              )

              if proc.stderr:
                  print(f"DEBUG psql stderr: {proc.stderr}", file=sys.stderr)

              if proc.returncode != 0:
                  print(f"HMDL_LOG_ERROR: psql exited with code {proc.returncode}", file=sys.stderr)
                  sys.exit(0)

              print(f"HMDL_LOG_OK: {entry.get('zabbix_hostname', '?')} / status={entry.get('status', '?')}")

          except Exception as e:
              print(f"HMDL_LOG_ERROR: {e}", file=sys.stderr)
              sys.exit(0)
          finally:
              if sql_file and os.path.exists(sql_file):
                  os.unlink(sql_file)


      if __name__ == "__main__":
          main()
    dest: /tmp/hmdl_sync_log_insert.py
    mode: '0755'
  delegate_to: localhost
  run_once: true
  when: hmdl_log_enabled | bool

- name: Write HMDL log entry to temp file
  copy:
    content: "{{ hmdl_log_entry | to_json }}"
    dest: "/tmp/hmdl_log_entry_{{ hmdl_log_device_id | default('tmp') }}.json"
  delegate_to: localhost
  when: hmdl_log_enabled | bool

- name: Insert HMDL log entry into database
  block:
    - name: Run HMDL log insert script
      command: >
        python3 /tmp/hmdl_sync_log_insert.py
        "{{ hmdl_db_host }}"
        "{{ hmdl_db_port }}"
        "{{ hmdl_db_name }}"
        "{{ hmdl_db_user }}"
        "{{ hmdl_db_password }}"
        "{{ hmdl_log_schema }}"
        "{{ hmdl_log_table }}"
        "/tmp/hmdl_log_entry_{{ hmdl_log_device_id | default('tmp') }}.json"
      register: _hmdl_insert_result
      changed_when: false
      delegate_to: localhost

    - name: Debug HMDL log insert output
      debug:
        msg: "{{ _hmdl_insert_result.stdout | default('') }}"
      when:
        - _hmdl_insert_result.stdout is defined
        - _hmdl_insert_result.stdout | length > 0

    - name: Debug HMDL log insert stderr
      debug:
        msg: "HMDL log stderr: {{ _hmdl_insert_result.stderr }}"
      when:
        - _hmdl_insert_result.stderr is defined
        - _hmdl_insert_result.stderr | length > 0

  rescue:
    - name: Debug HMDL log insert failure (rescued)
      debug:
        msg: >
          HMDL log insert başarısız oldu —
          device: {{ hmdl_log_entry.source_device_name | default('unknown') }},
          status: {{ hmdl_log_entry.status | default('unknown') }},
          hata: {{ ansible_failed_result.msg | default('bilinmeyen hata') }}

  when: hmdl_log_enabled | bool
