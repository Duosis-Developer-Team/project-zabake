---
- name: Zabbix login to obtain auth token
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "user.login"
      params:
        username: "{{ zabbix_user }}"
        password: "{{ zabbix_password }}"
      id: 0
  register: zbx_login_resp
  run_once: true
  delegate_to: localhost

- name: Set zabbix_auth from login
  set_fact:
    zabbix_auth: "{{ zbx_login_resp.json.result }}"
  run_once: true
  delegate_to: localhost
  when: zbx_login_resp.json.result is defined

- name: Fail if Zabbix authentication failed
  fail:
    msg: "Zabbix authentication failed. Check credentials and API URL."
  when: zbx_login_resp.json.result is not defined or zabbix_auth is not defined
  run_once: true
  delegate_to: localhost

- name: Fetch all hosts from Zabbix
  uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    validate_certs: "{{ zabbix_validate_certs | default(false) }}"
    body:
      jsonrpc: "2.0"
      method: "host.get"
      params:
        output: ["hostid", "host", "name", "status", "monitored_by", "proxy_groupid", "flags"]
        selectInterfaces: "extend"
        selectTags: "extend"
        selectGroups: ["groupid", "name"]
        selectMacros: ["hostmacroid", "macro", "value"]
      auth: "{{ zabbix_auth }}"
      id: 100
  register: zbx_hosts_resp
  run_once: true
  delegate_to: localhost
  when: zabbix_auth is defined

- name: Fail when Zabbix host.get returned API error
  fail:
    msg: "Zabbix host.get failed: {{ zbx_hosts_resp.json.error | default(zbx_hosts_resp.json) }}"
  when:
    - zbx_hosts_resp.json is defined
    - zbx_hosts_resp.json.error is defined
  run_once: true
  delegate_to: localhost

- name: Normalize Zabbix host list from API response
  set_fact:
    zabbix_host_list: "{{ (zbx_hosts_resp.json | default({})).get('result', []) }}"
  run_once: true
  delegate_to: localhost
  when: zbx_hosts_resp is defined

- name: Display Zabbix hosts fetch results
  debug:
    msg: |
      ============================================
      ZABBIX HOSTS FETCH RESULTS
      ============================================
      Total hosts found: {{ zabbix_host_list | default([]) | length }}
      ============================================
  when: zabbix_host_list is defined

- name: Debug first host tags (RAW)
  debug:
    msg: |
      ============================================
      FIRST HOST RAW TAG DATA
      ============================================
      Host: {{ zabbix_host_list[0].host | default('N/A') }}
      Visible name: {{ zabbix_host_list[0].name | default('N/A') }}
      Tags: {{ zabbix_host_list[0].tags | default([]) }}
      Tag count: {{ zabbix_host_list[0].tags | default([]) | length }}
      {% if zabbix_host_list[0].tags | default([]) | length > 0 %}
      First tag structure: {{ zabbix_host_list[0].tags[0] }}
      {% endif %}
      ============================================
  when:
    - zabbix_host_list is defined
    - zabbix_host_list | length > 0

- name: Build Loki_ID to host mapping (using Python-style iteration)
  set_fact:
    zabbix_hosts_by_loki_id: |
      {%- set mapping = {} -%}
      {%- for host in zabbix_host_list | default([]) -%}
        {%- set loki_tags = host.tags | default([]) | selectattr('tag', 'defined') | selectattr('tag', 'equalto', 'Loki_ID') | list -%}
        {%- if loki_tags | length > 0 -%}
          {%- set loki_id = loki_tags[0].value | string -%}
          {%- set _ = mapping.update({loki_id: host}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ mapping }}
  run_once: true
  delegate_to: localhost
  when: zabbix_host_list is defined

- name: Build hostname to host mapping (fallback)
  set_fact:
    zabbix_hosts_by_hostname: >-
      {%- set mapping = {} -%}
      {%- for host in zabbix_host_list | default([]) -%}
      {%- set _ = mapping.update({host.host: host}) -%}
      {%- endfor -%}
      {{ mapping }}
  run_once: true
  delegate_to: localhost
  when: zabbix_host_list is defined

- name: Build visible name to host mapping (fallback)
  set_fact:
    zabbix_hosts_by_visible_name: >-
      {%- set mapping = {} -%}
      {%- for host in zabbix_host_list | default([]) -%}
      {%- if host.name is defined and host.name | string | trim != '' -%}
      {%- set _ = mapping.update({host.name: host}) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ mapping }}
  run_once: true
  delegate_to: localhost
  when: zabbix_host_list is defined

- name: Display mapping statistics
  debug:
    msg: |
      ============================================
      ZABBIX HOST MAPPING STATISTICS
      ============================================
      Total hosts from API: {{ zabbix_host_list | default([]) | length }}
      Hosts with Loki_ID tag: {{ zabbix_hosts_by_loki_id | default({}) | length }}
      Hostname mapping size: {{ zabbix_hosts_by_hostname | default({}) | length }}
      Visible name mapping size: {{ zabbix_hosts_by_visible_name | default({}) | length }}
      ============================================
  when: zabbix_host_list is defined

- name: Debug Loki_ID mapping results
  debug:
    msg: |
      ============================================
      LOKI_ID MAPPING DEBUG
      ============================================
      Total hosts checked: {{ zabbix_host_list | default([]) | length }}
      Hosts with Loki_ID tag: {{ zabbix_hosts_by_loki_id | default({}) | length }}
      {% if zabbix_hosts_by_loki_id | default({}) | length > 0 %}
      Sample Loki_IDs found: {{ (zabbix_hosts_by_loki_id.keys() | list | sort)[:5] }}
      {% else %}
      WARNING: No Loki_ID tags found on any Zabbix host. Existing hosts must have host tag Loki_ID=<NetBox device id> for ID-based matching.
      {% endif %}
      ============================================
  when: zabbix_host_list is defined
