---
# Discovery database connection settings (PostgreSQL)
discovery_db_host: ""
discovery_db_port: 5000
discovery_db_name: ""
discovery_db_user: ""
discovery_db_password: ""

# Zabbix connection settings
zabbix_url: ""
zabbix_user: ""
zabbix_password: ""
zabbix_validate_certs: false

# Device filtering
device_limit: 0  # 0 means no limit, process all matching devices
location_filter: ""  # Optional: Filter devices by location name (e.g., "DC11", "ISTANBUL")
# Note: Device filtering is now based on conditions in netbox_device_type_mapping.yml
# All devices matching any condition in the mapping file will be selected
# If location_filter is provided, only devices from that location will be fetched

# Execution mode
only_fetch: false  # When true, only fetch and log NetBox devices/platforms; skip Zabbix operations and email reporting
dry_run: false     # When true, runs all mapping/validation/Zabbix checks but skips host.create/host.update API calls
debug_mode: false  # When true, emit verbose debug tasks (per-host); keep false in production for performance
sync_throttle: 10  # Max concurrent compare-phase workers (async); tune for AWX EE CPU and Zabbix API capacity
use_two_phase_device_sync: true  # Phase A: parallel compare (no Zabbix writes); Phase B: sequential apply (host.create/update)

# Per-host-type inventory source: loki (NetBox REST API) | datalake (PostgreSQL discovery DB)
device_source: datalake
platform_source: loki
virtual_fw_source: loki

# Device, platform, and virtual firewall synchronization
sync_devices: true             # When false, skip device fetch (unless only_fetch), device processing, and device result aggregation
sync_platforms: false          # Enable platforms synchronization
sync_virtual_fws: false        # Enable virtual firewall synchronization
report_izlenmeyecek: true      # Include \"izlenmeyecek\" items in email/CSV report

# When true, newly created hosts are added to Zabbix as disabled
create_devices_disabled: false
create_platforms_disabled: false
create_virtual_fws_disabled: false

# Mapping file paths
templates_map_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/templates.yml"
datacenters_map_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/datacenters.yml"
device_type_mapping_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/netbox_device_type_mapping.yml"
platform_mapping_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/netbox_platform_mapping.yml"
virtual_fw_mapping_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/virtual_fw_mapping.yml"
host_groups_config_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/host_groups_config.yml"
tags_config_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/tags_config.yml"
platform_tags_config_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/platform_tags_config.yml"
virtual_fw_tags_config_path: "{{ playbook_dir | default(ansible_playbook_directory) }}/../mappings/virtual_fw_tags_config.yml"

# NetBox API credentials (required when any *_source is loki)
netbox_url: ""
netbox_token: ""
netbox_verify_ssl: false

# HMDL Log / Audit settings
hmdl_log_enabled: false
hmdl_log_schema: hmdl
hmdl_log_table: zabbix_sync_log
hmdl_playbook_name: db_to_zabbix_sync
# HMDL log DB connection — defaults to discovery DB; override if log DB is different
hmdl_db_host: "{{ discovery_db_host }}"
hmdl_db_port: "{{ discovery_db_port }}"
hmdl_db_name: "{{ discovery_db_name }}"
hmdl_db_user: "{{ discovery_db_user }}"
hmdl_db_password: "{{ discovery_db_password }}"

# Email notification settings
mail_smtp_host: "10.34.8.191"
mail_smtp_port: 587
mail_smtp_username: ""  # User authentication: False
mail_smtp_password: ""  # User authentication: False
mail_smtp_use_tls: false  # TLS: False
mail_recipients: []  # Required: List of email addresses, e.g. ["user1@example.com", "user2@example.com"] - Must be provided as playbook input
mail_from: "infrareport@alert.bulutistan.com"

