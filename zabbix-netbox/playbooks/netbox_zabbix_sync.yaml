---
- name: DB Zabbix Sync
  hosts: localhost
  gather_facts: no
  vars:
    # Discovery database credentials (required)
    _discovery_db_host: "{{ discovery_db_host | default('') }}"
    _discovery_db_port: "{{ discovery_db_port | default(5432) }}"
    _discovery_db_name: "{{ discovery_db_name | default('') }}"
    _discovery_db_user: "{{ discovery_db_user | default('') }}"
    _discovery_db_password: "{{ discovery_db_password | default('') }}"

    # Zabbix credentials (required)
    _zabbix_url: "{{ zabbix_url | default('') }}"
    _zabbix_user: "{{ zabbix_user | default('') }}"
    _zabbix_password: "{{ zabbix_password | default('') }}"
    _zabbix_validate_certs: "{{ zabbix_validate_certs | default(false) }}"

    # Optional: Location filter for devices
    _location_filter: "{{ location_filter | default('') }}"

    # Email notification settings (optional)
    _mail_recipients: "{{ mail_recipients | default([]) }}"

  pre_tasks:
    - name: Set device limit variable
      set_fact:
        _device_limit: "{{ (device_limit | default(0)) | int }}"

    - name: Validate discovery_db_host
      fail:
        msg: "discovery_db_host is required"
      when: _discovery_db_host | length == 0

    - name: Validate discovery_db_name
      fail:
        msg: "discovery_db_name is required"
      when: _discovery_db_name | length == 0

    - name: Validate discovery_db_user
      fail:
        msg: "discovery_db_user is required"
      when: _discovery_db_user | length == 0

    - name: Validate discovery_db_password
      fail:
        msg: "discovery_db_password is required"
      when: _discovery_db_password | length == 0

    - name: Validate zabbix_url
      fail:
        msg: "zabbix_url is required"
      when: _zabbix_url | length == 0

    - name: Validate zabbix_user
      fail:
        msg: "zabbix_user is required"
      when: _zabbix_user | length == 0

    - name: Validate zabbix_password
      fail:
        msg: "zabbix_password is required"
      when: _zabbix_password | length == 0

  roles:
    - role: netbox_zabbix_sync
      vars:
        discovery_db_host: "{{ _discovery_db_host }}"
        discovery_db_port: "{{ _discovery_db_port }}"
        discovery_db_name: "{{ _discovery_db_name }}"
        discovery_db_user: "{{ _discovery_db_user }}"
        discovery_db_password: "{{ _discovery_db_password }}"
        zabbix_url: "{{ _zabbix_url }}"
        zabbix_user: "{{ _zabbix_user }}"
        zabbix_password: "{{ _zabbix_password }}"
        zabbix_validate_certs: "{{ _zabbix_validate_certs }}"
        device_limit: "{{ _device_limit }}"
        location_filter: "{{ _location_filter }}"
        mail_recipients: "{{ _mail_recipients }}"
