---
- name: Zabbix Tag-Based Connectivity Monitoring
  hosts: localhost
  gather_facts: yes

  # All variables come from AWX Extra Variables or defaults/main.yml.
  # Lazy-evaluated play vars are intentionally avoided to prevent circular
  # reference errors when optional variables are not supplied by the caller.
  #
  # Required AWX Extra Variables:
  #   - zabbix_url:          Zabbix API URL (e.g. https://zabbix.example.com/api_jsonrpc.php)
  #   - zabbix_user:         Zabbix username
  #   - zabbix_password:     Zabbix password (use AWX Credentials)
  #
  # Optional AWX Extra Variables:
  #   - connection_tag:      Tag name to identify connection items (default: "connection status")
  #   - history_limit:       Number of history values to analyze (default: 10)
  #   - threshold_percentage: Minimum acceptable connectivity % (default: 70.0)
  #   - host_groups:         Filter by host groups, comma-separated (default: "" = all)
  #   - send_email:          Whether to send email notification (default: true)
  #   - mail_recipients:     List of recipient emails e.g. ["a@b.com"] (default: [])
  #   - mail_smtp_host:      SMTP server (default: 10.34.8.191)
  #   - mail_smtp_port:      SMTP port (default: 587)
  #   - mail_from:           Sender address (default: infrareport@alert.bulutistan.com)
  #   - mail_smtp_username:  SMTP username, leave empty to skip auth (default: "")
  #   - mail_smtp_password:  SMTP password, use AWX Credentials (default: "")

  pre_tasks:
    - name: Validate zabbix_url
      fail:
        msg: "zabbix_url is required"
      when: zabbix_url is not defined or zabbix_url | length == 0

    - name: Validate zabbix_user
      fail:
        msg: "zabbix_user is required"
      when: zabbix_user is not defined or zabbix_user | length == 0

    - name: Validate zabbix_password
      fail:
        msg: "zabbix_password is required"
      when: zabbix_password is not defined or zabbix_password | length == 0

    - name: Resolve optional variables to concrete values
      # set_fact evaluates eagerly (immediately), preventing circular reference
      # errors that arise when optional vars are absent and role defaults would
      # otherwise form a lazy-evaluation loop with play-level vars.
      set_fact:
        connection_tag: "{{ connection_tag | default('connection status') }}"
        history_limit: "{{ history_limit | default(10) }}"
        threshold_percentage: "{{ threshold_percentage | default(70.0) }}"
        host_groups: "{{ host_groups | default('') }}"
        mail_recipients: "{{ mail_recipients | default([]) }}"

  roles:
    - role: zabbix_monitoring
