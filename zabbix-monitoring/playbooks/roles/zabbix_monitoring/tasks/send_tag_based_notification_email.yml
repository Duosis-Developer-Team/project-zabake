---
# Send email notification for tag-based connectivity analysis

- name: Check if analysis data is available
  set_fact:
    analysis: "{{ connectivity_analysis }}"
  when: connectivity_analysis is defined

- name: Calculate connectivity statistics
  set_fact:
    stat_total_hosts: "{{ analysis.summary.total_hosts_analyzed | default(0) | int }}"
    stat_hosts_with_issues: "{{ analysis.summary.hosts_with_issues | default(0) | int }}"
    stat_hosts_without_issues: "{{ analysis.summary.hosts_without_issues | default(0) | int }}"
    stat_hosts_without_items: "{{ analysis.summary.hosts_without_connection_items | default(0) | int }}"
    stat_total_items: "{{ analysis.summary.total_items_analyzed | default(0) | int }}"
    stat_items_below_threshold: "{{ analysis.summary.items_below_threshold | default(0) | int }}"
    stat_threshold: "{{ analysis.summary.threshold_percentage | default(70.0) }}"
    stat_timestamp: "{{ analysis.summary.analysis_timestamp | default('') }}"
  when: connectivity_analysis is defined

- name: Generate email HTML content
  set_fact:
    email_body: >-
      <html>
      <head>
        <style>
          body { font-family: Arial, sans-serif; }
          table { border-collapse: collapse; width: 100%; margin: 20px 0; }
          th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
          th { background-color: #f44336; color: white; }
          tr:nth-child(even) { background-color: #f2f2f2; }
          .status-critical { color: #f44336; font-weight: bold; }
          .status-warning { color: #ff9800; font-weight: bold; }
          .status-no-data { color: #9e9e9e; font-weight: bold; }
          .summary { margin: 20px 0; padding: 15px; background-color: #f9f9f9; border-left: 4px solid #4CAF50; }
          .summary-warning { border-left-color: #f44336; }
          .section-header { margin-top: 30px; padding: 10px; background-color: #ffebee; border-left: 4px solid #f44336; }
          .section-header-info { margin-top: 30px; padding: 10px; background-color: #e3f2fd; border-left: 4px solid #2196F3; }
          .info-box { padding: 10px; background-color: #e3f2fd; border-left: 4px solid #2196F3; margin: 20px 0; }
        </style>
      </head>
      <body>
        <h2>Zabbix Connectivity Raporu</h2>
        <div class="summary {%- if stat_hosts_with_issues | int > 0 %} summary-warning{%- endif %}">
          <h3>Özet</h3>
          <p><strong>Toplam Host:</strong> {{ stat_total_hosts }}</p>
          <p><strong>Sorunsuz Host:</strong> {{ stat_hosts_without_issues }}</p>
          <p><strong>Sorunlu Host:</strong> {{ stat_hosts_with_issues }}</p>
          <p><strong>Bağlantı İtemi Olmayan Host:</strong> {{ stat_hosts_without_items }}</p>
          <p><strong>Toplam Item:</strong> {{ stat_total_items }}</p>
          <p><strong>Eşik Altı Item:</strong> {{ stat_items_below_threshold }}</p>
          <p><strong>Eşik Değeri:</strong> {{ stat_threshold }}%</p>
          {%- if stat_timestamp %}<p><strong>Analiz Zamanı:</strong> {{ stat_timestamp }}</p>{%- endif %}
        </div>

        {%- set failed_list = analysis.problematic_items | default([]) | selectattr('status', 'ne', 'healthy') | list -%}
        {%- if failed_list | length > 0 -%}
        <div class="section-header"><h3>HATA: Sorunlu Bağlantı İtemleri ({{ failed_list | length }})</h3></div>
        <table>
          <thead>
            <tr>
              <th>Host Adı</th>
              <th>Location</th>
              <th>Contact</th>
              <th>Tenant</th>
              <th>Arayüz IP</th>
              <th>Proxy Grubu</th>
              <th>Host Templates</th>
              <th>İtem Adı</th>
              <th>Bağlantı Skoru</th>
              <th>İtem Durumu</th>
              <th>Host Durumu</th>
            </tr>
          </thead>
          <tbody>
            {%- for item in failed_list -%}
            <tr>
              <td>{{ item.host_name | default(item.hostname) | default('N/A') }}</td>
              <td>{{ item.location | default('') }}</td>
              <td>{{ item.contact | default('') }}</td>
              <td>{{ item.tenant | default('') }}</td>
              <td>{{ item.interface_ip | default('') }}</td>
              <td>{{ item.proxy_group_name | default('') }}</td>
              <td>{{ item.host_templates | default('') }}</td>
              <td>{{ item.item_name | default('N/A') }}</td>
              <td style="text-align: center;">
                {%- if item.status == 'no_data' -%}
                <span class="status-no-data">N/A</span>
                {%- else -%}
                {{ item.percentage }}%
                {%- endif -%}
              </td>
              <td style="text-align: center;">
                {%- if item.status == 'critical' -%}
                <span class="status-critical">KRİTİK</span>
                {%- elif item.status == 'warning' -%}
                <span class="status-warning">UYARI</span>
                {%- elif item.status == 'no_data' -%}
                <span class="status-no-data">VERİ YOK</span>
                {%- else -%}
                {{ item.status | upper }}
                {%- endif -%}
              </td>
              <td style="text-align: center;">
                {%- if item.host_status == 'all_critical' -%}
                <span class="status-critical">TAMAMEN KRİTİK</span>
                {%- elif item.host_status == 'partial' -%}
                <span class="status-warning">KISMİ SORUN</span>
                {%- else -%}
                {{ item.host_status | upper }}
                {%- endif -%}
              </td>
            </tr>
            {%- endfor -%}
          </tbody>
        </table>
        {%- else -%}
        <div class="info-box">
          <h3>Tüm Bağlantı İtemleri Sağlıklı</h3>
          <p>Hiçbir sorun tespit edilmedi. Tüm itemler eşik değerinin ({{ stat_threshold }}%) üzerinde.</p>
        </div>
        {%- endif -%}

        {%- set no_item_hosts = analysis.hosts_without_connection_items | default([]) -%}
        {%- if no_item_hosts | length > 0 -%}
        <div class="section-header-info"><h3>Bağlantı İtemi Olmayan Hostlar ({{ no_item_hosts | length }})</h3></div>
        <table>
          <thead>
            <tr>
              <th>Host ID</th>
              <th>Hostname</th>
              <th>Görünen Ad</th>
              <th>Location</th>
              <th>Contact</th>
              <th>Tenant</th>
              <th>Arayüz IP</th>
              <th>Proxy Grubu</th>
              <th>Host Templates</th>
            </tr>
          </thead>
          <tbody>
            {%- for host in no_item_hosts -%}
            <tr>
              <td>{{ host.hostid | default('N/A') }}</td>
              <td>{{ host.hostname | default('N/A') }}</td>
              <td>{{ host.host_name | default(host.hostname) | default('N/A') }}</td>
              <td>{{ host.location | default('') }}</td>
              <td>{{ host.contact | default('') }}</td>
              <td>{{ host.tenant | default('') }}</td>
              <td>{{ host.interface_ip | default('') }}</td>
              <td>{{ host.proxy_group_name | default('') }}</td>
              <td>{{ host.host_templates | default('') }}</td>
            </tr>
            {%- endfor -%}
          </tbody>
        </table>
        {%- endif -%}

        <div class="info-box">
          <p><strong>Detaylı Rapor:</strong> Tüm verilerin detaylı bilgileri ekteki <code>zabbix_connectivity_raporu.csv</code> dosyasında yer almaktadır.</p>
        </div>

        <p style="margin-top: 30px; color: #999; font-size: 11px; opacity: 0.7;">
          Bu rapor otomatik olarak HMDL Automation tarafından oluşturulmuştur.
        </p>
      </body>
      </html>
  when: connectivity_analysis is defined

- name: Generate email plain text content
  set_fact:
    email_text_body: >-
      ZABBIX CONNECTİVİTY RAPORU
      ===========================

      ÖZET:
      -----
      Toplam Host: {{ stat_total_hosts }}
      Sorunsuz Host: {{ stat_hosts_without_issues }}
      Sorunlu Host: {{ stat_hosts_with_issues }}
      Bağlantı İtemi Olmayan Host: {{ stat_hosts_without_items }}
      Toplam Item: {{ stat_total_items }}
      Eşik Altı Item: {{ stat_items_below_threshold }}
      Eşik Değeri: {{ stat_threshold }}%
      {%- if stat_timestamp %}
      Analiz Zamanı: {{ stat_timestamp }}
      {%- endif %}

      {%- set failed_list = analysis.problematic_items | default([]) | selectattr('status', 'ne', 'healthy') | list -%}
      {%- if failed_list | length > 0 %}

      SORUNLU BAĞLANTI İTEMLERİ ({{ failed_list | length }}):
      ------------------------------------------
      {%- for item in failed_list %}

      Host: {{ item.host_name | default(item.hostname) | default('N/A') }}
      Location: {{ item.location | default('') }}
      Contact: {{ item.contact | default('') }}
      Tenant: {{ item.tenant | default('') }}
      Arayüz IP: {{ item.interface_ip | default('') }}
      Proxy Grubu: {{ item.proxy_group_name | default('') }}
      Host Templates: {{ item.host_templates | default('') }}
      İtem: {{ item.item_name | default('N/A') }}
      Skor: {%- if item.status == 'no_data' %} N/A{%- else %} {{ item.percentage }}%{%- endif %}
      İtem Durumu: {{ item.status | upper }}
      Host Durumu: {{ item.host_status | upper }}
      {%- endfor -%}
      {%- else %}

      TÜM BAĞLANTI İTEMLERİ SAĞLIKLI
      ------------------------------------------
      Hiçbir sorun tespit edilmedi. Eşik: {{ stat_threshold }}%
      {%- endif %}

      {%- set no_item_hosts = analysis.hosts_without_connection_items | default([]) -%}
      {%- if no_item_hosts | length > 0 %}

      BAĞLANTI İTEMİ OLMAYAN HOSTLAR ({{ no_item_hosts | length }}):
      ------------------------------------------
      {%- for host in no_item_hosts %}
      Host: {{ host.host_name | default(host.hostname) | default('N/A') }} | ID: {{ host.hostid | default('N/A') }}
      Location: {{ host.location | default('') }} | Contact: {{ host.contact | default('') }} | Tenant: {{ host.tenant | default('') }}
      Arayüz IP: {{ host.interface_ip | default('') }} | Proxy Grubu: {{ host.proxy_group_name | default('') }}
      Host Templates: {{ host.host_templates | default('') }}
      {%- endfor -%}
      {%- endif %}


      DETAYLI RAPOR:
      ------------------------------------------
      Tüm verilerin detaylı bilgileri ekteki "zabbix_connectivity_raporu.csv" dosyasında yer almaktadır.

      ---
      Bu rapor otomatik olarak HMDL Automation tarafından oluşturulmuştur.
  when: connectivity_analysis is defined

- name: Generate email subject
  set_fact:
    email_subject: >-
      {%- if stat_hosts_with_issues | int > 0 -%}
      Zabbix Connectivity Raporu - {{ stat_hosts_with_issues }} Host Sorunu Var
      {%- else -%}
      Zabbix Connectivity Raporu - Tüm Hostlar Sağlıklı ({{ stat_total_hosts }} Host Analiz Edildi)
      {%- endif -%}
  when: connectivity_analysis is defined

- name: Prepare email recipients as comma-separated string
  set_fact:
    mail_recipients_str: "{{ mail_recipients | join(',') }}"
  when: connectivity_analysis is defined

- name: Convert analysis results to JSON for Python script
  set_fact:
    analysis_results_json: "{{ connectivity_analysis | to_json }}"
  when: connectivity_analysis is defined

- name: Ensure temporary directory for email data exists
  file:
    path: "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  run_once: true
  when: connectivity_analysis is defined

- name: Write analysis results JSON to temporary file
  copy:
    content: "{{ analysis_results_json }}"
    dest: "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/analysis_results.json"
    mode: '0600'
  delegate_to: localhost
  run_once: true
  when: connectivity_analysis is defined

- name: Write email HTML content to temporary file
  copy:
    content: "{{ email_body }}"
    dest: "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/email_body.html"
    mode: '0600'
  delegate_to: localhost
  run_once: true
  when: connectivity_analysis is defined

- name: Write email plain text content to temporary file
  copy:
    content: "{{ email_text_body }}"
    dest: "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/email_body.txt"
    mode: '0600'
  delegate_to: localhost
  run_once: true
  when: connectivity_analysis is defined

- name: Send notification email with CSV attachment using Python SMTP
  command: >
    python3 {{ role_path }}/files/send_notification_email_smtp.py
    --smtp-host {{ mail_smtp_host }}
    --smtp-port {{ mail_smtp_port }}
    --smtp-user {{ mail_smtp_username | default('') }}
    --smtp-pass {{ mail_smtp_password | default('') }}
    --from-addr {{ mail_from }}
    --recipients "{{ mail_recipients_str }}"
    --subject "{{ email_subject }}"
    --results-file "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/analysis_results.json"
    --html-file "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/email_body.html"
    --text-file "{{ zabbix_monitoring_tmp_dir | default('/tmp/zabbix_monitoring') }}/email_body.txt"
  when:
    - connectivity_analysis is defined
    - mail_recipients is defined
    - mail_recipients | length > 0
  delegate_to: localhost
  run_once: true
  ignore_errors: true
  register: mail_send_result

- name: Display email notification status
  debug:
    msg: |
      ============================================
      EMAIL NOTIFICATION STATUS
      ============================================
      {% if connectivity_analysis is defined %}
      ANALYSIS SUMMARY:
      - Total Hosts: {{ stat_total_hosts }}
      - Hosts with Issues: {{ stat_hosts_with_issues }}
      - Hosts without Issues: {{ stat_hosts_without_issues }}
      - Hosts without Connection Items: {{ stat_hosts_without_items }}
      - Total Items Analyzed: {{ stat_total_items }}
      - Items Below Threshold: {{ stat_items_below_threshold }}
      - Threshold: {{ stat_threshold }}%
      {% if stat_hosts_with_issues | int > 0 %}
      WARNING: {{ stat_hosts_with_issues }} host(s) have connectivity issues
      {% else %}
      SUCCESS: All hosts are healthy
      {% endif %}
      {% if mail_recipients is defined and mail_recipients | length > 0 %}
      {% if mail_send_result is defined and mail_send_result.rc is defined %}
      {% if mail_send_result.rc == 0 %}
      SUCCESS: Email sent successfully to: {{ mail_recipients | join(', ') }}
      Method: Python SMTP with CSV attachment
      {% else %}
      ERROR: Email sending failed
      Details: {{ mail_send_result.stdout | default('Unknown error') }}
      {% endif %}
      {% elif mail_send_result is skipped %}
      INFO: Email sending skipped
      {% else %}
      INFO: Email status undefined
      {% endif %}
      {% else %}
      INFO: Email not sent - mail_recipients not defined or empty
      {% endif %}
      {% else %}
      INFO: Analysis results not found
      {% endif %}
      ============================================
  run_once: true
