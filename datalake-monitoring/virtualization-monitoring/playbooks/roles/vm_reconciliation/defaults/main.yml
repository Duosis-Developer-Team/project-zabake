---
recon_window_days: 7
# VM/LPAR targets: vmware, nutanix, ibm_lpar
# Coverage targets (cluster/host): vmware_cluster, nutanix_cluster, ibm_host
recon_targets:
  - vmware
  - nutanix
  - ibm_lpar

output_dir: "/tmp/vm_reconciliation"
log_level: "INFO"
install_python_dependencies: true

datalake_db:
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""

netbox_db:
  same_as_datalake: true
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""

reconciliation_db:
  enabled: false
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""
  table: reconciliation_results
  # Cluster/host coverage tables (hmdl schema). The upsert_coverage task creates
  # them via scripts/sql/create_hmdl_datalake_coverage_*.sql.
  clusters_table: hmdl.hmdl_datalake_coverage_cluster
  ibm_host_table: hmdl.hmdl_datalake_coverage_ibm_host

gui_replay:
  enabled: true

mail:
  enabled: false
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  mail_from: "datalake-recon@local"
  mail_recipients: []
