---
recon_window_days: 7
# VM/LPAR: vmware, nutanix, ibm_lpar | Coverage: vmware_cluster, nutanix_cluster, ibm_host
recon_targets:
  - vmware
  - nutanix
  - ibm_lpar
  - vmware_cluster
  - nutanix_cluster
  - ibm_host

datalake_db:
  host: "db.local"
  port: 5432
  name: "datalake"
  user: "readonly"
  password: "REPLACE_ME"

netbox_db:
  same_as_datalake: true

reconciliation_db:
  enabled: false
  host: ""
  port: 5432
  name: ""
  user: ""
  password: ""
  table: reconciliation_results
  clusters_table: hmdl.hmdl_datalake_monitoring_clusters
  ibm_host_table: hmdl.hmdl_datalake_monitoring_ibm_host

gui_replay:
  enabled: true

mail:
  enabled: false
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  mail_from: "datalake-recon@local"
  mail_recipients: []

output_dir: "/tmp/vm_reconciliation"
