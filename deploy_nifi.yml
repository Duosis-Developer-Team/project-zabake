---
- name: HMDL Development - NiFi Deploy
  hosts: all
  become: yes
  vars:
    # -------------------------------------------------------------
    # AYARLAR VE ADRESLER
    # -------------------------------------------------------------
    target_path: "/Datalake_Project/"
    backup_base_path: "/backup/datalake_configs/"
    
    # Gitea Ayarları (Admin + Şifre + Port 3000)
    git_repo_url: "http://admin:Qwerasdf123@10.134.16.135:3000/Admin/datalake.git"
    git_branch: "main"

  tasks:
    # -------------------------------------------------------------
    # 1. ADIM: Datalake Deposunu Çek (Temp)
    # -------------------------------------------------------------
    - name: Datalake Deposunu Çek (Temp)
      git:
        repo: "{{ git_repo_url }}"
        dest: "/tmp/datalake_temp"
        version: "{{ git_branch }}"
        force: yes
        accept_hostkey: yes

    # -------------------------------------------------------------
    # 2. ADIM: YENİ YEDEĞİ OLUŞTUR (Tarihli İsimle)
    # -------------------------------------------------------------
    - name: Yeni Yedek Klasörü Oluştur
      file:
        path: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}"
        state: directory
        mode: '0755'

    - name: Mevcut Dosyaları Yeni Yedeğe Kopyala
      copy:
        remote_src: yes
        src: "{{ target_path }}"
        dest: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}/"
      ignore_errors: yes 

    # -------------------------------------------------------------
    # 3. ADIM: ESKİLERİ TEMİZLE (Sadece En Yeni 1 Tane Kalsın)
    # -------------------------------------------------------------
    - name: Yedek Klasöründeki Tüm Klasörleri Bul
      find:
        paths: "{{ backup_base_path }}"
        file_type: directory
        recurse: no
        patterns: "backup_*"
      register: found_backups

    - name: En Yeni Yedek HARİÇ Diğerlerini Sil
      file:
        path: "{{ item.path }}"
        state: absent
      # Mantık: Listeyi zamana göre sırala (en yeni en üstte).
      # [1:] diyerek ilk sıradakini (en yeniyi) atla, gerisini sil.
      loop: "{{ (found_backups.files | sort(attribute='mtime', reverse=true))[1:] }}"
      when: found_backups.matched > 1

    # -------------------------------------------------------------
    # 4. ADIM: Yeni Dosyaları Yerine Koy (Deploy)
    # -------------------------------------------------------------
    - name: Yeni Dosyaları Kopyala
      copy:
        remote_src: yes
        src: "/tmp/datalake_temp/collectors/"
        dest: "{{ target_path }}"
        mode: '0755'
        force: yes

    # -------------------------------------------------------------
    # 5. ADIM: Temizlik (Geçici Dosyalar)
    # -------------------------------------------------------------
    - name: Geçici Git Klasörünü Sil
      file:
        path: "/tmp/datalake_temp"
        state: absent