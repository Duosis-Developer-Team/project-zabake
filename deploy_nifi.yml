---
- name: HMDL Development - NiFi Deploy
  hosts: all
  become: yes
  vars:
    # Hedef Sunucudaki Yollar
    target_path: "/Datalake_Project/"
    backup_base_path: "/backup/datalake_configs/"
    # DİKKAT: Dosyalar datalake'de olduğu için buraya git modülü ekliyoruz
    git_repo_url: "http://10.134.16.135:3000/Duosis-Developer-Team/datalake.git"
    git_branch: "main"

  tasks:
    # 1. Önce Datalake Dosyalarını Geçici Bir Yere İndir
    - name: Datalake Deposunu Çek (Temp)
      git:
        repo: "{{ git_repo_url }}"
        dest: "/tmp/datalake_temp"
        version: "{{ git_branch }}"
        force: yes
        accept_hostkey: yes # İlk bağlantıda key sorusuna takılmasın

    # 2. Mevcut Dosyaları Yedekle
    - name: Yedekleme Klasörü Oluştur
      file:
        path: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}"
        state: directory
        mode: '0755'

    - name: Mevcut Dosyaları Yedekle
      copy:
        remote_src: yes
        src: "{{ target_path }}"
        dest: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}/"
        fail_on_missing: no

    # 3. İndirdiğimiz Dosyaları Yerine Koy
    - name: Yeni Dosyaları Kopyala
      copy:
        remote_src: yes
        src: "/tmp/datalake_temp/collectors/"
        dest: "{{ target_path }}"
        mode: '0755'
        force: yes

    # 4. Temizlik
    - name: Geçici Klasörü Sil
      file:
        path: "/tmp/datalake_temp"
        state: absent