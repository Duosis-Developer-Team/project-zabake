---
- name: HMDL Development - NiFi Deploy
  hosts: all
  become: yes
  vars:
    # -------------------------------------------------------------
    # AYARLAR VE ADRESLER
    # -------------------------------------------------------------
    target_path: "/Datalake_Project/"
    backup_base_path: "/backup/datalake_configs/"
    
    # İŞTE DÜZELTİLMİŞ ADRES (Admin + Şifre + Port 3000):
    # Kullanıcı: admin
    # Şifre: Qwerasdf123
    # Adres: 10.134.16.135:3000/Admin/datalake.git
    git_repo_url: "http://admin:Qwerasdf123@10.134.16.135:3000/Admin/datalake.git"
    
    git_branch: "main"

  tasks:
    # -------------------------------------------------------------
    # 1. ADIM: Datalake Dosyalarını Geçici Bir Yere İndir
    # -------------------------------------------------------------
    - name: Datalake Deposunu Çek (Temp)
      git:
        repo: "{{ git_repo_url }}"
        dest: "/tmp/datalake_temp"
        version: "{{ git_branch }}"
        force: yes
        accept_hostkey: yes

    # -------------------------------------------------------------
    # 2. ADIM: Mevcut Dosyaları Yedekle (Güvenlik)
    # -------------------------------------------------------------
    - name: Yedekleme Klasörü Oluştur
      file:
        path: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}"
        state: directory
        mode: '0755'

    - name: Mevcut Dosyaları Yedekle
      copy:
        remote_src: yes
        src: "{{ target_path }}"
        dest: "{{ backup_base_path }}backup_{{ ansible_date_time.iso8601_basic_short }}/"
        fail_on_missing: no

    # -------------------------------------------------------------
    # 3. ADIM: Yeni Dosyaları Yerine Koy (Deploy)
    # -------------------------------------------------------------
    - name: Yeni Dosyaları Kopyala
      copy:
        remote_src: yes
        src: "/tmp/datalake_temp/collectors/"
        dest: "{{ target_path }}"
        mode: '0755'
        force: yes

    # -------------------------------------------------------------
    # 4. ADIM: Temizlik
    # -------------------------------------------------------------
    - name: Geçici Klasörü Sil
      file:
        path: "/tmp/datalake_temp"
        state: absent