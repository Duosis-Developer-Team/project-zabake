---
- name: Apply platform to collector_type mapping
  command: >
    python3 {{ role_path }}/files/apply_collector_mapping.py
    --entity platforms
    --inventory-file {{ collector_work_dir }}/platforms.json
    --collector-types {{ collector_types_path | quote }}
    --mapping-file {{ platform_collector_mapping_path | quote }}
    --proxy-assignment {{ proxy_assignment_path | quote }}
    --collector-filter {{ collector_filter | default('') | quote }}
    --output {{ collector_work_dir }}/platform_targets.json
  register: platform_map_cmd
  changed_when: false

- name: Load platform targets
  set_fact:
    platform_targets: "{{ lookup('file', collector_work_dir + '/platform_targets.json') | from_json }}"

- name: Merge platform targets into all targets
  set_fact:
    collector_all_targets: "{{ collector_all_targets + platform_targets }}"
