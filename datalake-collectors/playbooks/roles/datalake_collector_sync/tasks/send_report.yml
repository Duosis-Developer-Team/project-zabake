---
- name: Build email report context
  set_fact:
    collector_email_added: "{{ collector_diff_report | selectattr('action', 'equalto', 'added') | list }}"
    collector_email_removed: "{{ collector_diff_report | selectattr('action', 'equalto', 'removed') | list }}"
    collector_email_blocked: "{{ collector_diff_report | selectattr('action', 'equalto', 'removal_blocked') | list }}"
    collector_email_failed_checks: "{{ collector_check_report | default([]) | rejectattr('status', 'equalto', 'ok') | list }}"
    collector_email_results_csv: []

- name: Append diff rows for CSV mailer
  set_fact:
    collector_email_results_csv: "{{ collector_email_results_csv + [ csv_row ] }}"
  vars:
    csv_row:
      hostname: "{{ row.collector_type | default(row.conf_key) | default('collector') }}"
      device_role: "{{ row.host_entity_type | default('platform') }}"
      location: "{{ row.proxy_id | default('') }}"
      site: "{{ row.conf_key | default('') }}"
      tenant: "N/A"
      ownership: "N/A"
      ip: "{{ row.ip | default('') }}"
      status: "{{ row.action | default('') }}"
      reason: "{{ row.reason | default('') }}"
      platform_status: "{{ row.platform_status | default('') }}"
  loop: "{{ collector_diff_report | default([]) }}"
  loop_control:
    loop_var: row

- name: Render report email templates
  template:
    src: "{{ item.src }}"
    dest: "{{ collector_work_dir }}/{{ item.dest }}"
    mode: "0640"
  loop:
    - { src: "report_email.html.j2", dest: "report_email.html" }
    - { src: "report_email.txt.j2", dest: "report_email.txt" }

- name: Write results JSON for mailer CSV
  copy:
    content: "{{ collector_email_results_csv | to_nice_json }}"
    dest: "{{ collector_work_dir }}/email_results.json"
    mode: "0640"

- name: Send collector sync email
  command: >
    python3 {{ role_path }}/files/send_notification_email_smtp.py
    --smtp-host {{ mail_smtp_host | quote }}
    --smtp-port {{ mail_smtp_port }}
    --smtp-user {{ mail_smtp_username | quote }}
    --smtp-pass {{ mail_smtp_password | quote }}
    --from-addr {{ mail_from | quote }}
    --recipients {{ mail_recipients | join(',') | quote }}
    --subject {{ ('[HMDL Datalake Collectors] run ' ~ collector_run_id ~ ' — added ' ~ (collector_email_added | length) ~ ' removed ' ~ (collector_email_removed | length) ~ ' blocked ' ~ (collector_email_blocked | default([]) | length)) | quote }}
    --results-file {{ collector_work_dir }}/email_results.json
    --html-file {{ collector_work_dir }}/report_email.html
    --text-file {{ collector_work_dir }}/report_email.txt
  register: mail_cmd
  changed_when: false
  when: mail_recipients | length > 0
