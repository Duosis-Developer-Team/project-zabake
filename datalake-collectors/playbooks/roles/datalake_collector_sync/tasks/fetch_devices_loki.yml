---
- name: Validate NetBox credentials for device fetch
  assert:
    that:
      - netbox_url | length > 0
      - netbox_token | length > 0
    fail_msg: "netbox_url and netbox_token are required when sync_devices=true"

- name: Fetch devices from NetBox API
  command: >
    python3 {{ role_path }}/files/fetch_netbox_inventory.py
    --netbox-url {{ netbox_url | quote }}
    --netbox-token {{ netbox_token | quote }}
    --entity devices
    --verify-ssl {{ netbox_verify_ssl | string | lower }}
    --location-filter {{ location_filter | default('') | quote }}
  register: device_fetch_cmd
  changed_when: false
  no_log: true

- name: Save device inventory JSON
  copy:
    content: "{{ device_fetch_cmd.stdout }}"
    dest: "{{ collector_work_dir }}/devices.json"
    mode: "0640"

- name: Set device inventory fact
  set_fact:
    netbox_devices: "{{ device_fetch_cmd.stdout | from_json }}"
