---
- name: Resolve proxy assignment for {{ reconcile_proxy_id }}
  set_fact:
    current_proxy_cfg: "{{ proxy_lookup_map[reconcile_proxy_id] | default({}) }}"

- name: Skip reconcile when proxy host is placeholder
  debug:
    msg: "Skipping proxy {{ reconcile_proxy_id }} — replace REPLACE_* host in proxy_assignment.yml"
  when: "'REPLACE_' in (current_proxy_cfg.proxy_nifi_host | default('REPLACE_'))"

- name: Reconcile block for {{ reconcile_proxy_id }}
  when: "'REPLACE_' not in (current_proxy_cfg.proxy_nifi_host | default('REPLACE_'))"
  block:
    - name: Fetch current configuration from proxy via SSH
      slurp:
        src: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].conf_path | default('/Datalake_Project/configuration_file.json') }}"
      delegate_to: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
      vars:
        ansible_connection: ssh
        ansible_host: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
        ansible_user: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].ssh_user | default('root') }}"
      register: remote_conf_slurp
      ignore_errors: true
      ignore_unreachable: true

    - name: Warn when proxy configuration could not be read via SSH
      debug:
        msg: >-
          WARNING: slurp failed for {{ reconcile_proxy_id }}
          ({{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}):
          {{ remote_conf_slurp.msg | default('unknown error') }} —
          reconcile will treat current config as empty
      when: remote_conf_slurp is failed

    - name: Warn when proxy NiFi host is unreachable for config read
      debug:
        msg: >-
          WARNING: NiFi host unreachable for {{ reconcile_proxy_id }}
          ({{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}):
          {{ remote_conf_slurp.msg | default('unreachable') }} —
          reconcile will treat current config as empty
      when: remote_conf_slurp is unreachable

    - name: Set current config fact (empty if missing)
      set_fact:
        proxy_current_config: >-
          {{
            (remote_conf_slurp.content | b64decode | from_json)
            if (remote_conf_slurp is succeeded and remote_conf_slurp.content is defined)
            else {}
          }}

    - name: Write current config file for reconcile script
      copy:
        content: "{{ proxy_current_config | to_nice_json }}"
        dest: "{{ collector_work_dir }}/current_{{ reconcile_proxy_id }}.json"
        mode: "0640"

    - name: Run pre-reconcile connectivity checks for removal candidates
      command: >
        python3 {{ role_path }}/files/pre_reconcile_checks.py
        --current {{ collector_work_dir }}/current_{{ reconcile_proxy_id }}.json
        --targets {{ collector_work_dir }}/all_targets.json
        --collector-types {{ collector_types_path | quote }}
        --proxy-id {{ reconcile_proxy_id | quote }}
        --output {{ collector_work_dir }}/connectivity_{{ reconcile_proxy_id }}.json
        --checks-output {{ collector_work_dir }}/pre_checks_{{ reconcile_proxy_id }}.json
        --icmp-count {{ icmp_count }}
        --icmp-timeout {{ icmp_timeout_sec }}
        --tcp-timeout {{ tcp_timeout_sec }}
      register: pre_check_cmd
      changed_when: false
      when:
        - run_basic_checks | bool
        - removal_guard_enabled | bool

    - name: Record empty connectivity map when pre-checks skipped
      copy:
        content: "{}"
        dest: "{{ collector_work_dir }}/connectivity_{{ reconcile_proxy_id }}.json"
        mode: "0640"
      when: not (run_basic_checks | bool and removal_guard_enabled | bool)

    - name: Merge pre-reconcile check rows into global report
      set_fact:
        collector_check_report: "{{ collector_check_report + (lookup('file', collector_work_dir + '/pre_checks_' + reconcile_proxy_id + '.json') | from_json) }}"
      when:
        - run_basic_checks | bool
        - removal_guard_enabled | bool
        - pre_check_cmd is defined

    - name: Run reconcile for proxy {{ reconcile_proxy_id }}
      command: >
        python3 {{ role_path }}/files/reconcile_proxy_batch.py
        --current {{ collector_work_dir }}/current_{{ reconcile_proxy_id }}.json
        --targets {{ collector_work_dir }}/all_targets.json
        --collector-types {{ collector_types_path | quote }}
        --vault-json {{ collector_work_dir }}/vault_by_dir.json
        --proxy-id {{ reconcile_proxy_id | quote }}
        --connectivity-json {{ collector_work_dir }}/connectivity_{{ reconcile_proxy_id }}.json
        --output {{ collector_work_dir }}/reconciled_{{ reconcile_proxy_id }}.json
        --diff-output {{ collector_work_dir }}/diffs_{{ reconcile_proxy_id }}.json
      register: reconcile_cmd

    - name: Load diff report for proxy
      set_fact:
        proxy_diffs: "{{ lookup('file', collector_work_dir + '/diffs_' + reconcile_proxy_id + '.json') | from_json }}"

    - name: Check whether reconciled config differs from current
      command: >
        python3 {{ role_path }}/files/config_will_change.py
        --current {{ collector_work_dir }}/current_{{ reconcile_proxy_id }}.json
        --reconciled {{ collector_work_dir }}/reconciled_{{ reconcile_proxy_id }}.json
      register: config_change_cmd
      changed_when: false

    - name: Set proxy config change flag
      set_fact:
        proxy_config_will_change: "{{ (config_change_cmd.stdout | from_json).changed | bool }}"

    - name: Report configuration change intent (dry_run)
      debug:
        msg: >-
          dry_run: {{ reconcile_proxy_id }} would
          {{ 'update configuration (backup then deploy)' if proxy_config_will_change else 'skip deploy (unchanged)' }}
      when: dry_run | bool

    - name: Append to global diff report
      set_fact:
        collector_diff_report: "{{ collector_diff_report + proxy_diffs }}"

    - name: Write diffs to HMDL database
      command: >
        python3 {{ role_path }}/files/hmdl_collector_db.py
        --db-host {{ hmdl_db_host | quote }}
        --db-port {{ hmdl_db_port }}
        --db-name {{ hmdl_db_name | quote }}
        --db-user {{ hmdl_db_user | quote }}
        --db-password {{ hmdl_db_password | quote }}
        write-diffs
        --run-id {{ collector_run_id | quote }}
        --diffs-file {{ collector_work_dir }}/diffs_{{ reconcile_proxy_id }}.json
      register: write_diffs_result
      failed_when: write_diffs_result.rc != 0
      when: hmdl_log_enabled | bool

    - name: Write sync summary to HMDL database
      command: >
        python3 {{ role_path }}/files/hmdl_collector_db.py
        --db-host {{ hmdl_db_host | quote }}
        --db-port {{ hmdl_db_port }}
        --db-name {{ hmdl_db_name | quote }}
        --db-user {{ hmdl_db_user | quote }}
        --db-password {{ hmdl_db_password | quote }}
        write-sync
        --run-id {{ collector_run_id | quote }}
        --proxy-id {{ reconcile_proxy_id | quote }}
        --diffs-file {{ collector_work_dir }}/diffs_{{ reconcile_proxy_id }}.json
        --dry-run {{ dry_run | bool | lower }}
        --playbook-name {{ hmdl_playbook_name | quote }}
        --awx-job-id {{ ansible_env.AWX_JOB_ID | default('') | quote }}
      register: write_sync_result
      failed_when: write_sync_result.rc != 0
      when: hmdl_log_enabled | bool

    - name: Backup current configuration on proxy before deploy
      shell: |
        set -euo pipefail
        src="{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].conf_path | default('/Datalake_Project/configuration_file.json') }}"
        if [ ! -f "$src" ]; then
          echo "skip=no_existing_file"
          exit 0
        fi
        dest="${src}{{ config_backup_suffix }}"
        cp -a "$src" "$dest"
        echo "backup=$dest"
      delegate_to: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
      vars:
        ansible_connection: ssh
        ansible_host: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
        ansible_user: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].ssh_user | default('root') }}"
      register: config_backup_result
      changed_when: "'backup=' in (config_backup_result.stdout | default(''))"
      when:
        - not (dry_run | bool)
        - backup_config_before_deploy | bool
        - proxy_config_will_change | bool
        - remote_conf_slurp is succeeded

    - name: Log configuration backup path
      debug:
        msg: "Backed up {{ reconcile_proxy_id }} configuration to {{ config_backup_result.stdout | regex_search('backup=(.+)', '\\1') | first }}"
      when:
        - config_backup_result is defined
        - config_backup_result.stdout is defined
        - "'backup=' in config_backup_result.stdout"

    - name: Deploy reconciled configuration to proxy
      copy:
        content: "{{ lookup('file', collector_work_dir + '/reconciled_' + reconcile_proxy_id + '.json') }}"
        dest: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].conf_path | default('/Datalake_Project/configuration_file.json') }}"
        mode: "0644"
      delegate_to: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
      vars:
        ansible_connection: ssh
        ansible_host: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].proxy_nifi_host }}"
        ansible_user: "{{ hostvars['localhost']['proxy_lookup_map'][reconcile_proxy_id].ssh_user | default('root') }}"
      when:
        - not (dry_run | bool)
        - proxy_config_will_change | bool

    - name: Mark targets distributed on proxy
      command: >
        python3 {{ role_path }}/files/hmdl_collector_db.py
        --db-host {{ hmdl_db_host | quote }}
        --db-port {{ hmdl_db_port }}
        --db-name {{ hmdl_db_name | quote }}
        --db-user {{ hmdl_db_user | quote }}
        --db-password {{ hmdl_db_password | quote }}
        mark-distributed
        --proxy-id {{ reconcile_proxy_id | quote }}
      when:
        - hmdl_log_enabled | bool
        - not (dry_run | bool)
        - proxy_config_will_change | bool
