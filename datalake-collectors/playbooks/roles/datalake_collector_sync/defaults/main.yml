---
# Discovery / HMDL PostgreSQL
discovery_db_host: ""
discovery_db_port: 5432
discovery_db_name: ""
discovery_db_user: ""
discovery_db_password: ""

# NetBox (Loki) API — required when sync_platforms or sync_devices
netbox_url: ""
netbox_token: ""
netbox_verify_ssl: false

# Gitea vault repo (datalake-collectors-vault, Gitea-only)
gitea_vault_url: ""
gitea_vault_token: ""
gitea_vault_branch: "main"
gitea_vault_local_path: "/tmp/datalake-collectors-vault"

# Sync scope (platform-first)
sync_platforms: true
sync_devices: false
dry_run: true
run_basic_checks: true
only_fetch: false

# Filters
location_filter: ""
proxy_filter: ""
collector_filter: ""

# Mapping paths: mappings/ lives beside playbooks/ under datalake-collectors/
collector_types_path: "{{ playbook_dir }}/../mappings/collector_types.yml"
platform_collector_mapping_path: "{{ playbook_dir }}/../mappings/netbox_platform_collector_mapping.yml"
# zabbix-netbox mapping for customer_environment / izlenmeli status classification
platform_status_mapping_path: "{{ playbook_dir }}/../../zabbix-netbox/mappings/netbox_platform_mapping.yml"
device_collector_mapping_path: "{{ playbook_dir }}/../mappings/netbox_device_collector_mapping.yml"
proxy_assignment_path: "{{ playbook_dir }}/../mappings/proxy_assignment.yml"
collector_defaults_path: "{{ playbook_dir }}/../mappings/collector_defaults.yml"
target_conf_filename: "configuration_file.json"

# Reconcile
reconcile_strategy: ssh
reconcile_preserve_unknown_sections: true
backup_config_before_deploy: true
config_backup_suffix: ".bak.{{ collector_run_id }}"

# HMDL audit
hmdl_log_enabled: true
hmdl_log_schema: hmdl
hmdl_playbook_name: datalake_collector_sync
hmdl_db_host: "{{ discovery_db_host }}"
hmdl_db_port: "{{ discovery_db_port }}"
hmdl_db_name: "{{ discovery_db_name }}"
hmdl_db_user: "{{ discovery_db_user }}"
hmdl_db_password: "{{ discovery_db_password }}"

# Email (ADR-0003 standard variable names)
mail_smtp_host: "10.34.8.191"
mail_smtp_port: 587
mail_smtp_username: ""
mail_smtp_password: ""
mail_smtp_use_tls: false
mail_recipients: []
mail_from: "infrareport@alert.bulutistan.com"
send_email: true

# Check defaults
icmp_count: 3
icmp_timeout_sec: 1
tcp_timeout_sec: 3
removal_guard_enabled: true
check_phase_post_reconcile: "post_reconcile"

# Collector script deployment (off by default)
deploy_scripts: false
collector_scripts_src: "{{ playbook_dir }}/../../../../datalake/collectors"
collector_scripts_remote_base: "/Datalake_Project"
platform_collector_types_for_deploy:
  - VmWare
  - Nutanix
  - IBM-HMC
  - IBM-Virtualize
  - Veeam

# Runtime work dirs
collector_work_dir: "/tmp/datalake_collector_sync_{{ ansible_date_time.epoch | default('run') }}"
